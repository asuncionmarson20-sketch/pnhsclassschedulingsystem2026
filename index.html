            style={{marginTop:6,padding:'6px 10px',background:'var(--bg3)',borderRadius:6,border:'1px solid var(--border)',cursor:'pointer'}}
            onMouseEnter={e=>{
              const rect=e.currentTarget.getBoundingClientRect();
              setPopupPos({top:Math.min(rect.bottom+4,window.innerHeight-440),left:rect.left});
              setPopup(selectedTeacher);
            }}
            onMouseLeave={()=>setPopup(null)}
          >
            <div style={{display:'flex',alignItems:'center',gap:8}}>
              <span style={{fontSize:12,fontWeight:600,color:selectedBusy?'var(--danger)':'var(--accent3)'}}>
                {selectedBusy?'⛔ BUSY at selected slot':'✅ FREE at selected slot'}
              </span>
              <span style={{fontSize:11,color:'var(--text3)',marginLeft:'auto'}}>{info.totalHrs.toFixed(1)}/{info.maxHrs}h · hover for details</span>
            </div>
            <div style={{display:'flex',alignItems:'center',gap:6,marginTop:4}}>
              <div style={{flex:1,background:'var(--bg4)',borderRadius:10,height:4,overflow:'hidden'}}>
                <div style={{width:pct+'%',background:barClr,height:'100%',borderRadius:10}}/>
              </div>
              <span style={{fontSize:10,color:barClr,fontWeight:600}}>{pct}%</span>
            </div>
          </div>
        );
      })()}

      {/* Hover popup */}
      {popup&&(()=>{
        const info=getInfo(popup);
        const pct=Math.min(100,Math.round(info.totalHrs/info.maxHrs*100));
        const barClr=pct>=90?'var(--danger)':pct>=60?'var(--accent5)':'var(--accent3)';
        const sp=selectedTimeSlot?parseSlotLabel(selectedTimeSlot):null;
        return(
          <div style={{
            position:'fixed',top:popupPos.top,left:popupPos.left,zIndex:99999,
            background:'var(--bg2)',border:'1px solid var(--border)',
            borderRadius:10,padding:14,width:300,
            boxShadow:'0 16px 40px rgba(0,0,0,0.7)',pointerEvents:'none'
          }}>
            <div style={{fontFamily:'Syne',fontWeight:700,fontSize:13,marginBottom:10,color:'var(--text)',display:'flex',alignItems:'center',gap:8}}>
              <span>👤</span>{popup.name}
            </div>
            <div style={{marginBottom:10}}>
              <div style={{display:'flex',justifyContent:'space-between',fontSize:11,marginBottom:4}}>
                <span style={{color:'var(--text2)'}}>Teaching Load</span>
                <span style={{color:barClr,fontWeight:700}}>{info.totalHrs.toFixed(1)}/{info.maxHrs}h ({pct}%)</span>
              </div>
              <div style={{background:'var(--bg4)',borderRadius:10,height:6,overflow:'hidden'}}>
                <div style={{width:pct+'%',background:barClr,height:'100%',borderRadius:10}}/>
              </div>
              <div style={{marginTop:4,fontSize:11,color:'var(--accent3)'}}>✓ {info.remaining.toFixed(1)} hrs available</div>
            </div>
            <div style={{borderTop:'1px solid var(--border)',paddingTop:8}}>
              <div style={{fontSize:11,fontWeight:700,color:'var(--text2)',marginBottom:6,textTransform:'uppercase',letterSpacing:'0.5px'}}>Weekly Schedule</div>
              {info.mySched.length===0
                ?<div style={{fontSize:11,color:'var(--text3)',fontStyle:'italic'}}>No schedules yet — fully available</div>
                :DAYS.filter(d=>(info.byDay[d]||[]).length>0).map(d=>(
                  <div key={d} style={{marginBottom:5}}>
                    <div style={{fontSize:10,fontWeight:700,color:'var(--accent5)',marginBottom:2}}>{d}</div>
                    {info.byDay[d].map(s=>{
                      const sub=subjects.find(x=>x.id===s.subjectId);
                      const sec=sections.find(x=>x.id===s.sectionId);
                      const ep=parseSlotLabel(s.timeSlot);
                      const clash=sp&&ep&&d===selectedDay&&slotsOverlap(sp.startMin,sp.endMin,ep.startMin,ep.endMin);
                      return(
                        <div key={s.id} style={{
                          display:'flex',justifyContent:'space-between',fontSize:11,
                          padding:'3px 6px',borderRadius:4,marginBottom:2,
                          background:clash?'rgba(248,81,73,0.18)':'var(--bg3)',
                          border:clash?'1px solid rgba(248,81,73,0.4)':'1px solid transparent'
                        }}>
                          <span style={{color:clash?'var(--danger)':'var(--text)',fontWeight:clash?700:400}}>
                            {sub?.name||'?'} <span style={{color:'var(--text3)'}}>({sec?.name||'?'})</span>
                          </span>
                          <span style={{color:'var(--text3)',fontFamily:'monospace',fontSize:10}}>{s.timeSlot}</span>
                        </div>
                      );
                    })}
                  </div>
                ))
              }
            </div>
          </div>
        );
      })()}
    </div>
  );
};

/* ===================== SCHEDULES PAGE ===================== */
const SchedulesPage=({schedules,setSchedules,sections,subjects,teachers,rooms,timeSettings,toast})=>{
  const [filter,setFilter]=useState({section:'',teacher:'',subject:'',grade:'',day:''});
  const [editing,setEditing]=useState(null);
  const [confirm,setConfirm]=useState(null);
  const [clearAllConfirm,setClearAllConfirm]=useState(false);
  const [repeatDays,setRepeatDays]=useState([]);
  const [dragId,setDragId]=useState(null);
  const [dragOverId,setDragOverId]=useState(null);
  const slots=useMemo(()=>generateTimeSlots(timeSettings),[timeSettings]);
  const conflicts=useMemo(()=>detectConflicts(schedules),[schedules]);

  const empty={id:'',sectionId:'',subjectId:'',teacherId:'',roomId:'',day:'Monday',timeSlot:slots[0]?.label||''};

  // Group key: sectionId + subjectId + teacherId
  const groupKey=(s)=>s.sectionId+'|'+s.subjectId+'|'+s.teacherId;

  const filteredSchedules=schedules.filter(s=>{
    if(filter.section&&s.sectionId!==filter.section)return false;
    if(filter.teacher&&s.teacherId!==filter.teacher)return false;
    if(filter.subject&&s.subjectId!==filter.subject)return false;
    if(filter.day&&s.day!==filter.day)return false;
    if(filter.grade){
      const sec=sections.find(x=>x.id===s.sectionId);
      if(!sec||sec.gradeLevel!==filter.grade)return false;
    }
    return true;
  });

  // Sort: by section name → day order → start time
  const DAY_ORDER={Monday:0,Tuesday:1,Wednesday:2,Thursday:3,Friday:4,Saturday:5,Sunday:6};
  const sortedSchedules=useMemo(()=>{
    return [...filteredSchedules].sort((a,b)=>{
      const secA=sections.find(s=>s.id===a.sectionId)?.name||'';
      const secB=sections.find(s=>s.id===b.sectionId)?.name||'';
      if(secA!==secB)return secA.localeCompare(secB);
      const dayDiff=(DAY_ORDER[a.day]??9)-(DAY_ORDER[b.day]??9);
      if(dayDiff!==0)return dayDiff;
      const pa=parseSlotLabel(a.timeSlot);
      const pb=parseSlotLabel(b.timeSlot);
      return(pa?.startMin??0)-(pb?.startMin??0);
    });
  },[filteredSchedules,sections]);

  const getUnfulfilledSubjects=(sectionId)=>{
    const sec=sections.find(s=>s.id===sectionId);
    if(!sec)return subjects;
    return subjects.filter(sub=>{
      if(sub.gradeLevel!==sec.gradeLevel)return false;
      if(sub.strand&&sub.strand!==sec.strand)return false;
      return true;
    });
  };

  const save=()=>{
    if(!editing.sectionId||!editing.subjectId||!editing.teacherId||!editing.roomId||!editing.timeSlot){
      toast('All fields required','error');return;
    }
    const daysToCheck=[editing.day,...repeatDays.filter(d=>d!==editing.day)];
    const conflictMessages=[];
    daysToCheck.forEach(day=>{
      const sp=parseSlotLabel(editing.timeSlot);
      if(!sp)return;
      schedules.forEach(ex=>{
        if(ex.id===editing.id)return;
        if(ex.day!==day)return;
        const ep=parseSlotLabel(ex.timeSlot);
        if(!ep||!slotsOverlap(sp.startMin,sp.endMin,ep.startMin,ep.endMin))return;
        if(ex.teacherId===editing.teacherId){
          const tch=teachers.find(t=>t.id===editing.teacherId);
          const sec=sections.find(s=>s.id===ex.sectionId);
          const sub=subjects.find(s=>s.id===ex.subjectId);
          conflictMessages.push(day+': '+(tch?.name||'Teacher')+' is already teaching '+(sub?.name||'a subject')+' for '+(sec?.name||'another section')+' at '+ex.timeSlot);
        }
        if(ex.roomId===editing.roomId){
          const rm=rooms.find(r=>r.id===editing.roomId);
          const sec=sections.find(s=>s.id===ex.sectionId);
          conflictMessages.push(day+': '+(rm?.name||'Room')+' is already used by '+(sec?.name||'another section')+' at '+ex.timeSlot);
        }
        if(ex.sectionId===editing.sectionId){
          const sec=sections.find(s=>s.id===editing.sectionId);
          conflictMessages.push(day+': '+(sec?.name||'Section')+' already has a class at '+ex.timeSlot);
        }
      });
    });
    if(conflictMessages.length>0){toast('⚠ Conflict: '+conflictMessages[0],'error');return;}

    const newEntries=daysToCheck.map(day=>({...editing,id:uid(),day}));

    if(editing.id){
      // Edit: replace in place
      setSchedules(ss=>[...ss.filter(s=>s.id!==editing.id),...newEntries]);
    }else{
      // New: insert right after last entry with same group key, or at end
      setSchedules(ss=>{
        const deduped=newEntries.filter(ne=>
          !ss.some(ex=>ex.sectionId===ne.sectionId&&ex.day===ne.day&&ex.timeSlot===ne.timeSlot)
        );
        if(deduped.length<newEntries.length){
          const skipped=newEntries.length-deduped.length;
          setTimeout(()=>toast(skipped+' duplicate slot(s) skipped','warn'),0);
        }
        if(deduped.length===0)return ss;
        const key=groupKey(deduped[0]);
        // Find last index of same group key
        let insertIdx=-1;
        for(let i=ss.length-1;i>=0;i--){
          if(groupKey(ss[i])===key){insertIdx=i+1;break;}
        }
        if(insertIdx===-1){
          // No existing group — append
          return[...ss,...deduped];
        }
        const result=[...ss];
        result.splice(insertIdx,0,...deduped);
        return result;
      });
    }
    toast('Schedule saved ('+daysToCheck.length+' day(s))','success');
    setEditing(null);setRepeatDays([]);
  };

  // Drag handlers
  const onDragStart=(e,id)=>{
    setDragId(id);
    e.dataTransfer.effectAllowed='move';
  };
  const onDragOver=(e,id)=>{
    e.preventDefault();
    if(id!==dragId)setDragOverId(id);
  };
  const onDrop=(e,targetId)=>{
    e.preventDefault();
    if(!dragId||dragId===targetId){setDragId(null);setDragOverId(null);return;}
    setSchedules(ss=>{
      const from=ss.findIndex(s=>s.id===dragId);
      const to=ss.findIndex(s=>s.id===targetId);
      if(from===-1||to===-1)return ss;
      const result=[...ss];
      const [moved]=result.splice(from,1);
      result.splice(to,0,moved);
      return result;
    });
    toast('Row moved','success');
    setDragId(null);setDragOverId(null);
  };
  const onDragEnd=()=>{setDragId(null);setDragOverId(null);};

  const subjectColorMap={};
  subjects.forEach((s,i)=>{subjectColorMap[s.id]=i%10;});
  const conflictIds=new Set(conflicts.flatMap(c=>c.ids));

  // Detect group boundaries for visual separator
  const prevKey=(idx)=>idx>0?groupKey(sortedSchedules[idx-1]):'';

  return(
    <div className="page-content">
      <div className="flex items-center justify-between mb-16">
        <div>
          <h2 style={{fontFamily:'Syne',fontSize:18,fontWeight:800}}>Schedules</h2>
          <p className="text-muted text-sm mt-8">{schedules.length} schedule entries · {conflicts.length} conflict(s)</p>
        </div>
        <div className="flex gap-8">
          <button className="btn btn-danger btn-sm" onClick={()=>setClearAllConfirm(true)}>🗑 Clear All</button>
          <button className="btn btn-primary" onClick={()=>{setEditing({...empty});setRepeatDays([]);}}>+ Add Schedule</button>
        </div>
      </div>

      <div className="filter-bar">
        <select className="filter-select" value={filter.section} onChange={e=>setFilter(f=>({...f,section:e.target.value}))}>
          <option value="">All Sections</option>
          {sections.map(s=><option key={s.id} value={s.id}>{s.name}</option>)}
        </select>
        <select className="filter-select" value={filter.teacher} onChange={e=>setFilter(f=>({...f,teacher:e.target.value}))}>
          <option value="">All Teachers</option>
          {teachers.map(t=><option key={t.id} value={t.id}>{t.name}</option>)}
        </select>
        <select className="filter-select" value={filter.subject} onChange={e=>setFilter(f=>({...f,subject:e.target.value}))}>
          <option value="">All Subjects</option>
          {subjects.map(s=><option key={s.id} value={s.id}>{s.name}</option>)}
        </select>
        <select className="filter-select" value={filter.grade} onChange={e=>setFilter(f=>({...f,grade:e.target.value}))}>
          <option value="">All Grades</option>
          {GRADE_LEVELS.map(g=><option key={g}>{g}</option>)}
        </select>
        <select className="filter-select" value={filter.day} onChange={e=>setFilter(f=>({...f,day:e.target.value}))}>
          <option value="">All Days</option>
          {DAYS.map(d=><option key={d}>{d}</option>)}
        </select>
        {Object.values(filter).some(Boolean)&&<button className="btn btn-secondary btn-xs" onClick={()=>setFilter({section:'',teacher:'',subject:'',grade:'',day:''})}>Clear</button>}
      </div>

      {conflicts.length>0&&(
        <div className="conflict-alert">
          <div style={{fontWeight:700,marginBottom:4}}>⚠ {conflicts.length} conflict(s) detected — affected rows are highlighted:</div>
          <div style={{display:'flex',gap:12,flexWrap:'wrap',fontSize:12}}>
            {conflicts.filter(c=>c.type==='teacher').length>0&&<span>👤 {conflicts.filter(c=>c.type==='teacher').length} teacher double-booked</span>}
            {conflicts.filter(c=>c.type==='room').length>0&&<span>🏫 {conflicts.filter(c=>c.type==='room').length} room double-booked</span>}
            {conflicts.filter(c=>c.type==='section').length>0&&<span>📚 {conflicts.filter(c=>c.type==='section').length} section overlap</span>}
          </div>
        </div>
      )}

      <div style={{fontSize:11,color:'var(--text3)',marginBottom:8,display:'flex',alignItems:'center',gap:6}}>
        <span>⠿</span><span>Drag rows to reorder · Same section+subject+teacher are grouped together</span>
      </div>

      <div className="card">
        <div className="table-wrap">
          <table>
            <thead><tr><th style={{width:24}}></th><th>Section</th><th>Subject</th><th>Teacher</th><th>Room</th><th>Day</th><th>Time Slot</th><th>Actions</th></tr></thead>
            <tbody>
              {sortedSchedules.length===0&&<tr><td colSpan={8} style={{textAlign:'center',color:'var(--text3)',padding:24}}>No schedules found.</td></tr>}
              {sortedSchedules.map((s,idx)=>{
                const sec=sections.find(x=>x.id===s.sectionId);
                const sub=subjects.find(x=>x.id===s.subjectId);
                const tch=teachers.find(x=>x.id===s.teacherId);
                const rm=rooms.find(x=>x.id===s.roomId);
                const hasConflict=conflictIds.has(s.id);
                const myConflicts=conflicts.filter(c=>c.ids.includes(s.id));
                const conflictTypes=[...new Set(myConflicts.map(c=>c.type))];
                const isNewGroup=idx>0&&groupKey(s)!==prevKey(idx);
                const isDragging=dragId===s.id;
                const isDragOver=dragOverId===s.id;
                return(
                  <tr key={s.id}
                    draggable
                    onDragStart={e=>onDragStart(e,s.id)}
                    onDragOver={e=>onDragOver(e,s.id)}
                    onDrop={e=>onDrop(e,s.id)}
                    onDragEnd={onDragEnd}
                    style={{
                      ...(hasConflict?{background:'rgba(248,81,73,0.12)',outline:'1px solid rgba(248,81,73,0.4)'}:{}),
                      ...(isDragging?{opacity:0.4}:{}),
                      ...(isDragOver?{borderTop:'2px solid var(--accent2)'}:{}),
                      ...(isNewGroup?{borderTop:'2px solid var(--border)'}:{}),
                      cursor:'grab',
                    }}
                  >
                    <td style={{textAlign:'center',color:'var(--text3)',fontSize:14,cursor:'grab',userSelect:'none',paddingLeft:8}}>⠿</td>
                    <td>{sec?<span className="tag tag-blue">{sec.name}</span>:'?'}</td>
                    <td>
                      {sub&&<span className={'tag color-'+subjectColorMap[sub.id]} style={{color:'#fff',padding:'2px 8px',borderRadius:20,fontSize:11}}>{sub.name}</span>}
                    </td>
                    <td>{tch?tch.name:<span className="text-muted text-xs">—</span>}</td>
                    <td>{rm?rm.name:<span className="text-muted text-xs">—</span>}</td>
                    <td><span className="tag tag-gray">{s.day}</span></td>
                    <td style={{fontFamily:'monospace',fontSize:12}}>{s.timeSlot}</td>
                    <td>
                      <div className="flex gap-8">
                        {conflictTypes.includes('teacher')&&<span className="tag tag-red" title="Teacher double-booked">👤</span>}
                        {conflictTypes.includes('room')&&<span className="tag tag-red" title="Room double-booked">🏫</span>}
                        {conflictTypes.includes('section')&&<span className="tag tag-red" title="Section overlap">📚</span>}
                        <button className="btn btn-secondary btn-xs" onClick={()=>{setEditing({...s});setRepeatDays([]);}}>Edit</button>
                        <button className="btn btn-danger btn-xs" onClick={()=>setConfirm(s)}>Del</button>
                      </div>
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      </div>

      {editing&&(
        <div className="modal-overlay" onClick={()=>setEditing(null)}>
          <div className="modal" onClick={e=>e.stopPropagation()}>
            <div className="modal-header">
              <span className="modal-title">{editing.id?'Edit Schedule':'Add Schedule'}</span>
              <button className="modal-close" onClick={()=>setEditing(null)}>×</button>
            </div>
            <div className="modal-body">
              <div className="grid-2">
                <div className="form-group"><label className="form-label">Section *</label>
                  <select className="form-select" value={editing.sectionId} onChange={e=>setEditing(v=>({...v,sectionId:e.target.value,subjectId:'',teacherId:''}))}>
                    <option value="">— Select Section —</option>
                    {sections.map(s=><option key={s.id} value={s.id}>{s.name}</option>)}
                  </select>
                </div>
                <div className="form-group" style={{position:'relative'}}>
                  <label className="form-label">Subject *</label>
                  <SubjectPicker
                    key={'subj-'+schedules.length+'-'+editing.sectionId}
                    sectionId={editing.sectionId}
                    sections={sections}
                    subjects={subjects}
                    schedules={schedules}
                    teachers={teachers}
                    rooms={rooms}
                    editingId={editing.id}
                    selectedId={editing.subjectId}
                    onSelect={id=>setEditing(v=>({...v,subjectId:id,teacherId:''}))}
                  />
                </div>
              </div>
              <div className="grid-2">
                <div className="form-group"><label className="form-label">Day *</label>
                  <select className="form-select" value={editing.day} onChange={e=>setEditing(v=>({...v,day:e.target.value}))}>
                    {DAYS.map(d=><option key={d}>{d}</option>)}
                  </select>
                </div>
                <div className="form-group"><label className="form-label">Time Slot *</label>
                  <select className="form-select" value={editing.timeSlot} onChange={e=>setEditing(v=>({...v,timeSlot:e.target.value}))}>
                    {slots.map(s=><option key={s.label} value={s.label}>{s.label}</option>)}
                  </select>
                </div>
              </div>
              <div className="grid-2">
                <div className="form-group"><label className="form-label">Room *</label>
                  <select className="form-select" value={editing.roomId} onChange={e=>setEditing(v=>({...v,roomId:e.target.value}))}>
                    <option value="">— Select Room —</option>
                    {rooms.map(r=><option key={r.id} value={r.id}>{r.name}</option>)}
                  </select>
                </div>
                <div className="form-group">
                  <label className="form-label">Teacher *</label>
                  <TeacherPicker
                    key={schedules.map(s=>s.id+s.teacherId).join('')+editing.day+editing.timeSlot}
                    teachers={editing.subjectId?teachers.filter(t=>t.subjects.includes(editing.subjectId)):teachers}
                    selectedId={editing.teacherId}
                    onSelect={id=>setEditing(v=>({...v,teacherId:id}))}
                    schedules={schedules}
                    subjects={subjects}
                    sections={sections}
                    editingId={editing.id}
                    selectedDay={editing.day}
                    selectedTimeSlot={editing.timeSlot}
                  />
                </div>
              </div>
              <div className="form-group">
                <label className="form-label">Repeat on other days</label>
                <div className="day-toggle">
                  {DAYS.filter(d=>d!==editing.day).map(d=>{
                    const sec=sections.find(s=>s.id===editing.sectionId);
                    const secSub=sec&&editing.subjectId?(sec.sectionSubjects||[]).find(x=>x.subjectId===editing.subjectId):null;
                    const units=secSub?secSub.units:null;
                    const totalSelected=1+repeatDays.length+(repeatDays.includes(d)?0:1);
                    const wouldExceed=units!==null&&!repeatDays.includes(d)&&totalSelected>units;
                    return(
                      <button key={d}
                        className={'day-btn '+(repeatDays.includes(d)?'active':'')}
                        style={wouldExceed?{borderColor:'var(--danger)',color:'var(--danger)',background:'rgba(248,81,73,0.08)'}:{}}
                        onClick={()=>setRepeatDays(rd=>rd.includes(d)?rd.filter(x=>x!==d):[...rd,d])}
                        title={wouldExceed?'Adding this day will exceed the '+units+'-unit limit for this subject':''}
                      >{d.slice(0,3)}</button>
                    );
                  })}
                </div>
                {(()=>{
                  const totalDays=1+repeatDays.length;
                  const sec=sections.find(s=>s.id===editing.sectionId);
                  const secSub=sec&&editing.subjectId?(sec.sectionSubjects||[]).find(x=>x.subjectId===editing.subjectId):null;
                  const units=secSub?secSub.units:null;
                  const sub=editing.subjectId?subjects.find(x=>x.id===editing.subjectId):null;
                  if(units!==null&&totalDays>units){
                    return(
                      <div style={{marginTop:8,padding:'8px 12px',background:'rgba(248,81,73,0.12)',border:'1px solid rgba(248,81,73,0.4)',borderRadius:6,fontSize:12,color:'var(--danger)',display:'flex',alignItems:'center',gap:8}}>
                        <span style={{fontSize:16}}>⚠️</span>
                        <span><strong>Not allowed!</strong> {sub?.name||'Subject'} only has {units} unit{units!==1?'s':''}, but {totalDays} day{totalDays!==1?'s':''} selected. Please remove {totalDays-units} day{totalDays-units!==1?'s':''}.</span>
                      </div>
                    );
                  }
                  if(units!==null&&totalDays===units){
                    return(
                      <div style={{marginTop:8,padding:'8px 12px',background:'rgba(63,185,80,0.1)',border:'1px solid rgba(63,185,80,0.35)',borderRadius:6,fontSize:12,color:'var(--accent3)',display:'flex',alignItems:'center',gap:8}}>
                        <span style={{fontSize:16}}>✅</span>
                        <span>Perfect! {totalDays} day{totalDays!==1?'s':''} = {units} unit{units!==1?'s':''}. {[editing.day,...repeatDays].join(', ')}</span>
                      </div>
                    );
                  }
                  if(units!==null&&totalDays<units){
                    return(
                      <div style={{marginTop:8,padding:'8px 12px',background:'rgba(255,166,87,0.1)',border:'1px solid rgba(255,166,87,0.35)',borderRadius:6,fontSize:12,color:'var(--accent5)',display:'flex',alignItems:'center',gap:8}}>
                        <span style={{fontSize:16}}>ℹ️</span>
                        <span>{totalDays} day{totalDays!==1?'s':''} selected, {units-totalDays} more needed to complete {units}-unit {sub?.name||'subject'}. {repeatDays.length>0?[editing.day,...repeatDays].join(', '):''}</span>
                      </div>
                    );
                  }
                  if(repeatDays.length>0){
                    return <p className="text-muted text-xs mt-8">Will save {totalDays} entries: {[editing.day,...repeatDays].join(', ')}</p>;
                  }
                  return null;
                })()}
              </div>
            </div>
            <div className="modal-footer">
              <button className="btn btn-secondary" onClick={()=>setEditing(null)}>Cancel</button>
              {(()=>{
                const sec=sections.find(s=>s.id===editing.sectionId);
                const secSub=sec&&editing.subjectId?(sec.sectionSubjects||[]).find(x=>x.subjectId===editing.subjectId):null;
                const units=secSub?secSub.units:null;
                const totalDays=1+repeatDays.length;
                const exceeded=units!==null&&totalDays>units;
                return <button className="btn btn-primary" onClick={save} disabled={exceeded} title={exceeded?'Bawasan muna ang selected days para tumugma sa units':'Save schedule'}>Save</button>;
              })()}
            </div>
          </div>
        </div>
      )}

      <ConfirmModal open={!!confirm} title="Delete Schedule" msg="Delete this schedule entry?" onConfirm={()=>{setSchedules(ss=>ss.filter(s=>s.id!==confirm.id));toast('Deleted','success');setConfirm(null);}} onCancel={()=>setConfirm(null)}/>
      <ConfirmModal
        open={clearAllConfirm}
        title="⚠ Clear All Schedules"
        msg={"This will permanently delete ALL "+schedules.length+" schedule entries. This cannot be undone. Are you sure?"}
        onConfirm={()=>{setSchedules([]);toast('All schedules cleared','success');setClearAllConfirm(false);}}
        onCancel={()=>setClearAllConfirm(false)}
      />
    </div>
  );
};

/* ===================== TIMETABLE PAGE ===================== */
const TimetablePage=({schedules,setSchedules,sections,subjects,teachers,rooms,timeSettings,toast,settings})=>{
  const [viewMode,setViewMode]=useState('section');
  const [selected,setSelected]=useState('');
  const [dragging,setDragging]=useState(null);
  const PX_PER_MIN=1.2;
  const slots=useMemo(()=>generateTimeSlots(timeSettings),[timeSettings]);
  const startMin=timeSettings.startHour*60+timeSettings.startMinute;
  const endMin=timeSettings.endHour*60+timeSettings.endMinute;
  const totalMin=endMin-startMin;
  const columnRefs=useRef(DAYS.reduce((acc,d)=>{acc[d]=React.createRef();return acc;},{}));

  const subjectColorMap={};
  subjects.forEach((s,i)=>{subjectColorMap[s.id]=i%10;});

  const columns=viewMode==='section'?sections:viewMode==='teacher'?teachers:rooms;
  const filterSchedules=(col)=>{
    if(viewMode==='section')return schedules.filter(s=>s.sectionId===col.id);
    if(viewMode==='teacher')return schedules.filter(s=>s.teacherId===col.id);
    return schedules.filter(s=>s.roomId===col.id);
  };

  const getBlockStyle=(s)=>{
    const p=parseSlotLabel(s.timeSlot);
    if(!p)return null;
    const top=(p.startMin-startMin)*PX_PER_MIN;
    const height=Math.max(20,(p.endMin-p.startMin)*PX_PER_MIN);
    return{top,height};
  };

  const breakBlocks=timeSettings.breaks&&timeSettings.breaks.length>0
    ?timeSettings.breaks.filter(b=>b.enabled).map(b=>({
        label:b.label,
        top:(b.startHour*60+b.startMinute-startMin)*PX_PER_MIN,
        height:b.durationMinutes*PX_PER_MIN
      }))
    :timeSettings.lunchEnabled
      ?[{label:'Lunch Break',top:(timeSettings.lunchStartHour*60+timeSettings.lunchStartMinute-startMin)*PX_PER_MIN,height:(timeSettings.lunchEndHour*60+timeSettings.lunchEndMinute-(timeSettings.lunchStartHour*60+timeSettings.lunchStartMinute))*PX_PER_MIN}]
      :[];

  const onDrop=(e,day,col)=>{
    e.preventDefault();
    if(!dragging)return;
    const rect=columnRefs.current[day]?.current?.getBoundingClientRect();
    if(!rect)return;
    const relY=e.clientY-rect.top;
    const droppedMin=Math.round(relY/PX_PER_MIN/5)*5+startMin;
    const p=parseSlotLabel(dragging.timeSlot);
    if(!p)return;
    const dur=p.endMin-p.startMin;
    const newStart=Math.max(startMin,Math.min(endMin-dur,droppedMin));
    const newEnd=newStart+dur;
    const newSlot=fmtTime(newStart)+' - '+fmtTime(newEnd);
    for(const s of schedules){
      if(s.id===dragging.id)continue;
      if(s.day!==day)continue;
      const sp=parseSlotLabel(s.timeSlot);
      if(!sp)continue;
      if(!slotsOverlap(newStart,newEnd,sp.startMin,sp.endMin))continue;
      if(s.teacherId===dragging.teacherId){toast('Teacher conflict!','error');setDragging(null);return;}
      if(s.sectionId===dragging.sectionId){toast('Section conflict!','error');setDragging(null);return;}
    }
    setSchedules(ss=>ss.map(s=>s.id===dragging.id?{...s,day,timeSlot:newSlot}:s));
    toast('Schedule moved','success');
    setDragging(null);
  };

  const selected_col=selected?columns.find(c=>c.id===selected):null;
  const displayColumns=selected_col?[selected_col]:columns;

  return(
    <div className="page-content" style={{padding:0}}>
      <div style={{padding:'16px 20px 0',display:'flex',alignItems:'center',justifyContent:'space-between',flexShrink:0}}>
        <div>
          <h2 style={{fontFamily:'Syne',fontSize:18,fontWeight:800}}>Visual Timetable</h2>
          <p className="text-muted text-sm mt-8">Drag blocks to reschedule · Click × to remove</p>
        </div>
        <div className="flex gap-8" style={{alignItems:'center'}}>
          <div className="flex" style={{background:'var(--bg3)',borderRadius:'var(--radius)',border:'1px solid var(--border)',overflow:'hidden'}}>
            {['section','teacher','room'].map(m=>(
              <button key={m} className="btn" style={{borderRadius:0,border:'none',background:viewMode===m?'var(--accent)':'transparent',color:viewMode===m?'#fff':'var(--text2)',padding:'5px 12px',fontSize:12,textTransform:'capitalize'}} onClick={()=>{setViewMode(m);setSelected('');}}>{m==='section'?'🎒':m==='teacher'?'👩‍🏫':'🏫'} {m}</button>
            ))}
          </div>
          <select className="filter-select" value={selected} onChange={e=>setSelected(e.target.value)}>
            <option value="">All</option>
            {columns.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}
          </select>
          <button className="btn btn-secondary" style={{fontSize:12,whiteSpace:'nowrap'}} onClick={()=>{
            const col=selected_col;
            const title=col?col.name:'All';
            const colList=col?[col]:columns;
            const COLORS=['#e8f4fd','#fef9e7','#eafaf1','#fdf2f8','#fff3e0','#f3e5f5','#e0f7fa','#fce4ec','#f9fbe7','#ede7f6'];
            const bkCss='background:#fffde7;border:1px solid #f0c040;border-radius:3px;padding:2px 6px;color:#7a4f00;font-size:9pt;font-weight:600;text-align:center';
            const activeBreaks=(timeSettings.breaks&&timeSettings.breaks.length>0)?timeSettings.breaks.filter(b=>b.enabled):timeSettings.lunchEnabled?[{label:'Lunch Break',startHour:timeSettings.lunchStartHour,startMinute:timeSettings.lunchStartMinute,durationMinutes:(timeSettings.lunchEndHour*60+timeSettings.lunchEndMinute)-(timeSettings.lunchStartHour*60+timeSettings.lunchStartMinute)}]:[];
            const teachSlots=generateTimeSlots(timeSettings);
            // Build timeline rows: all slots + all enabled breaks, sorted by start time
            const timelineRows=[];
            teachSlots.forEach(sl=>timelineRows.push({type:'slot',label:sl.label,startMin:sl.startMin,endMin:sl.endMin}));
            activeBreaks.forEach(b=>{
              const bs=b.startHour*60+b.startMinute;
              timelineRows.push({type:'break',label:b.label,duration:b.durationMinutes,startMin:bs,timeStr:fmtTime(bs)+' - '+fmtTime(bs+b.durationMinutes)});
            });
            timelineRows.sort((a,b)=>(a.startMin)-(b.startMin));
            const subColorMap={};subjects.forEach((s,i)=>{subColorMap[s.id]=i%10;});
            const header='<div style="font-family:Arial,sans-serif;padding:20mm;min-height:297mm;background:#fff;color:#000">'
              +'<div style="text-align:center;margin-bottom:14px">'
              +'<div style="font-size:8pt;color:#555">Republic of the Philippines · Department of Education</div>'
              +'<div style="font-size:14pt;font-weight:700;text-transform:uppercase">'+(settings?settings.schoolName:'School')+'</div>'
              +'<div style="font-size:8pt;color:#555">'+(settings?settings.address:'')+'</div>'
              +'<div style="background:#111;color:#fff;padding:5px 0;font-size:11pt;font-weight:700;letter-spacing:1px;margin:8px 0 4px;text-transform:uppercase">VISUAL TIMETABLE — '+title.toUpperCase()+'</div>'
              +'<div style="font-size:8pt">S.Y. '+(settings?settings.schoolYear:'')+' · '+(settings?settings.semester:'')+'</div>'
              +'</div>';
            const thStyle='background:#333;color:#fff;padding:5px 4px;border:1px solid #555;font-size:7.5pt;text-align:center;white-space:nowrap';
            const thBreakStyle='background:#7a4f00;color:#ffe082;padding:5px 4px;border:1px solid #555;font-size:7.5pt;text-align:center;white-space:nowrap';
            const tableHdr='<table style="width:100%;border-collapse:collapse;font-size:8pt"><thead><tr>'
              +'<th style="'+thStyle+';min-width:90px">'+viewMode.toUpperCase()+'</th>'
              +timelineRows.map(r=>r.type==='break'
                ?'<th style="'+thBreakStyle+'">'+r.label+'<br><span style="font-size:6pt">'+r.timeStr+'</span></th>'
                :'<th style="'+thStyle+'">'+r.label+'</th>'
              ).join('')
              +'</tr></thead><tbody>';
            const tableRows=colList.map(col=>{
              const colScheds=viewMode==='section'?schedules.filter(s=>s.sectionId===col.id):viewMode==='teacher'?schedules.filter(s=>s.teacherId===col.id):schedules.filter(s=>s.roomId===col.id);
              const groupedByDay={};
              DAYS.forEach(d=>{groupedByDay[d]=colScheds.filter(s=>s.day===d);});
              return DAYS.map((day,di)=>{
                const cells=timelineRows.map(r=>{
                  if(r.type==='break')return'<td style="'+bkCss+';border:1px solid #f0c040">☕</td>';
                  const entry=groupedByDay[day].find(s=>s.timeSlot===r.label);
                  if(!entry)return'<td style="border:1px solid #ddd;background:#fafafa;text-align:center;color:#bbb;font-size:7pt">—</td>';
                  const sub=subjects.find(x=>x.id===entry.subjectId);
                  const tch=teachers.find(x=>x.id===entry.teacherId);
                  const rm=rooms.find(x=>x.id===entry.roomId);
                  const bg=COLORS[subColorMap[entry.subjectId]||0];
                  return'<td style="border:1px solid #ccc;background:'+bg+';padding:3px 4px;text-align:center;vertical-align:middle;font-size:7.5pt">'
                    +'<div style="font-weight:700;color:#111">'+(sub?.name||'?')+'</div>'
                    +(viewMode!=='teacher'?'<div style="color:#555;font-size:7pt">'+(tch?.name||'')+'</div>':'')
                    +(viewMode!=='room'?'<div style="color:#777;font-size:6.5pt;font-style:italic">'+(rm?.name||'')+'</div>':'')
                    +'</td>';
                }).join('');
                const isFirst=di===0;
                const rowLabel=isFirst?'<td rowspan="5" style="border:1px solid #ccc;background:#f0f0f0;font-weight:700;font-size:9pt;text-align:center;vertical-align:middle;writing-mode:vertical-lr;transform:rotate(180deg);padding:4px 2px">'+col.name+'</td>':'';
                return'<tr>'+(isFirst?rowLabel:'')+'<td style="border:1px solid #ccc;background:#f5f5f5;font-weight:600;font-size:7.5pt;padding:2px 5px;white-space:nowrap">'+day+'</td>'+cells+'</tr>';
              }).join('');
            }).join('');
            const html=header+tableHdr+tableRows+'</tbody></table></div>';
            const w=window.open('','_blank','width=1100,height=800');
            w.document.write('<!DOCTYPE html><html><head><title>Timetable Print</title><style>*{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important;color-adjust:exact!important}@media print{body{margin:0}td,th{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important}}</style></head><body>'+html+'</body></html>');
            w.document.close();
            setTimeout(()=>w.print(),400);
          }}>🖨 Print Timetable</button>
        </div>
      </div>

      <div className="timetable-wrap" style={{margin:'12px 0 0',padding:'0 0 20px'}}>
        <div style={{display:'grid',gridTemplateColumns:'60px repeat('+DAYS.length+', 1fr)',minWidth:700}}>
          <div className="tt-header" style={{gridColumn:'1',position:'sticky',left:0,zIndex:20,background:'var(--bg3)'}}></div>
          {DAYS.map(d=><div key={d} className="tt-header">{d}</div>)}

          {displayColumns.map(col=>{
            const colScheds=filterSchedules(col);
            return(
              <React.Fragment key={col.id}>
                <div style={{gridColumn:'1',background:'var(--bg2)',borderRight:'1px solid var(--border)',borderBottom:'1px solid var(--border)',padding:'6px 4px',position:'sticky',left:0,zIndex:5,display:'flex',alignItems:'center',justifyContent:'center'}}>
                  <div style={{writingMode:'vertical-rl',textOrientation:'mixed',transform:'rotate(180deg)',fontSize:11,fontWeight:700,color:'var(--text2)',whiteSpace:'nowrap'}}>{col.name}</div>
                </div>
                {DAYS.map(day=>{
                  const dayScheds=colScheds.filter(s=>s.day===day);
                  return(
                    <div key={day} ref={columnRefs.current[day]} className="tt-cell" style={{height:totalMin*PX_PER_MIN,position:'relative'}}
                      onDragOver={e=>e.preventDefault()}
                      onDrop={e=>onDrop(e,day,col)}
                    >
                      {Array.from({length:Math.ceil(totalMin/60)+1},(_,i)=>{
                        const y=i*60*PX_PER_MIN;
                        if(y>totalMin*PX_PER_MIN)return null;
                        return<div key={i} style={{position:'absolute',top:y,left:0,right:0,borderTop:'1px solid rgba(48,54,61,0.5)',pointerEvents:'none',zIndex:1}}></div>;
                      })}
                      {breakBlocks.map((bl,bi)=>(
                        <div key={bi} className="tt-lunch-block" style={{top:bl.top,height:bl.height}}>
                          <span className="tt-lunch-label">{bl.label.toUpperCase()}</span>
                        </div>
                      ))}
                      {dayScheds.map(s=>{
                        const style=getBlockStyle(s);
                        if(!style)return null;
                        const sub=subjects.find(x=>x.id===s.subjectId);
                        const tch=teachers.find(x=>x.id===s.teacherId);
                        const rm=rooms.find(x=>x.id===s.roomId);
                        const colorIdx=subjectColorMap[s.subjectId]||0;
                        return(
                          <div key={s.id} className={'tt-block color-'+colorIdx} style={{top:style.top,height:style.height,zIndex:3}} draggable
                            onDragStart={()=>setDragging(s)}
                            onDragEnd={()=>setDragging(null)}
                          >
                            <div className="tt-block-title">{sub?.name||'?'}</div>
                            {style.height>28&&<div className="tt-block-sub">{tch?.name||''}</div>}
                            {style.height>42&&<div className="tt-block-sub">{rm?.name||''}</div>}
                            <button className="tt-block-remove" onClick={()=>setSchedules(ss=>ss.filter(x=>x.id!==s.id))}>×</button>
                          </div>
                        );
                      })}
                    </div>
                  );
                })}
              </React.Fragment>
            );
          })}
        </div>
      </div>
    </div>
  );
};

/* ===================== AI SCHEDULER PAGE ===================== */
const AISchedulerPage=({schedules,setSchedules,sections,subjects,teachers,rooms,timeSettings,toast})=>{
  const [targetIds,setTargetIds]=useState([]);
  const [clearExisting,setClearExisting]=useState(false);
  const [running,setRunning]=useState(false);
  const [log,setLog]=useState([]);
  const [result,setResult]=useState(null);
  const [mode,setMode]=useState('rule');
  const [apiKey,setApiKey]=useState(()=>{try{return localStorage.getItem('claude_api_key')||'';}catch(e){return '';}});
  const [showKey,setShowKey]=useState(false);
  const [aiStatus,setAiStatus]=useState('');
  const [aiAnalysis,setAiAnalysis]=useState('');
  const logRef=useRef();

  useEffect(()=>{if(logRef.current)logRef.current.scrollTop=logRef.current.scrollHeight;},[log]);

  const toggleTarget=(id)=>setTargetIds(ts=>ts.includes(id)?ts.filter(x=>x!==id):[...ts,id]);
  const saveKey=(k)=>{setApiKey(k);try{localStorage.setItem('claude_api_key',k);}catch(e){}};
  const addLog=(type,msg)=>setLog(l=>[...l,{type,msg}]);

  const runRule=()=>{
    setRunning(true);setLog([]);setResult(null);setAiAnalysis('');
    setTimeout(()=>{
      const res=runAIScheduler(sections,subjects,teachers,rooms,clearExisting?[]:schedules,timeSettings,targetIds);
      setLog(res.log);setResult(res);
      setSchedules(res.schedules);
      toast('Auto Scheduler done: '+res.placed+' scheduled, '+res.skipped+' skipped','success');
      setRunning(false);
    },100);
  };

  const runClaude=async()=>{
    if(!apiKey.trim()){toast('Please add your Claude API key below first','error');return;}
    setRunning(true);setLog([]);setResult(null);setAiAnalysis('');setAiStatus('Sending data to Claude...');
    const targetSecs=targetIds.length>0?sections.filter(s=>targetIds.includes(s.id)):sections;
    const baseSchedules=clearExisting?[]:schedules;
    const slots=generateTimeSlots(timeSettings);
    const ctx={
      sections:targetSecs.map(s=>({id:s.id,name:s.name,gradeLevel:s.gradeLevel,strand:s.strand||''})),
      subjects:subjects.map(s=>({id:s.id,name:s.name,gradeLevel:s.gradeLevel,strand:s.strand||'',hoursPerWeek:s.hoursPerWeek,scheduleDays:s.scheduleDays||DAYS})),
      teachers:teachers.map(t=>({id:t.id,name:t.name,subjects:t.subjects,availability:t.availability||DAYS,maxHoursPerWeek:t.maxHoursPerWeek||30,maxClassesPerDay:t.maxClassesPerDay||6})),
      rooms:rooms.map(r=>({id:r.id,name:r.name,type:r.type})),
      timeSlots:slots.map(s=>s.label),
      days:DAYS
    };
    const prompt=`You are a Philippine K-12 school scheduling assistant for DepEd.
Generate an optimized weekly class schedule using ONLY the provided IDs.

STRICT RULES:
1. Each subject appears ONCE per section per day maximum
2. Spread sessions across different days (e.g. Math 5x/week = Mon,Tue,Wed,Thu,Fri)
3. All sections of the same grade use the SAME time slots for the same subject
4. No teacher double-booking (same teacher, same day, same time slot)
5. No room double-booking (same room, same day, same time slot)
6. No section double-booking (same section, same day, same time slot)
7. Only assign teachers to subjects listed in their subjects array
8. Prefer Laboratory/Computer Lab for Science and Computer subjects
9. Distribute teacher load evenly
10. Respect hoursPerWeek for each subject

SCHOOL DATA:
${JSON.stringify(ctx,null,2)}

Return ONLY valid JSON (no markdown):
{"analysis":"brief explanation","schedules":[{"sectionId":"...","subjectId":"...","teacherId":"...","roomId":"...","day":"Monday","timeSlot":"7:00 AM - 8:00 AM"}]}`;
    try{
      addLog('info','Querying Claude AI...');
      setAiStatus('Claude is thinking...');
      const resp=await fetch('https://api.anthropic.com/v1/messages',{
        method:'POST',
        headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
        body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:8000,messages:[{role:'user',content:prompt}]})
      });
      if(!resp.ok){const err=await resp.json().catch(()=>({}));throw new Error(err.error?.message||'API Error: '+resp.status);}
      setAiStatus('Processing response...');
      const data=await resp.json();
      const rawText=data.content?.map(c=>c.type==='text'?c.text:'').join('').trim();
      let parsed=null;
      try{parsed=JSON.parse(rawText.replace(/```json|```/g,'').trim());}
      catch(e){const match=rawText.match(/\{[\s\S]*\}/);if(match)parsed=JSON.parse(match[0]);else throw new Error('Could not parse Claude response. Please try again.');}
      if(!parsed||!Array.isArray(parsed.schedules))throw new Error('Invalid response format from Claude.');
      const workingList=[...baseSchedules];
      let placed=0,skipped=0;
      const subjDayMap={};
      baseSchedules.forEach(s=>{subjDayMap[s.sectionId+'_'+s.subjectId+'_'+s.day]=true;});
      if(parsed.analysis){setAiAnalysis(parsed.analysis);addLog('info','Claude notes: '+parsed.analysis);}
      for(const s of parsed.schedules){
        const sec=sections.find(x=>x.id===s.sectionId);
        const sub=subjects.find(x=>x.id===s.subjectId);
        const tch=teachers.find(x=>x.id===s.teacherId);
        const rm=rooms.find(x=>x.id===s.roomId);
        if(!sec||!sub||!tch||!rm){skipped++;continue;}
        if(!DAYS.includes(s.day)){skipped++;continue;}
        const k=s.sectionId+'_'+s.subjectId+'_'+s.day;
        if(subjDayMap[k]){skipped++;continue;}
        const p=parseSlotLabel(s.timeSlot);
        if(!p){skipped++;continue;}
        let conflict=false;
        for(const ex of workingList){
          if(ex.day!==s.day)continue;
          const ep=parseSlotLabel(ex.timeSlot);
          if(!ep)continue;
          if(!slotsOverlap(p.startMin,p.endMin,ep.startMin,ep.endMin))continue;
          if(ex.teacherId===s.teacherId||ex.roomId===s.roomId||ex.sectionId===s.sectionId){conflict=true;break;}
        }
        if(conflict){skipped++;continue;}
        const entry={id:uid(),sectionId:s.sectionId,subjectId:s.subjectId,teacherId:s.teacherId,roomId:s.roomId,day:s.day,timeSlot:s.timeSlot};
        workingList.push(entry);
        subjDayMap[k]=true;
        placed++;
        addLog('ok','  + '+sub.name+' -> '+tch.name+' | '+rm.name+' | '+s.day+' '+s.timeSlot);
      }
      const finalConflicts=detectConflicts(workingList.filter(s=>!baseSchedules.find(e=>e.id===s.id)));
      setSchedules(workingList);
      setResult({placed,skipped,conflicts:finalConflicts});
      setAiStatus('');
      toast('Claude AI done: '+placed+' scheduled, '+skipped+' skipped','success');
    }catch(err){
      addLog('err','Error: '+err.message);
      setAiStatus('');
      toast('Error: '+err.message,'error');
    }finally{setRunning(false);}
  };

  const handleRun=()=>mode==='claude'?runClaude():runRule();

  return(
    <div className="page-content">
      <div className="mb-16">
        <h2 style={{fontFamily:'Syne',fontSize:18,fontWeight:800}}>Auto Scheduler</h2>
        <p className="text-muted text-sm mt-8">Automatically generates conflict-free schedules based on your constraints</p>
      </div>

      <div className="card mb-16">
        <div className="card-header"><span className="card-title">Scheduling Engine</span></div>
        <div style={{display:'flex',gap:10}}>
          <div onClick={()=>setMode('rule')} style={{flex:1,padding:'12px 14px',borderRadius:'var(--radius)',border:'2px solid '+(mode==='rule'?'var(--accent)':'var(--border-light)'),background:mode==='rule'?'rgba(255,77,61,0.08)':'var(--bg3)',cursor:'pointer',transition:'all .15s'}}>
            <div style={{fontWeight:700,fontSize:13,color:mode==='rule'?'var(--accent)':'var(--text)',marginBottom:4}}>Rule-Based Engine</div>
            <div style={{fontSize:11,color:'var(--text2)'}}>Fast, local, no API key needed. Uses a built-in algorithm with one-subject-per-day rule and uniform time slots across all sections.</div>
          </div>
          <div onClick={()=>setMode('claude')} style={{flex:1,padding:'12px 14px',borderRadius:'var(--radius)',border:'2px solid '+(mode==='claude'?'rgba(79,158,255,0.6)':'var(--border-light)'),background:mode==='claude'?'rgba(79,158,255,0.07)':'var(--bg3)',cursor:'pointer',transition:'all .15s'}}>
            <div style={{fontWeight:700,fontSize:13,color:mode==='claude'?'var(--accent2)':'var(--text)',marginBottom:4}}>Claude AI Engine</div>
            <div style={{fontSize:11,color:'var(--text2)'}}>Uses Claude AI for smarter scheduling decisions. Requires an Anthropic API key.</div>
          </div>
        </div>
        {mode==='claude'&&(
          <div style={{marginTop:12,padding:'12px',background:'rgba(79,158,255,0.06)',border:'1px solid rgba(79,158,255,0.2)',borderRadius:'var(--radius)'}}>
            <div style={{fontSize:11,fontWeight:700,color:'var(--text2)',textTransform:'uppercase',letterSpacing:'0.6px',marginBottom:6}}>Claude API Key</div>
            <div style={{display:'flex',gap:8,alignItems:'center'}}>
              <input type={showKey?'text':'password'} className="form-input" placeholder="sk-ant-api03-..." value={apiKey} onChange={e=>saveKey(e.target.value)} style={{flex:1,fontFamily:'monospace',fontSize:12}}/>
              <button className="btn btn-secondary btn-sm" onClick={()=>setShowKey(v=>!v)}>{showKey?'Hide':'Show'}</button>
            </div>
            <div style={{fontSize:10,color:'var(--text3)',marginTop:6}}>Get your API key at <a href="https://console.anthropic.com" target="_blank" style={{color:'var(--accent2)'}}>console.anthropic.com</a>. Saved locally in your browser.</div>
          </div>
        )}
      </div>

      <div className="grid-2" style={{gap:16,marginBottom:16}}>
        <div className="card">
          <div className="card-header"><span className="card-title">Target Sections</span></div>
          <p className="text-muted text-xs mb-8">Leave all unchecked to schedule ALL sections.</p>
          <div className="check-list">
            {sections.map(sec=>(
              <label key={sec.id} className="check-item" style={{cursor:'pointer'}}>
                <input type="checkbox" checked={targetIds.includes(sec.id)} onChange={()=>toggleTarget(sec.id)}/>
                <span>{sec.name}</span>
                <span className="tag tag-blue" style={{marginLeft:'auto'}}>{sec.gradeLevel}</span>
              </label>
            ))}
            {sections.length===0&&<p className="text-muted text-xs">No sections found. Please add sections first.</p>}
          </div>
        </div>

        <div className="card">
          <div className="card-header"><span className="card-title">Options</span></div>
          <label className="check-item" style={{cursor:'pointer',marginBottom:12}}>
            <input type="checkbox" checked={clearExisting} onChange={e=>setClearExisting(e.target.checked)}/>
            <div>
              <div style={{fontWeight:600}}>Clear existing schedules before running</div>
              <div className="text-muted text-xs">Removes all current schedule entries for the targeted sections</div>
            </div>
          </label>
          <div style={{padding:'10px',background:'rgba(34,209,96,0.06)',border:'1px solid rgba(34,209,96,0.18)',borderRadius:'var(--radius)',fontSize:12,color:'var(--text2)',marginBottom:12}}>
            Smart rules: 1 subject = max 1 session per day per section · Spread across different days · Uniform time slots across all sections · No double-booking
          </div>
          <button className="btn btn-primary" style={{width:'100%',background:mode==='claude'?'linear-gradient(135deg,#4f9eff,#1a6fc4)':'',boxShadow:mode==='claude'?'0 4px 14px rgba(79,158,255,0.3)':''}} onClick={handleRun} disabled={running}>
            {running?(
              <span style={{display:'flex',alignItems:'center',gap:8,justifyContent:'center'}}>
                <span style={{display:'inline-block',width:14,height:14,border:'2px solid rgba(255,255,255,0.3)',borderTopColor:'#fff',borderRadius:'50%',animation:'spin 0.7s linear infinite'}}></span>
                {mode==='claude'?'Claude is thinking...':'Running...'}
              </span>
            ):(mode==='claude'?'Run Claude AI Scheduler':'Run Auto Scheduler')}
          </button>
          {running&&aiStatus&&(
            <div style={{marginTop:10,fontSize:12,color:'var(--accent2)',textAlign:'center',padding:'8px',background:'rgba(79,158,255,0.07)',borderRadius:'var(--radius)',border:'1px solid rgba(79,158,255,0.2)'}}>
              {aiStatus}
            </div>
          )}
          {result&&(
            <div style={{marginTop:12,display:'flex',gap:8}}>
              <div style={{flex:1,background:'rgba(63,185,80,0.1)',border:'1px solid rgba(63,185,80,0.3)',borderRadius:'var(--radius)',padding:'8px',textAlign:'center'}}>
                <div style={{fontSize:20,fontWeight:800,color:'var(--accent3)'}}>{result.placed}</div>
                <div style={{fontSize:11,color:'var(--text2)'}}>Scheduled</div>
              </div>
              <div style={{flex:1,background:'rgba(255,166,87,0.1)',border:'1px solid rgba(255,166,87,0.3)',borderRadius:'var(--radius)',padding:'8px',textAlign:'center'}}>
                <div style={{fontSize:20,fontWeight:800,color:'var(--accent5)'}}>{result.skipped}</div>
                <div style={{fontSize:11,color:'var(--text2)'}}>Skipped</div>
              </div>
              <div style={{flex:1,background:'rgba(248,81,73,0.1)',border:'1px solid rgba(248,81,73,0.3)',borderRadius:'var(--radius)',padding:'8px',textAlign:'center'}}>
                <div style={{fontSize:20,fontWeight:800,color:'var(--danger)'}}>{result.conflicts?.length||0}</div>
                <div style={{fontSize:11,color:'var(--text2)'}}>Conflicts</div>
              </div>
            </div>
          )}
          {aiAnalysis&&(
            <div style={{marginTop:12,padding:'10px 12px',background:'rgba(79,158,255,0.07)',border:'1px solid rgba(79,158,255,0.2)',borderRadius:'var(--radius)',fontSize:12,color:'var(--text2)',lineHeight:1.5}}>
              <span style={{color:'var(--accent2)',fontWeight:700}}>Claude Notes: </span>{aiAnalysis}
            </div>
          )}
        </div>
      </div>

      {log.length>0&&(
        <div className="card">
          <div className="card-header">
            <span className="card-title">Execution Log</span>
            <span style={{fontSize:11,color:'var(--text3)'}}>{log.length} entries</span>
          </div>
          <div className="ai-log" ref={logRef}>
            {log.map((l,i)=>(
              <div key={i} className={'log-'+l.type}>{l.msg}</div>
            ))}
          </div>
        </div>
      )}
      <style>{`@keyframes spin{to{transform:rotate(360deg)}}`}</style>
    </div>
  );
};

const PrintPreviewModal=({open,onClose,content,title})=>{
  if(!open)return null;
  const doPrint=()=>{
    const w=window.open('','_blank');
    const printHtml='<html><head><title>'+title+'</title><style>'
      +'*{box-sizing:border-box;margin:0;padding:0;-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important;color-adjust:exact!important}'
      +'@page{size:A4 landscape;margin:8mm 10mm}'
      +'body{background:#fff;font-family:Arial,sans-serif;font-size:9pt;-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important}'
      +'@media print{body{margin:0}-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important;thead{display:table-header-group}tr{page-break-inside:avoid}td,th{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important}}'
      +'</style></head><body>'+content+'</body></html>';
    w.document.write(printHtml);
    w.document.close();
    w.focus();
    setTimeout(()=>{w.print();},300);
  };
  return(
    <div className="print-preview-overlay">
      <div className="print-preview-header">
        <div style={{fontFamily:'Syne',fontSize:15,fontWeight:700}}>🖨 Print Preview: {title}</div>
        <div className="flex gap-8">
          <button className="btn btn-primary btn-sm" onClick={doPrint}>🖨 Print (Landscape)</button>
          <button className="btn btn-secondary btn-sm" onClick={onClose}>✕ Close</button>
        </div>
      </div>
      <div className="print-preview-body">
        <div dangerouslySetInnerHTML={{__html:content}} style={{background:'#fff',width:'100%',maxWidth:1100,margin:'0 auto',boxShadow:'0 0 40px rgba(0,0,0,0.5)'}}/>
      </div>
    </div>
  );
};

/* ===================== SUBSTITUTION PAGE ===================== */
const SubstitutionPage=({schedules,sections,subjects,teachers,rooms,timeSettings,settings,signatories,toast})=>{
  const [absentTeacherId,setAbsentTeacherId]=useState('');
  const [dateInput,setDateInput]=useState(()=>new Date().toISOString().slice(0,10));
  const [teacherClasses,setTeacherClasses]=useState([]); // classes of teacher on selected date
  const [selectedClassIds,setSelectedClassIds]=useState(new Set()); // which classes are absent
  const [results,setResults]=useState(null);
  const [saved,setSaved]=useState(()=>{
    try{const r=localStorage.getItem('ph_substitutions');return r?JSON.parse(r):[];}catch{return[];}
  });
  const [viewMode,setViewMode]=useState('find');

  const DAYS_MAP={0:'Sunday',1:'Monday',2:'Tuesday',3:'Wednesday',4:'Thursday',5:'Friday',6:'Saturday'};
  const WEEKDAYS=['Monday','Tuesday','Wednesday','Thursday','Friday'];

  const getDayOfWeek=(dateStr)=>{const d=new Date(dateStr+'T00:00:00');return DAYS_MAP[d.getDay()];};
  const formatDate=(dateStr)=>{const d=new Date(dateStr+'T00:00:00');return d.toLocaleDateString('en-PH',{month:'short',day:'numeric',year:'numeric'});};
  const fmt12=(t)=>{if(!t)return'';const[h,m]=t.split(':').map(Number);const ampm=h>=12?'PM':'AM';const hh=h%12||12;return hh+':'+(m<10?'0':'')+m+' '+ampm;};

  // When teacher or date changes, load their classes for that day
  const loadTeacherClasses=(tchId,date)=>{
    setResults(null);
    setSelectedClassIds(new Set());
    if(!tchId||!date)return setTeacherClasses([]);
    const day=getDayOfWeek(date);
    if(!WEEKDAYS.includes(day))return setTeacherClasses([]);
    const cls=schedules
      .filter(s=>s.teacherId===tchId&&s.day===day)
      .sort((a,b)=>{const pa=parseSlotLabel(a.timeSlot),pb=parseSlotLabel(b.timeSlot);return(pa?.startMin||0)-(pb?.startMin||0);});
    setTeacherClasses(cls);
  };

  const handleTeacherChange=(tchId)=>{
    setAbsentTeacherId(tchId);
    loadTeacherClasses(tchId,dateInput);
  };

  const handleDateChange=(date)=>{
    setDateInput(date);
    loadTeacherClasses(absentTeacherId,date);
  };

  const toggleClass=(clsId)=>{
    setSelectedClassIds(prev=>{
      const next=new Set(prev);
      next.has(clsId)?next.delete(clsId):next.add(clsId);
      return next;
    });
    setResults(null);
  };

  const selectAll=()=>{setSelectedClassIds(new Set(teacherClasses.map(c=>c.id)));setResults(null);};
  const clearAll=()=>{setSelectedClassIds(new Set());setResults(null);};

  const findSubstitutes=()=>{
    if(!absentTeacherId){toast('Select an absent teacher','error');return;}
    if(!dateInput){toast('Select a date','error');return;}
    if(selectedClassIds.size===0){toast('Select at least one class to substitute','error');return;}

    const dayOfWeek=getDayOfWeek(dateInput);
    const selectedClasses=teacherClasses.filter(c=>selectedClassIds.has(c.id));

    const substitutes=selectedClasses.map(cls=>{
      const section=sections.find(s=>s.id===cls.sectionId);
      const subject=subjects.find(s=>s.id===cls.subjectId);
      const room=rooms.find(r=>r.id===cls.roomId);

      const busyTeacherIds=new Set(
        schedules.filter(s=>s.day===dayOfWeek&&s.timeSlot===cls.timeSlot&&s.teacherId!==absentTeacherId).map(s=>s.teacherId)
      );
      const alreadyAssignedSubIds=new Set(
        saved.filter(s=>s.date===dateInput&&s.timeSlot===cls.timeSlot&&s.sectionId===cls.sectionId&&s.absentTeacherId===absentTeacherId).map(s=>s.substituteTeacherId)
      );

      const availableTeachers=teachers
        .filter(t=>t.id!==absentTeacherId&&!busyTeacherIds.has(t.id)&&!alreadyAssignedSubIds.has(t.id))
        .map(t=>({...t,canTeachSubject:t.subjects.includes(cls.subjectId)}))
        .sort((a,b)=>{
          if(a.canTeachSubject&&!b.canTeachSubject)return -1;
          if(!a.canTeachSubject&&b.canTeachSubject)return 1;
          return a.name.localeCompare(b.name);
        });

      return{cls,section,subject,room,availableTeachers};
    });

    setResults({dayOfWeek,date:dateInput,substitutes});
  };

  const saveSubstitution=(cls,subTeacher,subjectObj,sectionObj,roomObj)=>{
    const dayOfWeek=getDayOfWeek(dateInput);
    const entry={
      id:uid(),date:dateInput,dayOfWeek,
      absentTeacherId,absentTeacherName:teachers.find(t=>t.id===absentTeacherId)?.name||'',
      substituteTeacherId:subTeacher.id,substituteTeacherName:subTeacher.name,
      timeSlot:cls.timeSlot,
      sectionId:cls.sectionId,sectionName:sectionObj?.name||'',
      subjectId:cls.subjectId,subjectName:subjectObj?.name||'',
      roomId:cls.roomId,roomName:roomObj?.name||'',
      savedAt:new Date().toISOString(),
    };
    const updated=[entry,...saved];
    setSaved(updated);
    try{localStorage.setItem('ph_substitutions',JSON.stringify(updated));}catch(e){}
    // refresh available list
    setResults(prev=>{
      if(!prev)return prev;
      return{...prev,substitutes:prev.substitutes.map(s=>{
        if(s.cls.id!==cls.id)return s;
        return{...s,availableTeachers:s.availableTeachers.filter(t=>t.id!==subTeacher.id)};
      })};
    });
    toast('✅ '+subTeacher.name+' assigned for '+cls.timeSlot,'success');
  };

  const getAssignedEntries=(cls)=>saved.filter(s=>
    s.date===dateInput&&s.timeSlot===cls.timeSlot&&s.sectionId===cls.sectionId&&s.absentTeacherId===absentTeacherId
  );

  const deleteLog=(id)=>{
    const updated=saved.filter(s=>s.id!==id);
    setSaved(updated);
    try{localStorage.setItem('ph_substitutions',JSON.stringify(updated));}catch(e){}
    toast('Record deleted','success');
  };

  const printSubstitutionForm=(records)=>{
    if(!records||records.length===0){toast('No records to print','error');return;}
    const renderLogoHtml=(imgData,fallbackText)=>{
      if(imgData)return '<img src="'+imgData+'" style="width:55px;height:55px;object-fit:contain;display:block;">';
      return '<div style="font-size:32px;width:55px;text-align:center;line-height:55px">'+fallbackText+'</div>';
    };
    const leftLogo=renderLogoHtml(settings.logoLeftImg,settings.logoLeft||'🏫');
    const rightLogo=renderLogoHtml(settings.logoRightImg,settings.logoRight||'🇵🇭');
    const header=
      '<div style="padding:5mm 8mm 3mm;font-family:Arial,sans-serif;background:#fff;color:#000">'+'<div style="display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:3px">'+'<div style="flex-shrink:0">'+leftLogo+'</div>'+'<div style="text-align:center">'+'<div style="font-size:7pt;color:#555">Republic of the Philippines &nbsp;|&nbsp; Department of Education</div>'+'<div style="font-size:13pt;font-weight:700;text-transform:uppercase;line-height:1.2">'+settings.schoolName+'</div>'+'<div style="font-size:7.5pt;color:#555">'+settings.address+'</div>'+'<div style="font-size:7.5pt;color:#555;margin-top:1px">'+settings.semester+'</div>'+'</div>'+'<div style="flex-shrink:0">'+rightLogo+'</div>'+'</div>'+'<div style="background:#1a1a2e;color:#fff;text-align:center;padding:5px 8px;font-size:11pt;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin:4px 0 2px">TEACHER SUBSTITUTION FORM</div>'+'<div style="text-align:center;font-size:8pt;margin-bottom:6px">S.Y. '+settings.schoolYear+'</div>'+'</div>';
    const grouped={};
    records.forEach(r=>{
      const key=r.absentTeacherName+'|'+r.date;
      if(!grouped[key])grouped[key]={absentTeacher:r.absentTeacherName,date:r.date,dayOfWeek:r.dayOfWeek,entries:[]};
      grouped[key].entries.push(r);
    });
    // Sort entries within each group by time slot
    Object.values(grouped).forEach(g=>{
      g.entries.sort((a,b)=>{
        const pa=parseSlotLabel(a.timeSlot),pb=parseSlotLabel(b.timeSlot);
        return (pa?pa.startMin:0)-(pb?pb.startMin:0);
      });
    });
    // Sort groups by date then teacher name
    const sortedGroups=Object.values(grouped).sort((a,b)=>a.date.localeCompare(b.date)||a.absentTeacher.localeCompare(b.absentTeacher));
    const now=new Date();
    const dateStr=now.toLocaleDateString('en-PH',{year:'numeric',month:'long',day:'numeric'});
    let body='<div style="padding:0 8mm 5mm;font-family:Arial,sans-serif;font-size:9pt">';
    sortedGroups.forEach((group,gi)=>{
      if(gi>0)body+='<div style="border-top:2px dashed #ccc;margin:14px 0"></div>';
      body+='<table style="width:100%;border-collapse:collapse;margin-bottom:6px;font-size:8.5pt">'+'<tr>'+'<td style="padding:4px 8px;border:1px solid #000;width:14%;font-weight:700;background:#f5f5f5">Absent Teacher:</td>'+'<td style="padding:4px 8px;border:1px solid #000;width:36%;font-weight:700">'+group.absentTeacher+'</td>'+'<td style="padding:4px 8px;border:1px solid #000;width:10%;font-weight:700;background:#f5f5f5">Date:</td>'+'<td style="padding:4px 8px;border:1px solid #000;width:40%">'+group.date+' ('+group.dayOfWeek+')</td>'+'</tr></table>';
      body+='<table style="width:100%;border-collapse:collapse;font-size:8pt;margin-bottom:8px">'+'<thead><tr>'+'<th style="background:#1a1a2e;color:#fff;padding:5px 8px;border:1px solid #000;text-align:left">#</th>'+'<th style="background:#1a1a2e;color:#fff;padding:5px 8px;border:1px solid #000;text-align:left">Time Slot</th>'+'<th style="background:#1a1a2e;color:#fff;padding:5px 8px;border:1px solid #000;text-align:left">Subject</th>'+'<th style="background:#1a1a2e;color:#fff;padding:5px 8px;border:1px solid #000;text-align:left">Section</th>'+'<th style="background:#1a1a2e;color:#fff;padding:5px 8px;border:1px solid #000;text-align:left">Room</th>'+'<th style="background:#1a1a2e;color:#fff;padding:5px 8px;border:1px solid #000;text-align:left">Substitute Teacher</th>'+'<th style="background:#1a1a2e;color:#fff;padding:5px 8px;border:1px solid #000;text-align:center;width:80px">Signature</th>'+'</tr></thead><tbody>';
      group.entries.forEach((r,i)=>{
        body+='<tr style="background:'+(i%2===0?'#fff':'#fafafa')+'">'+'<td style="padding:6px 8px;border:1px solid #000;text-align:center;font-weight:700">'+(i+1)+'</td>'+'<td style="padding:6px 8px;border:1px solid #000;font-weight:700;white-space:nowrap">'+r.timeSlot+'</td>'+'<td style="padding:6px 8px;border:1px solid #000">'+r.subjectName+'</td>'+'<td style="padding:6px 8px;border:1px solid #000">'+r.sectionName+'</td>'+'<td style="padding:6px 8px;border:1px solid #000">'+r.roomName+'</td>'+'<td style="padding:6px 8px;border:1px solid #000;font-weight:700;color:#1a4e8a">'+r.substituteTeacherName+'</td>'+'<td style="padding:6px 8px;border:1px solid #000;height:28px"></td></tr>';
      });
      body+='</tbody></table>';
      body+='<table style="width:100%;border-collapse:collapse;font-size:8pt;margin-bottom:6px">'+'<tr><td style="padding:5px 8px;border:1px solid #000;width:15%;font-weight:700;background:#f5f5f5">Remarks:</td>'+'<td style="padding:5px 8px;border:1px solid #000;height:36px"></td></tr></table>';
    });
    const sigHtml=[...signatories].sort((a,b)=>a.order-b.order).map(s=>(
      '<div style="text-align:left;min-width:140px">'+(s.title?'<div style="font-size:8pt;color:#666;margin-bottom:4px">'+s.title+'</div>':'')+'<div style="border-top:1.5px solid #333;padding-top:5px;margin-top:25px;font-weight:700;font-size:9.5pt">'+s.name+'</div>'+'<div style="font-size:8.5pt;color:#444">'+s.position+'</div></div>'
    )).join('');
    body+='<div style="display:flex;justify-content:space-around;margin-top:16px;padding:0 4mm">'+sigHtml+'</div>';
    body+='<div style="font-size:7pt;color:#999;text-align:right;margin-top:6px">Date Prepared: '+dateStr+'</div></div>';
    const w=window.open('','_blank');
    w.document.write('<html><head><title>Substitution Form</title><style>'+'*{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important;box-sizing:border-box;margin:0;padding:0}'+'@page{size:A4 portrait;margin:6mm}body{background:#fff;font-family:Arial,sans-serif;font-size:9pt}'+'@media print{body{margin:0}thead{display:table-header-group}tr{page-break-inside:avoid}}'+'</style></head><body>'+header+body+'</body></html>');
    w.document.close();w.focus();setTimeout(()=>w.print(),350);
  };

  const absentTeacher=teachers.find(t=>t.id===absentTeacherId);
  const dayOfWeek=dateInput?getDayOfWeek(dateInput):'';
  const isWeekend=dateInput&&!WEEKDAYS.includes(dayOfWeek);

  return(
    <div className="page-content">
      <div className="flex items-center justify-between mb-16">
        <div>
          <h2 style={{fontFamily:'Syne',fontSize:18,fontWeight:800}}>🔄 Substitution Finder</h2>
          <p className="text-muted text-sm mt-8">Select a teacher and date — their classes will appear for you to choose which ones need a substitute</p>
        </div>
        <div style={{display:'flex',gap:8}}>
          <button className={'btn '+(viewMode==='find'?'btn-primary':'btn-secondary')} onClick={()=>setViewMode('find')}>🔍 Find Substitute</button>
          <button className={'btn '+(viewMode==='log'?'btn-primary':'btn-secondary')} onClick={()=>setViewMode('log')}>
            📋 Log {saved.length>0&&<span style={{background:'rgba(255,255,255,0.25)',borderRadius:10,padding:'1px 7px',fontSize:11,marginLeft:4}}>{saved.length}</span>}
          </button>
        </div>
      </div>

      {viewMode==='find'&&(
        <>
          <div className="card" style={{marginBottom:16}}>
            <div style={{padding:'4px 0 12px',fontFamily:'Syne',fontSize:13,fontWeight:700,color:'var(--text)',borderBottom:'1px solid var(--border)',marginBottom:14}}>
              📋 Absence Details
            </div>

            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14,marginBottom:16}}>
              <div className="form-group" style={{margin:0}}>
                <label className="form-label">Absent Teacher *</label>
                <select className="form-select" value={absentTeacherId} onChange={e=>handleTeacherChange(e.target.value)}>
                  <option value="">— Select Teacher —</option>
                  {teachers.map(t=><option key={t.id} value={t.id}>{t.name}</option>)}
                </select>
              </div>
              <div className="form-group" style={{margin:0}}>
                <label className="form-label">Date of Absence *</label>
                <input type="date" className="form-input" value={dateInput} onChange={e=>handleDateChange(e.target.value)}/>
                {dateInput&&(
                  <span style={{fontSize:11,marginTop:3,display:'block',fontWeight:600,color:isWeekend?'var(--danger)':'var(--accent2)'}}>
                    {dayOfWeek}{isWeekend?' — Weekend, no classes':''}
                  </span>
                )}
              </div>
            </div>

            {/* Teacher's classes for that day */}
            {absentTeacherId&&dateInput&&!isWeekend&&(
              teacherClasses.length===0?(
                <div style={{textAlign:'center',padding:'16px 0',color:'var(--text3)',fontSize:12,background:'var(--bg3)',borderRadius:7,border:'1px solid var(--border)'}}>
                  📭 {absentTeacher?.name} has no classes on {dayOfWeek}
                </div>
              ):(
                <div>
                  <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:8}}>
                    <div style={{fontSize:11,fontWeight:700,color:'var(--text3)',letterSpacing:'0.5px'}}>
                      SELECT ABSENT CLASS(ES) — {dayOfWeek} &nbsp;·&nbsp; {teacherClasses.length} class(es)
                    </div>
                    <div style={{display:'flex',gap:6}}>
                      <button className="btn btn-secondary btn-xs" onClick={selectAll}>Select All</button>
                      <button className="btn btn-secondary btn-xs" onClick={clearAll}>Clear</button>
                    </div>
                  </div>
                  <div style={{display:'flex',flexDirection:'column',gap:6}}>
                    {teacherClasses.map(cls=>{
                      const sec=sections.find(s=>s.id===cls.sectionId);
                      const sub=subjects.find(s=>s.id===cls.subjectId);
                      const rm=rooms.find(r=>r.id===cls.roomId);
                      const selected=selectedClassIds.has(cls.id);
                      return(
                        <div key={cls.id}
                          onClick={()=>toggleClass(cls.id)}
                          style={{display:'flex',alignItems:'center',gap:12,padding:'10px 14px',borderRadius:8,border:'2px solid '+(selected?'var(--accent2)':'var(--border)'),background:selected?'rgba(88,166,255,0.08)':'var(--bg3)',cursor:'pointer',transition:'all .15s'}}
                        >

};

  const buildTeacherReport=(tchId)=>{
