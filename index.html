    const activeBreaks=(timeSettings.breaks&&timeSettings.breaks.length>0)
      ?timeSettings.breaks.filter(b=>b.enabled)
      :timeSettings.lunchEnabled?[{label:'Lunch Break',startHour:timeSettings.lunchStartHour,startMinute:timeSettings.lunchStartMinute,durationMinutes:(timeSettings.lunchEndHour*60+timeSettings.lunchEndMinute)-(timeSettings.lunchStartHour*60+timeSettings.lunchStartMinute)}]:[];

    // Build timeline columns: all used slots + ALL enabled breaks, sorted by time
    const allDaySlots=generateTimeSlots(timeSettings);
    const usedSlotLabels=new Set(tchSchedules.map(s=>s.timeSlot));
    const relevantSlots=allDaySlots.filter(sl=>usedSlotLabels.has(sl.label));
    const timelineCols=[];
    relevantSlots.forEach(sl=>timelineCols.push({type:'slot',label:sl.label,startMin:sl.startMin,endMin:sl.endMin}));
    activeBreaks.forEach(b=>{
      const bs=b.startHour*60+b.startMinute;
      const be=bs+b.durationMinutes;
      timelineCols.push({type:'break',label:b.label,duration:b.durationMinutes,breakStart:bs,timeStr:fmtTime(bs)+' – '+fmtTime(be)});
    });
    timelineCols.sort((a,b)=>(a.startMin!==undefined?a.startMin:a.breakStart)-(b.startMin!==undefined?b.startMin:b.breakStart));

    // Styles
    const thDay='background:#1a1a2e;color:#fff;padding:6px 8px;border:1px solid #333;text-align:center;font-size:8pt;font-weight:700;white-space:nowrap;min-width:58px;width:58px';
    const thSlot='background:#1a2e4a;color:#fff;padding:5px 5px;border:1px solid #000;text-align:center;font-size:7pt;white-space:normal;word-break:break-word;min-width:80px';
    const thBreak='background:#4a3500;color:#ffe082;padding:5px 5px;border:1px solid #000;text-align:center;font-size:7pt;white-space:normal;word-break:break-word;min-width:60px';
    const tdDay='padding:6px 6px;border:1px solid #000;font-weight:700;font-size:8.5pt;background:#eef2f7;white-space:nowrap;vertical-align:middle;text-align:center;width:58px';
    const tdFree='padding:4px;border:1px solid #000;text-align:center;background:#fafafa;color:#ccc;font-size:7pt;vertical-align:middle';
    const tdBreak='padding:5px 4px;border:1px solid #000;text-align:center;background:#fffbe6;color:#7a4f00;font-size:7pt;font-weight:700;vertical-align:middle';
    const tdClass='padding:4px 5px;border:1px solid #000;text-align:center;vertical-align:middle;font-size:7.5pt;background:#fff';

    const headerRow='<tr>'
      +'<th style="'+thDay+'">DAY</th>'
      +timelineCols.map(col=>col.type==='break'
        ?'<th style="'+thBreak+'">'+col.label+'<br/><span style="font-size:6pt;font-weight:400;opacity:0.85">'+col.timeStr+'</span></th>'
        :'<th style="'+thSlot+'">'+col.label+'</th>'
      ).join('')
      +'</tr>';

    const bodyRows=DAYS.map((day,di)=>{
      const rowBg=di%2===0?'':'background:#f7f9fc';
      const cells=timelineCols.map(col=>{
        if(col.type==='break')return'<td style="'+tdBreak+'">⏸ '+col.label+'<br/><span style="font-size:6pt;font-weight:400">'+col.duration+'min</span></td>';
        const entry=tchSchedules.find(s=>s.day===day&&s.timeSlot===col.label);
        if(!entry)return'<td style="'+tdFree+(di%2!==0?';background:#f7f9fc':'')+'">—</td>';
        const sub=subjects.find(x=>x.id===entry.subjectId);
        const sec=sections.find(x=>x.id===entry.sectionId);
        const rm=rooms.find(x=>x.id===entry.roomId);
        return'<td style="'+tdClass+(di%2!==0?'background:#f4f7fc;':'')+'">'
          +'<div style="font-weight:700;color:#111;font-size:8pt;line-height:1.3">'+(sub?.name||'?')+'</div>'
          +'<div style="color:#1a4e8a;font-size:7.5pt;font-weight:600;margin-top:1px">'+(sec?.name||'')+'</div>'
          +'<div style="color:#777;font-size:6.5pt;font-style:italic;margin-top:1px">'+(rm?.name||'')+'</div>'
          +'</td>';
      }).join('');
      return'<tr><td style="'+tdDay+'">'+day+'</td>'+cells+'</tr>';
    }).join('');

    // Teaching load summary row below the table
    const sectionIds=[...new Set(tchSchedules.map(s=>s.sectionId))];
    const sectionCount=sectionIds.length;
    const subjectIds=[...new Set(tchSchedules.map(s=>s.subjectId))];
    const subjectNames=[...new Set(subjectIds.map(id=>subjects.find(x=>x.id===id)?.name).filter(Boolean))];

    // Determine load status
    const isUnderload=totalHrs<(maxHrs*0.6);
    const isNearLimit=!overloaded&&pct>=80;
    const loadBgColor=overloaded?'#7a0000':isUnderload?'#003a7a':isNearLimit?'#7a4f00':'#1a5c2a';
    const loadBadgeColor=overloaded?'#ff6b6b':isUnderload?'#60b4ff':isNearLimit?'#ffe082':'#6ee7a0';
    const loadStatusText=overloaded?'OVERLOADED':isUnderload?'UNDERLOADED':isNearLimit?'NEAR LIMIT':'NORMAL LOAD';
    const loadStatusIcon=overloaded?'&#9888;':isUnderload?'&#8600;':isNearLimit?'&#9889;':'&#10003;';
    const loadStatusRemark=overloaded
      ?'Exceeds maximum by '+(totalHrs-maxHrs).toFixed(1)+' hrs/wk'
      :isUnderload
      ?'Below 60% of required load ('+totalHrs.toFixed(1)+' / '+maxHrs+' hrs)'
      :isNearLimit
      ?'Within 20% of maximum load'
      :'Load is within acceptable range';
    const barPct=Math.min(100,pct);
    const barColor=overloaded?'#ff4444':isUnderload?'#4499ff':isNearLimit?'#ffbb33':'#33cc66';

    const summaryBar=
      '<div style="display:flex;gap:0;margin-bottom:6px;border:1px solid #000;border-radius:5px;overflow:hidden;font-size:8pt">'
      +'<div style="flex:1;padding:3px 8px;background:#1a1a2e;color:#fff;text-align:center">'
      +'<div style="font-size:9pt;font-weight:900;line-height:1">'+sectionCount+'</div><div style="font-size:6pt;text-transform:uppercase;letter-spacing:0.5px;opacity:0.8">Sections</div>'
      +'</div>'
      +'<div style="flex:1;padding:3px 8px;background:#162440;color:#fff;text-align:center">'
      +'<div style="font-size:9pt;font-weight:900;line-height:1">'+tchSchedules.length+'</div><div style="font-size:6pt;text-transform:uppercase;letter-spacing:0.5px;opacity:0.8">Classes/Wk</div>'
      +'</div>'
      +'<div style="flex:1;padding:3px 8px;background:#1a3a28;color:#fff;text-align:center">'
      +'<div style="font-size:9pt;font-weight:900;line-height:1">'+teachingHrsTotal.toFixed(1)+'h</div><div style="font-size:6pt;text-transform:uppercase;letter-spacing:0.5px;opacity:0.8">Teaching Hrs</div>'
      +'</div>'
      +'<div style="flex:1;padding:3px 8px;background:#3a2800;color:#fff;text-align:center">'
      +'<div style="font-size:9pt;font-weight:900;line-height:1">'+respHrsTotal+'h</div><div style="font-size:6pt;text-transform:uppercase;letter-spacing:0.5px;opacity:0.8">Non-Teaching</div>'
      +'</div>'
      +'<div style="flex:1;padding:3px 8px;background:#2a1a40;color:#fff;text-align:center">'
      +'<div style="font-size:9pt;font-weight:900;line-height:1">'+totalHrs.toFixed(1)+'h</div><div style="font-size:6pt;text-transform:uppercase;letter-spacing:0.5px;opacity:0.8">Total Load</div>'
      +'</div>'
      +'<div style="flex:1.4;padding:3px 8px;background:'+loadBgColor+';color:#fff;text-align:center">'
      +'<div style="font-size:8pt;font-weight:900;line-height:1.2;color:'+loadBadgeColor+'">'+loadStatusIcon+' '+loadStatusText+'</div>'
      +'<div style="font-size:6.5pt;opacity:0.85;margin-top:2px">'+pct+'% of '+maxHrs+' hrs/wk</div>'
      +'</div>'
      +'</div>'
      +'<div style="margin-bottom:3px;background:#e8e8e8;border-radius:3px;overflow:hidden;height:5px;border:1px solid #000">'
      +'<div style="width:'+barPct+'%;height:100%;background:'+barColor+'"></div>'
      +'</div>'
      +'<div style="display:flex;gap:4px;margin-bottom:6px;font-size:7pt">'
      +'<div style="flex:1;padding:3px 8px;background:#f0f4fa;border:1px solid #000;border-radius:4px">'
      +'&#128218; <strong>Teaching:</strong> '+teachingHrsTotal.toFixed(1)+' hrs/wk ('+tchSchedules.length+' session'+(tchSchedules.length!==1?'s':'')+')'
      +(respHrsTotal>0?' &nbsp;+&nbsp; &#9881; <strong>Non-Teaching:</strong> '+respHrsTotal+' hrs/wk':'')
      +'</div>'
      +'<div style="padding:3px 8px;background:'+(overloaded?'#fff0f0':isUnderload?'#f0f4ff':'#f0fff4')+';border:1.5px solid '+(overloaded?'#ffaaaa':isUnderload?'#aaccff':'#aaeebb')+';border-radius:4px;font-weight:700;color:'+barColor+'">'
      +loadStatusIcon+' '+loadStatusRemark
      +'</div>'
      +'</div>';

    // Teacher name bar
    // Combined teacher + subjects row
    const adviserBar='<div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px;border-bottom:1px solid #ddd;padding-bottom:6px">'
      +'<div style="font-size:10pt"><strong>Teacher:</strong> <strong style="text-transform:uppercase;font-size:11pt">'+tch.name+'</strong>'+(tch.specialization?' &nbsp;<em style="color:#666;font-size:9pt">'+tch.specialization+'</em>':'')+' '+(tch.email?'<span style="color:#888;font-size:8.5pt">'+tch.email+'</span>':'')+'</div>'
      +(subjectNames.length>0?'<div style="font-size:9pt;color:#555;text-align:right"><strong>Subjects:</strong> '+subjectNames.join(' &middot; ')+'</div>':'')
      +'</div>';
    const subjectLegend='';

    // Responsibilities table — shown after timetable grid
    // Auto-detect adviser section & room from sections data
    const adviserSection=sections.find(s=>s.adviser===tchId);
    let respSection='';
    const respList=tch.responsibilities||[];
    if(respList.length>0){
      const respRows=respList.map((r,ri)=>{
        // If this role is Class Adviser, pull section name & room from sections data
        const isAdviser=r.label==='Class Adviser'||r.label.toLowerCase().includes('adviser')||r.label.toLowerCase().includes('advisor');
        const dispSection=isAdviser&&adviserSection?adviserSection.name:(r.section||'—');
        // Try to get room from the section's schedules (most common room used)
        let dispRoom=r.room||'—';
        if(isAdviser&&adviserSection&&(!r.room||r.room.trim()==='')&&dispRoom==='—'){
          const secScheds=schedules.filter(s=>s.sectionId===adviserSection.id);
          if(secScheds.length>0){
            const roomCount={};
            secScheds.forEach(s=>{if(s.roomId){roomCount[s.roomId]=(roomCount[s.roomId]||0)+1;}});
            const topRoomId=Object.entries(roomCount).sort((a,b)=>b[1]-a[1])[0]?.[0];
            const topRoom=rooms.find(rm=>rm.id===topRoomId);
            if(topRoom)dispRoom=topRoom.name;
          }
        }
        return('<tr style="'+(ri%2===0?'background:#fff':'background:#fffdf0')+'">'
        +'<td style="padding:6px 10px;border:1px solid #000;font-weight:600;font-size:8.5pt;color:#333">'+r.label+'</td>'
        +'<td style="padding:6px 10px;border:1px solid #000;font-size:8pt;color:#555;text-align:center">'+dispSection+'</td>'
        +'<td style="padding:6px 10px;border:1px solid #000;font-size:8pt;color:#555;text-align:center">'+dispRoom+'</td>'
        +'<td style="padding:6px 10px;border:1px solid #000;font-size:8pt;text-align:center;font-weight:700;color:#7a4f00">'+r.hoursPerWeek+' hr'+(r.hoursPerWeek!==1?'s':'')+'/wk</td>'
        +'<td style="padding:6px 10px;border:1px solid #000;font-size:8pt;color:#888;text-align:center;font-style:italic">Non-teaching duty</td>'
        +'</tr>'
        );
      }).join('');
      respSection='<div style="margin-top:10px;margin-bottom:6px">'
        +'<div style="background:#4a3500;color:#ffe082;padding:6px 10px;font-size:8.5pt;font-weight:700;letter-spacing:0.3px;border-radius:4px 4px 0 0;display:flex;align-items:center;justify-content:space-between">'
        +'<span>⚙ Additional Roles &amp; Responsibilities</span>'
        +'<span style="font-size:7.5pt;opacity:0.85">'+respHrsTotal+' hr'+(respHrsTotal!==1?'s':'')+'/wk — included in total load computation</span>'
        +'</div>'
        +'<table style="width:100%;border-collapse:collapse;font-size:8.5pt">'
        +'<thead><tr>'
        +'<th style="background:#5a4500;color:#ffe082;padding:5px 10px;border:1px solid #000;text-align:left;font-size:7.5pt">Responsibility / Role</th>'
        +'<th style="background:#5a4500;color:#ffe082;padding:5px 10px;border:1px solid #000;text-align:center;font-size:7.5pt">Section</th>'
        +'<th style="background:#5a4500;color:#ffe082;padding:5px 10px;border:1px solid #000;text-align:center;font-size:7.5pt">Room</th>'
        +'<th style="background:#5a4500;color:#ffe082;padding:5px 10px;border:1px solid #000;text-align:center;font-size:7.5pt">Hours/Week</th>'
        +'<th style="background:#5a4500;color:#ffe082;padding:5px 10px;border:1px solid #000;text-align:center;font-size:7.5pt">Remarks</th>'
        +'</tr></thead>'
        +'<tbody>'+respRows+'</tbody>'
        +'</table>'
        // Load breakdown totals row
        +'<table style="width:100%;border-collapse:collapse;margin-top:6px;font-size:8pt">'
        +'<tr>'
        +'<td style="padding:5px 10px;border:1px solid #000;background:#f0f4fa;width:50%"><strong>Teaching Load:</strong> <span style="color:#1a4e8a">'+teachingHrsTotal.toFixed(1)+' hrs/week</span> ('+tchSchedules.length+' class session'+(tchSchedules.length!==1?'s':'')+')</td>'
        +'<td style="padding:5px 10px;border:1px solid #000;background:#f0f4fa;width:25%"><strong>Non-Teaching Load:</strong> <span style="color:#7a4f00">'+respHrsTotal+' hrs/week</span></td>'
        +'<td style="padding:5px 10px;border:1px solid #000;background:'+(overloaded?'#fff0f0':'#f0fff4')+';width:25%;font-weight:700"><strong>Total Load:</strong> <span style="color:'+statusColor+'">'+totalHrs.toFixed(1)+' / '+maxHrs+' hrs</span> <span style="font-size:7.5pt;color:'+statusColor+'">'+statusLabel+'</span></td>'
        +'</tr>'
        +'</table>'
        +'</div>';
    } else {
      // No responsibilities — still show load breakdown
      respSection='<div style="margin-top:6px;margin-bottom:6px">'
        +'<table style="width:100%;border-collapse:collapse;font-size:8pt">'
        +'<tr>'
        +'<td style="padding:5px 10px;border:1px solid #000;background:#f0f4fa;width:50%"><strong>Teaching Load:</strong> <span style="color:#1a4e8a">'+teachingHrsTotal.toFixed(1)+' hrs/week</span> ('+tchSchedules.length+' class session'+(tchSchedules.length!==1?'s':'')+')</td>'
        +'<td style="padding:5px 10px;border:1px solid #000;background:#f0f4fa;width:25%"><strong>Additional Duties:</strong> <span style="color:#888">None</span></td>'
        +'<td style="padding:5px 10px;border:1px solid #000;background:'+(overloaded?'#fff0f0':'#f0fff4')+';width:25%;font-weight:700"><strong>Total Load:</strong> <span style="color:'+statusColor+'">'+totalHrs.toFixed(1)+' / '+maxHrs+' hrs</span> <span style="font-size:7.5pt;color:'+statusColor+'">'+statusLabel+'</span></td>'
        +'</tr>'
        +'</table>'
        +'</div>';
    }

    const now=new Date();
    const dateStr=now.toLocaleDateString('en-PH',{year:'numeric',month:'long',day:'numeric'});

    return buildHeader('Teacher Class Program — '+tch.name)
      +adviserBar
      +subjectLegend
      +summaryBar
      +'<div style="overflow-x:auto;margin-bottom:4px">'
      +'<table style="width:100%;border-collapse:collapse;table-layout:auto;font-size:7.5pt">'
      +'<thead>'+headerRow+'</thead>'
      +'<tbody>'+bodyRows+'</tbody>'
      +'</table>'
      +'</div>'
      +respSection
      +'<div style="font-size:7pt;color:#999;margin-top:4px;text-align:right">Date Prepared: '+dateStr+'</div>'
      +buildFooter(signatories);
  };

  const buildLoadReport=()=>{
    const rows=teachers.map(t=>{
      const tchS=schedules.filter(s=>s.teacherId===t.id);
      const teachHrs=tchS.reduce((acc,s)=>{const p=parseSlotLabel(s.timeSlot);return acc+(p?(p.endMin-p.startMin)/60:0);},0);
      const rHrs=(t.responsibilities||[]).reduce((a,r)=>a+r.hoursPerWeek,0);
      const hrs=teachHrs+rHrs;
      const pct=Math.min(100,Math.round(hrs/t.maxHoursPerWeek*100));
      const subjNames=[...new Set(tchS.map(s=>subjects.find(x=>x.id===s.subjectId)?.name).filter(Boolean))].join(', ');
      return '<tr><td style="padding:5px 8px;border:1px solid #000;font-weight:700">'+t.name+'</td><td style="padding:5px 8px;border:1px solid #000">'+tchS.length+'</td><td style="padding:5px 8px;border:1px solid #000">'+hrs.toFixed(1)+'h / '+t.maxHoursPerWeek+'h</td><td style="padding:5px 8px;border:1px solid #000">'+pct+'%</td><td style="padding:5px 8px;border:1px solid #000;font-size:9pt">'+subjNames+'</td></tr>';
    }).join('');
    return buildHeader('Teacher Load Report')+'<table style="width:100%;border-collapse:collapse;font-size:9pt"><thead><tr><th style="background:#333;color:#fff;padding:6px 8px;border:1px solid #000">Teacher</th><th style="background:#333;color:#fff;padding:6px 8px;border:1px solid #000">Classes</th><th style="background:#333;color:#fff;padding:6px 8px;border:1px solid #000">Hours</th><th style="background:#333;color:#fff;padding:6px 8px;border:1px solid #000">Load %</th><th style="background:#333;color:#fff;padding:6px 8px;border:1px solid #000">Subjects</th></tr></thead><tbody>'+rows+'</tbody></table>'+buildFooter(signatories);
  };

  const buildRoomReport=()=>{
    const rows=rooms.map(r=>{
      const rmS=schedules.filter(s=>s.roomId===r.id);
      const dayUsage=DAYS.map(d=>rmS.filter(s=>s.day===d).length).join(' / ');
      return '<tr><td style="padding:5px 8px;border:1px solid #000;font-weight:700">'+r.name+'</td><td style="padding:5px 8px;border:1px solid #000">'+r.type+'</td><td style="padding:5px 8px;border:1px solid #000">'+r.capacity+'</td><td style="padding:5px 8px;border:1px solid #000">'+rmS.length+'</td><td style="padding:5px 8px;border:1px solid #000;font-size:9pt">'+dayUsage+'</td></tr>';
    }).join('');
    return buildHeader('Room Usage Report')+'<table style="width:100%;border-collapse:collapse;font-size:9pt"><thead><tr><th style="background:#333;color:#fff;padding:6px 8px;border:1px solid #000">Room</th><th style="background:#333;color:#fff;padding:6px 8px;border:1px solid #000">Type</th><th style="background:#333;color:#fff;padding:6px 8px;border:1px solid #000">Capacity</th><th style="background:#333;color:#fff;padding:6px 8px;border:1px solid #000">Total Sessions</th><th style="background:#333;color:#fff;padding:6px 8px;border:1px solid #000">Mon/Tue/Wed/Thu/Fri</th></tr></thead><tbody>'+rows+'</tbody></table>'+buildFooter(signatories);
  };

  const openPreview=()=>{
    let html='',ttl='';
    if(reportType==='section'){html=buildSectionReport(selectedId);ttl='Section Schedule';}
    else if(reportType==='teacher'){html=buildTeacherReport(selectedId);ttl='Teacher Schedule';}
    else if(reportType==='teacher_section'){html=buildTeacherSectionReport(selectedId);ttl='Teacher Teaching Load per Section';}
    else if(reportType==='load'){html=buildLoadReport();ttl='Teacher Load Report';}
    else{html=buildRoomReport();ttl='Room Usage Report';}
    if(!html){toast('Please select a valid target','error');return;}
    setPrintContent(html);setPrintTitle(ttl);setPrintOpen(true);
  };

  const exportCSV=()=>{
    let rows=[['Section','Subject','Teacher','Room','Day','Time Slot']];
    schedules.forEach(s=>{
      const sec=sections.find(x=>x.id===s.sectionId);
      const sub=subjects.find(x=>x.id===s.subjectId);
      const tch=teachers.find(x=>x.id===s.teacherId);
      const rm=rooms.find(x=>x.id===s.roomId);
      rows.push([sec?.name||'',sub?.name||'',tch?.name||'',rm?.name||'',s.day,s.timeSlot]);
    });
    const csv=rows.map(r=>r.map(c=>'"'+c+'"').join(',')).join('\n');
    const a=document.createElement('a');
    a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);
    a.download='schedules.csv';a.click();
    toast('CSV exported','success');
  };

  return(
    <div className="page-content">
      <div className="flex items-center justify-between mb-16">
        <div>
          <h2 style={{fontFamily:'Syne',fontSize:18,fontWeight:800}}>Reports</h2>
          <p className="text-muted text-sm mt-8">DepEd-style printable reports</p>
        </div>
        <div className="flex gap-8">
          <button className="btn btn-info btn-sm" onClick={exportCSV}>📥 Export CSV</button>
          <button className="btn btn-primary btn-sm" onClick={openPreview}>🖨 Print Preview</button>
        </div>
      </div>

      <div className="card mb-16">
        <div className="card-header"><span className="card-title">Report Configuration</span></div>
        <div className="grid-2">
          <div className="form-group"><label className="form-label">Report Type</label>
            <select className="form-select" value={reportType} onChange={e=>setReportType(e.target.value)}>
              <option value="section">Section Weekly Schedule</option>
              <option value="teacher">Teacher Weekly Schedule</option>
              <option value="teacher_section">Teacher Class Program (Timetable)</option>
              <option value="load">Teacher Load Report</option>
              <option value="room">Room Usage Report</option>
            </select>
          </div>
          {(reportType==='section'||reportType==='teacher'||reportType==='teacher_section')&&(
            <div className="form-group"><label className="form-label">{reportType==='section'?'Section':'Teacher'}</label>
              <select className="form-select" value={selectedId} onChange={e=>setSelectedId(e.target.value)}>
                <option value="">— Select —</option>
                {(reportType==='section'?sections:teachers).map(x=><option key={x.id} value={x.id}>{x.name}</option>)}
              </select>
            </div>
          )}
        </div>
      </div>

      <div className="card" style={{padding:0,overflow:'hidden'}}>
        <div style={{padding:'12px 16px',borderBottom:'1px solid var(--border)',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
          <span className="card-title">Preview</span>
          <span className="text-muted text-xs">Click "Print Preview" to open full-screen printable view</span>
        </div>
        <div style={{background:'#555',padding:20}}>
          {(reportType==='section'?selectedId:reportType==='teacher'?selectedId:reportType==='teacher_section'?selectedId:true)?
            <div dangerouslySetInnerHTML={{__html:
              reportType==='section'?buildSectionReport(selectedId):
              reportType==='teacher'?buildTeacherReport(selectedId):
              reportType==='teacher_section'?buildTeacherSectionReport(selectedId):
              reportType==='load'?buildLoadReport():buildRoomReport()
            }} style={{maxWidth:800,margin:'0 auto'}}/>
            :<div style={{textAlign:'center',padding:40,color:'#aaa'}}>Select a section or teacher to preview</div>
          }
        </div>
      </div>

      <PrintPreviewModal open={printOpen} onClose={()=>setPrintOpen(false)} content={printContent} title={printTitle}/>
    </div>
  );
};

/* ===================== TEACHER MONITORING PAGE ===================== */
const TeacherMonitoringPage=({schedules,teachers,subjects,sections,timeSettings,setPage})=>{
  const getLoad=(t)=>{
    const teachHrs=schedules.filter(s=>s.teacherId===t.id).reduce((acc,s)=>{
      const p=parseSlotLabel(s.timeSlot);return acc+(p?(p.endMin-p.startMin)/60:0);
    },0);
    const rHrs=(t.responsibilities||[]).reduce((a,r)=>a+r.hoursPerWeek,0);
    const hrs=teachHrs+rHrs;
    const max=t.maxHoursPerWeek||30;
    const pct=Math.min(100,Math.round(hrs/max*100));
    const status=hrs>=max?'overloaded':pct>=80?'near':'ok';
    return{hrs,teachHrs,rHrs,max,pct,status};
  };
  const getDayLoad=(t)=>{
    const dl={};
    DAYS.forEach(d=>{
      const hrs=schedules.filter(s=>s.teacherId===t.id&&s.day===d).reduce((acc,s)=>{
        const p=parseSlotLabel(s.timeSlot);return acc+(p?(p.endMin-p.startMin)/60:0);
      },0);
      dl[d]=hrs;
    });
    return dl;
  };
  const getSubjectsTaught=(t)=>{
    const subIds=[...new Set(schedules.filter(s=>s.teacherId===t.id).map(s=>s.subjectId))];
    return subIds.map(id=>subjects.find(s=>s.id===id)).filter(Boolean);
  };
  const getSectionsTaught=(t)=>{
    const secIds=[...new Set(schedules.filter(s=>s.teacherId===t.id).map(s=>s.sectionId))];
    return secIds.map(id=>sections.find(s=>s.id===id)).filter(Boolean);
  };

  const overloaded=teachers.filter(t=>getLoad(t).status==='overloaded');
  const near=teachers.filter(t=>getLoad(t).status==='near');
  const ok=teachers.filter(t=>getLoad(t).status==='ok');

  const StatusBadge=({status})=>{
    const cfg={overloaded:{bg:'rgba(248,81,73,0.15)',color:'var(--danger)',border:'rgba(248,81,73,0.4)',label:'⚠ OVERLOADED'},
      near:{bg:'rgba(255,166,87,0.15)',color:'var(--accent5)',border:'rgba(255,166,87,0.4)',label:'⚡ NEAR LIMIT'},
      ok:{bg:'rgba(63,185,80,0.12)',color:'var(--accent3)',border:'rgba(63,185,80,0.35)',label:'✓ OK'}};
    const c=cfg[status];
    return<span style={{padding:'2px 8px',borderRadius:10,fontSize:10,fontWeight:700,background:c.bg,color:c.color,border:'1px solid '+c.border}}>{c.label}</span>;
  };

  const TeacherCard=({t})=>{
    const ld=getLoad(t);
    const dl=getDayLoad(t);
    const subs=getSubjectsTaught(t);
    const secs=getSectionsTaught(t);
    const barColor=ld.status==='overloaded'?'var(--danger)':ld.status==='near'?'var(--accent5)':'var(--accent3)';
    return(
      <div style={{background:'var(--bg2)',border:'1px solid '+(ld.status==='overloaded'?'rgba(248,81,73,0.4)':ld.status==='near'?'rgba(255,166,87,0.3)':'var(--border)'),borderRadius:'var(--radius-lg)',padding:16,marginBottom:12}}>
        <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',marginBottom:12}}>
          <div>
            <div style={{fontWeight:800,fontFamily:'Syne',fontSize:15}}>{t.name}</div>
            <div style={{fontSize:11,color:'var(--text3)',marginTop:2}}>{t.email}</div>
          </div>
          <StatusBadge status={ld.status}/>
        </div>
        <div style={{marginBottom:12}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:4}}>
            <span style={{fontSize:11,color:'var(--text2)'}}>Weekly Teaching Load</span>
            <span style={{fontSize:12,fontWeight:700,color:barColor}}>{ld.hrs.toFixed(1)}h / {ld.max}h ({ld.pct}%)</span>
          </div>
          <div style={{background:'var(--bg4)',borderRadius:6,height:10,overflow:'hidden'}}>
            <div style={{width:ld.pct+'%',height:10,background:barColor,borderRadius:6,transition:'width 0.3s'}}></div>
          </div>
        </div>
        <div style={{display:'flex',gap:6,marginBottom:12}}>
          {DAYS.map(d=>(
            <div key={d} style={{flex:1,background:'var(--bg3)',borderRadius:'var(--radius)',padding:'6px 4px',textAlign:'center'}}>
              <div style={{fontSize:9,color:'var(--text3)',fontWeight:700,marginBottom:3}}>{d.slice(0,3).toUpperCase()}</div>
              <div style={{fontSize:13,fontWeight:700,color:dl[d]>0?'var(--accent2)':'var(--text3)'}}>{dl[d]>0?dl[d].toFixed(1)+'h':'—'}</div>
            </div>
          ))}
        </div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
          <div>
            <div style={{fontSize:10,color:'var(--text3)',fontWeight:700,marginBottom:4,textTransform:'uppercase',letterSpacing:0.5}}>Subjects Taught</div>
            {subs.length>0
              ?subs.map(s=><span key={s.id} style={{display:'inline-block',fontSize:10,padding:'1px 6px',background:'rgba(88,166,255,0.1)',border:'1px solid rgba(88,166,255,0.25)',color:'var(--accent2)',borderRadius:10,marginRight:4,marginBottom:3}}>{s.name}</span>)
              :<span style={{fontSize:11,color:'var(--text3)'}}>None scheduled</span>}
          </div>
          <div>
            <div style={{fontSize:10,color:'var(--text3)',fontWeight:700,marginBottom:4,textTransform:'uppercase',letterSpacing:0.5}}>Sections Handled</div>
            {secs.length>0
              ?secs.map(s=><span key={s.id} style={{display:'inline-block',fontSize:10,padding:'1px 6px',background:'rgba(210,168,255,0.1)',border:'1px solid rgba(210,168,255,0.25)',color:'var(--accent4)',borderRadius:10,marginRight:4,marginBottom:3}}>{s.name}</span>)
              :<span style={{fontSize:11,color:'var(--text3)'}}>None scheduled</span>}
          </div>
        </div>
        {ld.status==='overloaded'&&(
          <div style={{marginTop:10,padding:'7px 10px',background:'rgba(248,81,73,0.08)',border:'1px solid rgba(248,81,73,0.25)',borderRadius:6,fontSize:11,color:'var(--danger)'}}>
            ⚠ This teacher is over their maximum load by <strong>{(ld.hrs-ld.max).toFixed(1)}h</strong>.
            <button className="btn btn-xs btn-secondary" style={{marginLeft:8,fontSize:10}} onClick={()=>setPage('teachers')}>→ Edit in Teachers</button>
          </div>
        )}
      </div>
    );
  };

  return(
    <div className="page-content">
      <div className="flex items-center justify-between mb-16">
        <div>
          <h2 style={{fontFamily:'Syne',fontSize:18,fontWeight:800}}>Teacher Load Monitoring</h2>
          <p className="text-muted text-sm mt-8">Track teaching hours, spot overloads, and manage capacity</p>
        </div>
        <div style={{display:'flex',gap:10}}>
          {[{label:'Overloaded',count:overloaded.length,color:'var(--danger)',bg:'rgba(248,81,73,0.1)'},
            {label:'Near Limit',count:near.length,color:'var(--accent5)',bg:'rgba(255,166,87,0.1)'},
            {label:'OK',count:ok.length,color:'var(--accent3)',bg:'rgba(63,185,80,0.1)'}
          ].map(s=>(
            <div key={s.label} style={{padding:'6px 14px',background:s.bg,borderRadius:'var(--radius)',border:'1px solid',borderColor:s.color+'55',textAlign:'center'}}>
              <div style={{fontSize:18,fontWeight:800,color:s.color}}>{s.count}</div>
              <div style={{fontSize:10,color:'var(--text3)',fontWeight:700}}>{s.label}</div>
            </div>
          ))}
        </div>
      </div>

      {overloaded.length>0&&(
        <div style={{background:'rgba(248,81,73,0.08)',border:'1px solid rgba(248,81,73,0.35)',borderRadius:'var(--radius-lg)',padding:'10px 16px',marginBottom:16,display:'flex',alignItems:'center',gap:10}}>
          <span style={{fontSize:20}}>⚠</span>
          <div>
            <div style={{fontWeight:700,color:'var(--danger)',fontSize:13}}>{overloaded.length} teacher{overloaded.length>1?'s are':' is'} overloaded</div>
            <div style={{fontSize:11,color:'var(--text2)'}}>These teachers are hidden from the Add Schedule dropdown. Increase their max hours in the Teachers page to re-enable them.</div>
          </div>
        </div>
      )}

      {overloaded.length>0&&(<div style={{marginBottom:8}}><div style={{fontSize:11,fontWeight:700,color:'var(--danger)',textTransform:'uppercase',letterSpacing:0.8,marginBottom:8}}>⚠ Overloaded ({overloaded.length})</div>{overloaded.map(t=><TeacherCard key={t.id} t={t}/>)}</div>)}
      {near.length>0&&(<div style={{marginBottom:8}}><div style={{fontSize:11,fontWeight:700,color:'var(--accent5)',textTransform:'uppercase',letterSpacing:0.8,marginBottom:8}}>⚡ Near Limit — 80%+ ({near.length})</div>{near.map(t=><TeacherCard key={t.id} t={t}/>)}</div>)}
      {ok.length>0&&(<div><div style={{fontSize:11,fontWeight:700,color:'var(--accent3)',textTransform:'uppercase',letterSpacing:0.8,marginBottom:8}}>✓ Within Limit ({ok.length})</div>{ok.map(t=><TeacherCard key={t.id} t={t}/>)}</div>)}
    </div>
  );
};

/* ===================== TIME SETTINGS PAGE ===================== */
const TimeSettingsPage=({timeSettings,setTimeSettings,toast})=>{
  const initLocal=()=>({
    ...timeSettings,
    breaks:timeSettings.breaks&&timeSettings.breaks.length>0?timeSettings.breaks:[
      {id:'b1',label:'Lunch Break',startHour:12,startMinute:0,durationMinutes:60,enabled:true}
    ]
  });
  const [local,setLocal]=useState(initLocal);
  const slots=useMemo(()=>generateTimeSlots(local),[local]);

  const toTimeStr=(h,m)=>(h<10?'0':'')+h+':'+(m<10?'0':'')+m;
  const fromTimeStr=(s)=>{const[h,m]=s.split(':');return{h:+h,m:+m};};

  const QUICK_DURATIONS=[15,20,30,45,60,90];
  const BREAK_ICONS={'Lunch Break':'🍱','Morning Break':'☕','Afternoon Break':'🫖','Recess':'🏃'};
  const getIcon=(label)=>BREAK_ICONS[label]||'⏸';

  const save=()=>{
    if(local.startHour*60+local.startMinute>=local.endHour*60+local.endMinute){
      toast('End time must be after start time','error');return;
    }
    const mainBreak=local.breaks.find(b=>b.enabled);
    const updated={...local,
      lunchEnabled:local.breaks.some(b=>b.enabled),
      lunchStartHour:mainBreak?mainBreak.startHour:12,
      lunchStartMinute:mainBreak?mainBreak.startMinute:0,
      lunchEndHour:mainBreak?mainBreak.startHour+Math.floor((mainBreak.startMinute+mainBreak.durationMinutes)/60):13,
      lunchEndMinute:mainBreak?(mainBreak.startMinute+mainBreak.durationMinutes)%60:0,
    };
    setTimeSettings(updated);
    toast('Time settings saved','success');
  };

  const updateBreak=(id,field,val)=>{
    setLocal(v=>({...v,breaks:v.breaks.map(b=>b.id===id?{...b,[field]:val}:b)}));
  };

  const addBreak=()=>{
    const newB={id:'b'+Date.now(),label:'Break',startHour:10,startMinute:0,durationMinutes:30,enabled:true};
    setLocal(v=>({...v,breaks:[...v.breaks,newB]}));
  };

  const removeBreak=(id)=>{
    setLocal(v=>({...v,breaks:v.breaks.filter(b=>b.id!==id)}));
  };

  const totalBreakMin=local.breaks.filter(b=>b.enabled).reduce((a,b)=>a+b.durationMinutes,0);
  const schoolDayMin=local.endHour*60+local.endMinute-(local.startHour*60+local.startMinute);
  const teachingMin=schoolDayMin-totalBreakMin;

  return(
    <div className="page-content">
      <div className="flex items-center justify-between mb-16">
        <div>
          <h2 style={{fontFamily:'Syne',fontSize:18,fontWeight:800}}>Time Settings</h2>
          <p className="text-muted text-sm mt-8">Configure school hours, period duration, and break times</p>
        </div>
        <button className="btn btn-primary" onClick={save}>💾 Save Settings</button>
      </div>

      <div style={{display:'flex',gap:10,marginBottom:16,flexWrap:'wrap'}}>
        {[
          {label:'School Day',val:fmtTime(local.startHour*60+local.startMinute)+' – '+fmtTime(local.endHour*60+local.endMinute),color:'var(--accent2)'},
          {label:'Total Hours',val:Math.floor(schoolDayMin/60)+'h '+(schoolDayMin%60)+'m',color:'var(--accent3)'},
          {label:'Break Time',val:totalBreakMin+'m',color:'var(--accent5)'},
          {label:'Teaching Time',val:Math.floor(teachingMin/60)+'h '+(teachingMin%60)+'m',color:'var(--accent4)'},
          {label:'Slots/Day',val:slots.length,color:'var(--accent)'},
        ].map(s=>(
          <div key={s.label} style={{background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:'var(--radius-lg)',padding:'10px 16px',flex:1,minWidth:120}}>
            <div style={{fontSize:10,color:'var(--text3)',textTransform:'uppercase',letterSpacing:0.8,fontWeight:700,marginBottom:4}}>{s.label}</div>
            <div style={{fontSize:18,fontWeight:800,fontFamily:'Syne',color:s.color}}>{s.val}</div>
          </div>
        ))}
      </div>

      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16,marginBottom:16}}>
        <div className="card">
          <div className="card-header"><span className="card-title">🏫 School Day Hours</span></div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:14}}>
            <div className="form-group">
              <label className="form-label">Start Time</label>
              <input type="time" className="form-input"
                value={toTimeStr(local.startHour,local.startMinute)}
                onChange={e=>{const{h,m}=fromTimeStr(e.target.value);setLocal(v=>({...v,startHour:h,startMinute:m}));}}
                style={{fontSize:16,fontWeight:700,letterSpacing:1}}
              />
            </div>
            <div className="form-group">
              <label className="form-label">End Time</label>
              <input type="time" className="form-input"
                value={toTimeStr(local.endHour,local.endMinute)}
                onChange={e=>{const{h,m}=fromTimeStr(e.target.value);setLocal(v=>({...v,endHour:h,endMinute:m}));}}
                style={{fontSize:16,fontWeight:700,letterSpacing:1}}
              />
            </div>
          </div>
          <div className="form-group">
            <label className="form-label">Period Duration</label>
            <div style={{display:'flex',gap:6,flexWrap:'wrap',marginBottom:8}}>
              {QUICK_DURATIONS.map(d=>(
                <button key={d}
                  className={'btn btn-sm '+(local.defaultSlotMinutes===d?'btn-primary':'btn-secondary')}
                  onClick={()=>setLocal(v=>({...v,defaultSlotMinutes:d}))}
                  style={{minWidth:52,fontWeight:700}}
                >{d} min</button>
              ))}
            </div>
            <div style={{display:'flex',alignItems:'center',gap:8}}>
              <input type="number" className="form-input" value={local.defaultSlotMinutes}
                onChange={e=>setLocal(v=>({...v,defaultSlotMinutes:Math.max(10,Math.min(180,+e.target.value))}))}
                min={10} max={180} style={{width:90,fontWeight:700,fontSize:15}}
              />
              <span className="text-muted text-sm">minutes per period</span>
            </div>
          </div>
        </div>

        <div className="card">
          <div className="card-header">
            <span className="card-title">⏸ Break Times</span>
            <button className="btn btn-success btn-xs" onClick={addBreak}>+ Add Break</button>
          </div>
          {local.breaks.length===0&&(
            <div style={{textAlign:'center',padding:'20px 0',color:'var(--text3)',fontSize:13}}>
              No breaks configured. Click "+ Add Break" to add one.
            </div>
          )}
          {local.breaks.map((brk)=>{
            const endMin=(brk.startHour*60+brk.startMinute+brk.durationMinutes);
            const endH=Math.floor(endMin/60);
            const endM=endMin%60;
            return(
              <div key={brk.id} style={{
                background:brk.enabled?'rgba(255,166,87,0.07)':'var(--bg3)',
                border:'1px solid '+(brk.enabled?'rgba(255,166,87,0.3)':'var(--border)'),
                borderRadius:'var(--radius)',padding:12,marginBottom:10
              }}>
                <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:10}}>
                  <span style={{fontSize:18}}>{getIcon(brk.label)}</span>
                  <input className="form-input" value={brk.label} onChange={e=>updateBreak(brk.id,'label',e.target.value)} style={{flex:1,fontWeight:700,fontSize:13}} placeholder="Break name"/>
                  <label style={{display:'flex',alignItems:'center',gap:4,cursor:'pointer',fontSize:12,color:'var(--text2)',whiteSpace:'nowrap'}}>
                    <input type="checkbox" checked={brk.enabled} onChange={e=>updateBreak(brk.id,'enabled',e.target.checked)} style={{accentColor:'var(--accent5)'}}/> Enable
                  </label>
                  <button className="btn btn-danger btn-xs" onClick={()=>removeBreak(brk.id)}>✕</button>
                </div>
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:8}}>
                  <div>
                    <div style={{fontSize:10,color:'var(--text3)',textTransform:'uppercase',letterSpacing:0.5,marginBottom:4,fontWeight:600}}>Start Time</div>
                    <input type="time" className="form-input"
                      value={toTimeStr(brk.startHour,brk.startMinute)}
                      onChange={e=>{const{h,m}=fromTimeStr(e.target.value);updateBreak(brk.id,'startHour',h);updateBreak(brk.id,'startMinute',m);}}
                      style={{fontWeight:700,fontSize:14}}
                    />
                  </div>
                  <div>
                    <div style={{fontSize:10,color:'var(--text3)',textTransform:'uppercase',letterSpacing:0.5,marginBottom:4,fontWeight:600}}>Duration</div>
                    <div style={{display:'flex',gap:4,flexWrap:'wrap'}}>
                      {[15,20,30,45,60].map(d=>(
                        <button key={d} className={'btn btn-xs '+(brk.durationMinutes===d?'btn-warn':'btn-secondary')} onClick={()=>updateBreak(brk.id,'durationMinutes',d)} style={{fontWeight:700}}>{d}m</button>
                      ))}
                    </div>
                    <input type="number" className="form-input" value={brk.durationMinutes}
                      onChange={e=>updateBreak(brk.id,'durationMinutes',Math.max(5,Math.min(120,+e.target.value)))}
                      min={5} max={120} style={{marginTop:6,width:80,fontWeight:700}}
                    />
                  </div>
                </div>
                {brk.enabled&&(
                  <div style={{fontSize:11,color:'var(--accent5)',fontWeight:600,background:'rgba(255,166,87,0.1)',padding:'3px 8px',borderRadius:4,display:'inline-block'}}>
                    {getIcon(brk.label)} {fmtTime(brk.startHour*60+brk.startMinute)} – {fmtTime(endH*60+endM)} ({brk.durationMinutes} min)
                  </div>
                )}
              </div>
            );
          })}
        </div>
      </div>

      <div className="card">
        <div className="card-header">
          <span className="card-title">📋 Time Slot Preview</span>
          <div style={{display:'flex',gap:8,alignItems:'center'}}>
            <span className="tag tag-blue">{slots.length} teaching slots</span>
            <span className="tag tag-orange">{local.breaks.filter(b=>b.enabled).length} break(s)</span>
          </div>
        </div>
        <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
          {(()=>{
            const allBlocks=[];
            slots.forEach(sl=>allBlocks.push({type:'slot',label:sl.label,start:sl.startMin}));
            local.breaks.filter(b=>b.enabled).forEach(b=>{
              const s=b.startHour*60+b.startMinute;
              allBlocks.push({type:'break',label:getIcon(b.label)+' '+b.label+' ('+b.durationMinutes+'m)',start:s});
            });
            allBlocks.sort((a,bk)=>a.start-bk.start);
            return allBlocks.map((bl,i)=>(
              <div key={i} style={{
                padding:'5px 12px',
                background:bl.type==='break'?'rgba(255,166,87,0.15)':'var(--bg3)',
                border:'1px solid '+(bl.type==='break'?'rgba(255,166,87,0.4)':'var(--border)'),
                borderRadius:'var(--radius)',
                fontSize:11,
                fontFamily:bl.type==='slot'?'monospace':'inherit',
                color:bl.type==='break'?'var(--accent5)':'var(--text2)',
                fontWeight:bl.type==='break'?700:400
              }}>{bl.label}</div>
            ));
          })()}
        </div>
      </div>
    </div>
  );
};

/* ===================== LOGO EDITOR COMPONENT ===================== */
const LogoEditor=({label,fallback,imgData,onFallbackChange,onImgChange,fallbackPlaceholder})=>{
  const fileRef=useRef();
  const handleFile=(e)=>{
    const file=e.target.files[0];
    if(!file)return;
    if(!file.type.startsWith('image/')){alert('Please select an image file');return;}
    if(file.size>2*1024*1024){alert('Image too large. Please use an image under 2MB.');return;}
    const reader=new FileReader();
    reader.onload=(ev)=>{onImgChange(ev.target.result);};
    reader.readAsDataURL(file);
    e.target.value='';
  };
  return(
    <div className="form-group">
      <label className="form-label">{label}</label>
      <div style={{background:'var(--bg3)',border:'1px solid var(--border)',borderRadius:'var(--radius-lg)',padding:12,display:'flex',flexDirection:'column',gap:10}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'center',height:80,background:'var(--bg)',borderRadius:'var(--radius)',border:'1px dashed var(--border)',overflow:'hidden'}}>
          {imgData?<img src={imgData} style={{maxHeight:72,maxWidth:120,objectFit:'contain'}} alt="logo preview"/>:<span style={{fontSize:40,lineHeight:1}}>{fallback||fallbackPlaceholder}</span>}
        </div>
        <div style={{display:'flex',gap:6}}>
          <button className="btn btn-info btn-sm" style={{flex:1}} onClick={()=>fileRef.current.click()}>📁 {imgData?'Replace Image':'Upload Image'}</button>
          {imgData&&<button className="btn btn-danger btn-sm" onClick={()=>onImgChange('')}>✕</button>}
        </div>
        <input ref={fileRef} type="file" accept="image/*" style={{display:'none'}} onChange={handleFile}/>
        <div>
          <div style={{fontSize:10,color:'var(--text3)',marginBottom:4,textTransform:'uppercase',letterSpacing:0.5,fontWeight:600}}>{imgData?'Fallback (if no image)':'Emoji or Text'}</div>
          <input className="form-input" value={fallback} onChange={e=>onFallbackChange(e.target.value)} placeholder={fallbackPlaceholder} style={{fontSize:16}}/>
        </div>
        {imgData&&<div style={{fontSize:10,color:'var(--accent3)',padding:'4px 8px',background:'rgba(63,185,80,0.08)',borderRadius:4,border:'1px solid rgba(63,185,80,0.2)'}}>✓ Image uploaded · will appear in printed reports</div>}

const ACCOUNTS=[
  {username:'admin',password:'admin123',role:'Admin',displayName:'Administrator'},
  {username:'principal',password:'principal123',role:'Principal',displayName:'School Principal'},
  {username:'registrar',password:'registrar123',role:'Registrar',displayName:'Registrar'},
  {username:'teacher',password:'teacher123',role:'Teacher',displayName:'Teacher'},
];

// Session is in-memory only — login required on every page load
const getSession=()=>null; // always start logged out
const setSession=(u)=>{}; // no-op
const clearSession=()=>{}; // no-op

const LoginScreen=({onLogin,setSettings})=>{
  const [username,setUsername]=useState('');
  const [password,setPassword]=useState('');
  const [showPass,setShowPass]=useState(false);
  const [error,setError]=useState('');
  const [loading,setLoading]=useState(false);
  const [uFocus,setUFocus]=useState(false);
  const [pFocus,setPFocus]=useState(false);

  // Load school info from saved settings
  const [schoolName,setSchoolName]=useState(()=>{
    try{const s=localStorage.getItem('ph_scheduler_v2');return s?JSON.parse(s)?.settings?.schoolName||'Patul National High School':'Patul National High School';}catch{return'Patul National High School';}
  });
  const [logoImg,setLogoImg]=useState(()=>{
    try{const s=localStorage.getItem('ph_scheduler_v2');return s?JSON.parse(s)?.settings?.logoLeftImg||'':'';}catch{return'';}
  });
  const [logoSaved,setLogoSaved]=useState(false);

  const handleLogoUpload=(e)=>{
    const file=e.target.files[0];
    if(!file)return;
    if(!file.type.startsWith('image/')){alert('Please select an image file.');return;}
    if(file.size>3*1024*1024){alert('Image too large. Please use an image under 3MB.');return;}
    const reader=new FileReader();
    reader.onload=(ev)=>{
      const img=ev.target.result;
      setLogoImg(img);
      // 1. Persist to localStorage
      try{
        const raw=localStorage.getItem('ph_scheduler_v2');
        const data=raw?JSON.parse(raw):{};
        if(!data.settings)data.settings={};
        data.settings.logoLeftImg=img;
        localStorage.setItem('ph_scheduler_v2',JSON.stringify(data));
      }catch{}
      // 2. Also update React settings state so it persists across pages immediately
      if(setSettings){setSettings(s=>({...s,logoLeftImg:img}));}
      // 3. Show brief confirmation
      setLogoSaved(true);
      setTimeout(()=>setLogoSaved(false),2500);
    };
    reader.readAsDataURL(file);
    e.target.value='';
  };

  const handleLogin=()=>{
    if(!username.trim()||!password.trim()){setError('Please enter username and password.');return;}
    setLoading(true);setError('');
    setTimeout(()=>{
      const acc=ACCOUNTS.find(a=>a.username===username.trim()&&a.password===password);
      if(acc){
        setSession(acc);
        onLogin(acc);
      }else{
        setError('Invalid username or password. Please try again.');
        setLoading(false);
      }
    },600);
  };

  const handleKey=(e)=>{if(e.key==='Enter')handleLogin();};

  const inputBorder=(focused,hasError)=>{
    if(hasError)return'#f85149';
    if(focused)return'#58a6ff';
    return'#30363d';
  };

  return(
    <div style={{minHeight:'100vh',background:'linear-gradient(135deg,#0d1117 0%,#161b22 50%,#1c2128 100%)',display:'flex',alignItems:'center',justifyContent:'center',fontFamily:"'DM Sans',sans-serif",position:'relative',overflow:'hidden'}}>
      <div style={{position:'absolute',top:'-20%',right:'-10%',width:500,height:500,borderRadius:'50%',background:'radial-gradient(circle,rgba(247,129,102,0.06) 0%,transparent 70%)',pointerEvents:'none'}}/>
      <div style={{position:'absolute',bottom:'-20%',left:'-10%',width:600,height:600,borderRadius:'50%',background:'radial-gradient(circle,rgba(88,166,255,0.05) 0%,transparent 70%)',pointerEvents:'none'}}/>

      <div style={{width:'100%',maxWidth:400,padding:'0 20px'}}>
        {/* School Header */}
        <div style={{textAlign:'center',marginBottom:24}}>
          {/* Logo - display only, not changeable */}
          <div style={{position:'relative',display:'inline-block',marginBottom:10}}>
            <div style={{width:80,height:80,borderRadius:20,background:logoImg?'transparent':'linear-gradient(135deg,#f78166,#ffa657)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:34,boxShadow:'0 8px 28px rgba(247,129,102,0.3)',overflow:'hidden',border:'2px solid rgba(255,255,255,0.08)'}}>
              {logoImg
                ?<img src={logoImg} style={{width:'100%',height:'100%',objectFit:'contain'}} alt="school logo"/>
                :<span>🏫</span>
              }
            </div>
          </div>
          <h1 style={{fontFamily:"'Syne',sans-serif",fontSize:20,fontWeight:800,color:'#ffffff',margin:'0 0 2px',textTransform:'uppercase',letterSpacing:1,lineHeight:1.2,textShadow:'0 2px 10px rgba(247,129,102,0.25)'}}>{schoolName}</h1>
          <p style={{fontSize:10,color:'#8b949e',margin:0,textTransform:'uppercase',letterSpacing:1.5,fontWeight:600}}>K–12 Class Scheduling System</p>
          <p style={{fontSize:9,color:'#6e7681',margin:'1px 0 0',textTransform:'uppercase',letterSpacing:1}}>DepEd Philippines</p>
          {logoSaved&&<p style={{fontSize:10,color:'#3fb950',marginTop:6,fontWeight:600}}>✓ Logo saved successfully!</p>}
        </div>

        {/* Card */}
        <div style={{background:'#161b22',border:'1px solid #30363d',borderRadius:16,padding:'24px 22px',boxShadow:'0 20px 60px rgba(0,0,0,0.5)'}}>
          <h2 style={{fontFamily:"'Syne',sans-serif",fontSize:14,fontWeight:700,color:'#e6edf3',margin:'0 0 20px',textAlign:'center',letterSpacing:0.3}}>Sign In to Continue</h2>

          <div style={{marginBottom:13}}>
            <label style={{display:'block',fontSize:10,fontWeight:700,color:'#8b949e',textTransform:'uppercase',letterSpacing:0.5,marginBottom:5}}>Username</label>
            <input
              value={username}
              onChange={e=>{setUsername(e.target.value);setError('');}}
              onKeyDown={handleKey}
              onFocus={()=>setUFocus(true)}
              onBlur={()=>setUFocus(false)}
              placeholder="Enter your username"
              autoFocus
              style={{width:'100%',padding:'10px 12px',background:'#21262d',border:'1.5px solid '+inputBorder(uFocus,!!error),borderRadius:8,color:'#e6edf3',fontSize:14,fontFamily:"'DM Sans',sans-serif",outline:'none',boxSizing:'border-box',transition:'border-color .15s'}}
            />
          </div>

          <div style={{marginBottom:16}}>
            <label style={{display:'block',fontSize:10,fontWeight:700,color:'#8b949e',textTransform:'uppercase',letterSpacing:0.5,marginBottom:5}}>Password</label>
            <div style={{position:'relative'}}>
              <input
                type={showPass?'text':'password'}
                value={password}
                onChange={e=>{setPassword(e.target.value);setError('');}}
                onKeyDown={handleKey}
                onFocus={()=>setPFocus(true)}
                onBlur={()=>setPFocus(false)}
                placeholder="Enter your password"
                style={{width:'100%',padding:'10px 40px 10px 12px',background:'#21262d',border:'1.5px solid '+inputBorder(pFocus,!!error),borderRadius:8,color:'#e6edf3',fontSize:14,fontFamily:"'DM Sans',sans-serif",outline:'none',boxSizing:'border-box',transition:'border-color .15s'}}
              />
              <button onClick={()=>setShowPass(v=>!v)} style={{position:'absolute',right:10,top:'50%',transform:'translateY(-50%)',background:'none',border:'none',cursor:'pointer',color:'#8b949e',fontSize:14,padding:'2px 4px'}}>
                {showPass?'🙈':'👁'}
              </button>
            </div>
          </div>

          {error&&(
            <div style={{marginBottom:14,padding:'9px 12px',background:'rgba(248,81,73,0.1)',border:'1px solid rgba(248,81,73,0.35)',borderRadius:8,color:'#f85149',fontSize:12,display:'flex',alignItems:'center',gap:7,animation:'fadeIn .2s ease'}}>
              <span style={{fontSize:14}}>⚠</span>
              <span>{error}</span>
            </div>
          )}

          <button
            onClick={handleLogin}
            disabled={loading}
            style={{width:'100%',padding:'11px',background:loading?'#2d333b':'linear-gradient(135deg,#f78166,#e56e55)',border:'none',borderRadius:8,color:'#fff',fontSize:14,fontWeight:700,cursor:loading?'not-allowed':'pointer',fontFamily:"'DM Sans',sans-serif",transition:'all .15s',boxShadow:loading?'none':'0 4px 16px rgba(247,129,102,0.25)',display:'flex',alignItems:'center',justifyContent:'center',gap:8}}
          >
            {loading
              ?<><span style={{display:'inline-block',width:14,height:14,border:'2px solid #555',borderTopColor:'#aaa',borderRadius:'50%',animation:'spin .7s linear infinite'}}></span> Signing in...</>
              :<>🔐 Sign In</>}
          </button>
        </div>

      </div>
      <style>{`@keyframes spin{to{transform:rotate(360deg)}} @keyframes fadeIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}`}</style>
    </div>
  );
};

    const saved=loadFromStorage();
    if(saved){
      return{
        teachers:saved.teachers||[...SEED_TEACHERS],
        subjects:saved.subjects||[...SEED_SUBJECTS],
        rooms:saved.rooms||[...SEED_ROOMS],
        sections:(saved.sections||[...SEED_SECTIONS]).map(s=>({...s,defaultRoomId:s.defaultRoomId||''})),
        schedules:saved.schedules||[],
        settings:{...SEED_SETTINGS,...(saved.settings||{})},
        signatories:saved.signatories||[...SEED_SIGNATORIES],
        timeSettings:saved.timeSettings||{...SEED_TIME},
      };
    }
    return{
      teachers:[...SEED_TEACHERS],
      subjects:[...SEED_SUBJECTS],
      rooms:[...SEED_ROOMS],
      sections:[...SEED_SECTIONS],
      schedules:[],
      settings:{...SEED_SETTINGS},
      signatories:[...SEED_SIGNATORIES],
      timeSettings:{...SEED_TIME},

  const [teachers,setTeachers]=useState(init.teachers);
  const [subjects,setSubjects]=useState(init.subjects);
  const [rooms,setRooms]=useState(init.rooms);
  const [sections,setSections]=useState(init.sections);
  const [schedules,setSchedules]=useState(init.schedules);
  const [settings,setSettings]=useState(init.settings);
  const [signatories,setSignatories]=useState(init.signatories);
  const [timeSettings,setTimeSettings]=useState(init.timeSettings);

  const handleLogin=(acc)=>setUser(acc);
  const handleLogout=()=>{clearSession();setUser(null);};

  // Guard: show login screen if not authenticated
  useEffect(()=>{
    saveToStorage({teachers,subjects,rooms,sections,schedules,settings,signatories,timeSettings});
  },[teachers,subjects,rooms,sections,schedules,settings,signatories,timeSettings]);

  const toast=(msg,type='info')=>{
    const id=uid();
    setToasts(ts=>[...ts,{id,msg,type}]);
    setTimeout(()=>setToasts(ts=>ts.filter(t=>t.id!==id)),3500);
  };

  const removeToast=(id)=>setToasts(ts=>ts.filter(t=>t.id!==id));

  const conflicts=useMemo(()=>detectConflicts(schedules),[schedules]);
  const currentPage=PAGES.find(p=>p.id===page);
  const slots=useMemo(()=>generateTimeSlots(timeSettings),[timeSettings]);

  // Guard: show login screen if not authenticated

              {(timeSettings.breaks&&timeSettings.breaks.length>0?timeSettings.breaks.filter(b=>b.enabled):timeSettings.lunchEnabled?[{label:'Lunch Break',startHour:timeSettings.lunchStartHour,startMinute:timeSettings.lunchStartMinute}]:[]).map((b,i)=>(

                  <div className="sidebar-section-label">{GROUP_LABELS[group]}</div>
                  {PAGES.filter(p=>p.group===group).map(p=>(
                    <div key={p.id} className={'nav-item '+(page===p.id?'active':'')} onClick={()=>setPage(p.id)}>
                      <span className="nav-icon">{p.icon}</span>
                      <span>{p.label}</span>
                      {p.id==='schedules'&&conflicts.length>0&&<span className="nav-badge">{conflicts.length}</span>}
                    </div>
                  ))}
                </div>
              ))}
            </div>
            <div style={{padding:'8px 12px',marginTop:'auto',borderTop:'1px solid var(--border)'}}>
              <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:6}}>
                <div style={{width:28,height:28,borderRadius:'50%',background:'linear-gradient(135deg,var(--accent),var(--accent5))',display:'flex',alignItems:'center',justifyContent:'center',fontSize:13,flexShrink:0}}>
                  {user.role==='Admin'?'🔑':user.role==='Principal'?'🎓':user.role==='Registrar'?'📋':'👩‍🏫'}
                </div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:11,fontWeight:700,color:'var(--text)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{user.displayName}</div>
                  <div style={{fontSize:10,color:'var(--accent5)',fontWeight:600}}>{user.role}</div>
                </div>
              </div>
              <button onClick={handleLogout} style={{width:'100%',padding:'5px 8px',background:'rgba(248,81,73,0.1)',border:'1px solid rgba(248,81,73,0.25)',borderRadius:6,color:'var(--danger)',fontSize:11,fontWeight:600,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:5}}>
                🚪 Sign Out
              </button>
              <div style={{display:'flex',alignItems:'center',gap:5,marginTop:6,fontSize:10,color:'var(--text3)'}}>
                <span style={{color:'var(--accent3)'}}>●</span> Auto-saved locally
              </div>
            </div>
          </div>

          {/* MAIN CONTENT */}
          <div className="main-content">
            {page==='dashboard'&&<Dashboard teachers={teachers} subjects={subjects} rooms={rooms} sections={sections} schedules={schedules} settings={settings}/>}
            {page==='teachers'&&<TeachersPage teachers={teachers} setTeachers={setTeachers} subjects={subjects} schedules={schedules} timeSettings={timeSettings} toast={toast}/>}
            {page==='subjects'&&<SubjectsPage subjects={subjects} setSubjects={setSubjects} toast={toast}/>}
            {page==='rooms'&&<RoomsPage rooms={rooms} setRooms={setRooms} toast={toast}/>}
            {page==='sections'&&<SectionsPage sections={sections} setSections={setSections} teachers={teachers} subjects={subjects} rooms={rooms} toast={toast}/>}
            {page==='schedules'&&<SchedulesPage schedules={schedules} setSchedules={setSchedules} sections={sections} subjects={subjects} teachers={teachers} rooms={rooms} timeSettings={timeSettings} toast={toast}/>}
            {page==='timetable'&&<TimetablePage schedules={schedules} setSchedules={setSchedules} sections={sections} subjects={subjects} teachers={teachers} rooms={rooms} timeSettings={timeSettings} toast={toast} settings={settings}/>}
            {page==='ai'&&<AISchedulerPage schedules={schedules} setSchedules={setSchedules} sections={sections} subjects={subjects} teachers={teachers} rooms={rooms} timeSettings={timeSettings} toast={toast}/>}
            {page==='substitution'&&<SubstitutionPage schedules={schedules} sections={sections} subjects={subjects} teachers={teachers} rooms={rooms} timeSettings={timeSettings} settings={settings} signatories={signatories} toast={toast}/>}
            {page==='reports'&&<ReportsPage schedules={schedules} sections={sections} subjects={subjects} teachers={teachers} rooms={rooms} settings={settings} signatories={signatories} timeSettings={timeSettings} toast={toast}/>}
            {page==='timesettings'&&<TimeSettingsPage timeSettings={timeSettings} setTimeSettings={setTimeSettings} toast={toast}/>}
            {page==='monitoring'&&<TeacherMonitoringPage schedules={schedules} teachers={teachers} subjects={subjects} sections={sections} timeSettings={timeSettings} setPage={setPage}/>}
            {page==='settings'&&<ReportSettingsPage settings={settings} setSettings={setSettings} signatories={signatories} setSignatories={setSignatories} toast={toast}/>}
          </div>
        </div>
      </div>
    </>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
