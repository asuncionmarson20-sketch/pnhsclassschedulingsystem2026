<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>PH K-12 School Class Scheduling System</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#060912;--bg2:#0c1121;--bg3:#111828;--bg4:#172035;
  --border:#1d2843;--border-light:#243256;
  --accent:#ff4d3d;--accent2:#4f9eff;--accent3:#22d160;
  --accent4:#b39dff;--accent5:#ffb224;
  --text:#f0f4ff;--text2:#8494b8;--text3:#45567a;
  --danger:#ff4d3d;--success:#22d160;
  --radius:9px;--radius-lg:13px;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;-webkit-font-smoothing:antialiased}
h1,h2,h3,h4,h5,h6{font-family:'Syne',sans-serif}
input,select,textarea{font-family:'DM Sans',sans-serif;font-size:14px}
button{font-family:'DM Sans',sans-serif;font-size:14px;cursor:pointer}
a{color:var(--accent2);text-decoration:none}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:99px}
::-webkit-scrollbar-thumb:hover{background:var(--text3)}

/* Layout */
#root{height:100vh;display:flex;flex-direction:column;overflow:hidden}
.topbar{flex-shrink:0;background:rgba(6,9,18,0.97);border-bottom:1px solid var(--border);backdrop-filter:blur(20px);z-index:100}
.topbar-banner{padding:10px 22px;display:flex;align-items:center;justify-content:space-between;background:linear-gradient(90deg,rgba(255,77,61,0.07),rgba(79,158,255,0.04),rgba(34,209,96,0.03));border-bottom:1px solid var(--border)}
.topbar-banner-left{display:flex;align-items:center;gap:12px}
.topbar-logo{width:36px;height:36px;border-radius:9px;background:linear-gradient(135deg,#ff4d3d,#c0392b);display:flex;align-items:center;justify-content:center;font-size:17px;box-shadow:0 4px 16px rgba(255,77,61,0.35);flex-shrink:0}
.topbar-title h1{font-size:14px;font-weight:700;color:var(--text);letter-spacing:0.2px}
.topbar-title p{font-size:10px;color:var(--text3);margin-top:2px;letter-spacing:1.8px;font-weight:600;text-transform:uppercase}
.topbar-bar{padding:6px 22px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.topbar-bar-left{display:flex;align-items:center;gap:8px}
.page-label{font-family:'Syne',sans-serif;font-size:13px;font-weight:600;color:var(--text)}
.breadcrumb{font-size:11px;color:var(--text3)}
.topbar-bar-right{display:flex;align-items:center;gap:8px}

.app-body{flex:1;display:flex;overflow:hidden}
.sidebar{width:228px;flex-shrink:0;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;overflow-x:hidden}
.sidebar-nav{padding:10px 8px}
.sidebar-section{margin-bottom:4px}
.sidebar-section-label{font-size:9.5px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:1.5px;padding:10px 10px 5px}
.nav-item{display:flex;align-items:center;gap:9px;padding:8px 11px;border-radius:var(--radius);cursor:pointer;transition:all .15s;position:relative;font-size:13px;color:var(--text2);font-weight:500;border:1px solid transparent;margin-bottom:1px}
.nav-item:hover{background:var(--bg3);color:var(--text);border-color:var(--border)}
.nav-item.active{background:linear-gradient(135deg,rgba(255,77,61,0.14),rgba(255,77,61,0.06));color:var(--accent);border-color:rgba(255,77,61,0.2);font-weight:600}
.nav-item.active::before{content:'';position:absolute;left:0;top:25%;height:50%;width:2px;background:var(--accent);border-radius:0 2px 2px 0;box-shadow:0 0 8px rgba(255,77,61,0.5)}
.nav-icon{width:18px;text-align:center;font-size:14px}
.nav-badge{margin-left:auto;background:var(--danger);color:#fff;font-size:10px;font-weight:700;padding:1px 6px;border-radius:99px;box-shadow:0 2px 8px rgba(255,77,61,0.4)}

.main-content{flex:1;overflow-y:auto;background:var(--bg)}
.page-content{padding:22px;max-width:1400px}

/* Cards */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px;transition:border-color .2s}
.card:hover{border-color:var(--border-light)}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.card-title{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;color:var(--text)}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 15px;border-radius:var(--radius);border:1px solid transparent;cursor:pointer;font-weight:600;font-size:13px;transition:all .16s;white-space:nowrap}
.btn-primary{background:linear-gradient(135deg,#ff4d3d,#c0392b);color:#fff;box-shadow:0 4px 14px rgba(255,77,61,0.3)}
.btn-primary:hover{transform:translateY(-1px);filter:brightness(1.08);box-shadow:0 6px 20px rgba(255,77,61,0.4)}
.btn-primary:active{transform:translateY(0)}
.btn-secondary{background:var(--bg3);color:var(--text);border-color:var(--border-light)}
.btn-secondary:hover{background:var(--bg4);border-color:var(--text3)}
.btn-success{background:linear-gradient(135deg,#22d160,#16a34a);color:#fff;box-shadow:0 4px 14px rgba(34,209,96,0.25)}
.btn-success:hover{transform:translateY(-1px);filter:brightness(1.08)}
.btn-danger{background:linear-gradient(135deg,#ff4d3d,#dc2626);color:#fff;box-shadow:0 4px 14px rgba(255,77,61,0.25)}
.btn-danger:hover{transform:translateY(-1px);filter:brightness(1.08)}
.btn-info{background:rgba(79,158,255,0.12);color:var(--accent2);border-color:rgba(79,158,255,0.25)}
.btn-info:hover{background:rgba(79,158,255,0.2)}
.btn-warn{background:rgba(255,178,36,0.12);color:var(--accent5);border-color:rgba(255,178,36,0.25)}
.btn-warn:hover{background:rgba(255,178,36,0.2)}
.btn-sm{padding:5px 11px;font-size:12px}
.btn-xs{padding:3px 7px;font-size:11px}
.btn:disabled{opacity:0.45;cursor:not-allowed;transform:none!important;filter:none!important}

/* Form inputs */
.form-group{margin-bottom:14px}
.form-label{display:block;font-size:11px;font-weight:700;color:var(--text2);margin-bottom:5px;text-transform:uppercase;letter-spacing:0.6px}
.form-input,.form-select,.form-textarea{width:100%;padding:8px 11px;background:var(--bg3);border:1px solid var(--border-light);border-radius:var(--radius);color:var(--text);transition:border-color .15s,box-shadow .15s;outline:none}
.form-input:hover,.form-select:hover{border-color:var(--text3)}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--accent2);box-shadow:0 0 0 3px rgba(79,158,255,0.12)}
.form-select option{background:var(--bg3)}
.form-textarea{resize:vertical;min-height:80px}

/* Tags */
.tag{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600}
.tag-blue{background:rgba(79,158,255,0.13);color:var(--accent2);border:1px solid rgba(79,158,255,0.2)}
.tag-green{background:rgba(34,209,96,0.13);color:var(--accent3);border:1px solid rgba(34,209,96,0.2)}
.tag-purple{background:rgba(179,157,255,0.13);color:var(--accent4);border:1px solid rgba(179,157,255,0.2)}
.tag-orange{background:rgba(255,178,36,0.13);color:var(--accent5);border:1px solid rgba(255,178,36,0.2)}
.tag-red{background:rgba(255,77,61,0.13);color:var(--danger);border:1px solid rgba(255,77,61,0.2)}
.tag-gray{background:var(--bg4);color:var(--text2)}

/* Tables */
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:9px 13px;font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:1px;border-bottom:1px solid var(--border-light);background:var(--bg3)}
td{padding:10px 13px;border-bottom:1px solid rgba(29,40,67,0.8);vertical-align:middle;font-size:13px}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(79,158,255,0.03)}
tbody tr{transition:background .12s}

/* Pills */
.pill{display:inline-flex;align-items:center;padding:2px 9px;border-radius:20px;font-size:11px;cursor:pointer;border:1px solid transparent;transition:all .15s;font-weight:600}
.pill-inactive{background:var(--bg4);color:var(--text2);border-color:var(--border-light)}
.pill-active{background:rgba(34,209,96,0.15);color:var(--accent3);border-color:rgba(34,209,96,0.3)}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(2,4,14,0.85);backdrop-filter:blur(8px);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:var(--bg2);border:1px solid var(--border-light);border-radius:14px;max-width:600px;width:100%;max-height:90vh;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,0.7);animation:modalUp .2s cubic-bezier(.34,1.4,.64,1)}
@keyframes modalUp{from{opacity:0;transform:translateY(18px) scale(0.97)}to{opacity:1;transform:translateY(0) scale(1)}}
.modal-lg{max-width:900px}
.modal-xl{max-width:1100px}
.modal-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;background:linear-gradient(135deg,rgba(255,77,61,0.05),transparent)}
.modal-title{font-family:'Syne',sans-serif;font-size:15px;font-weight:700}
.modal-body{padding:20px;overflow-y:auto;flex:1}
.modal-footer{padding:14px 20px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:flex-end;gap:8px;flex-shrink:0;background:rgba(6,9,18,0.5)}
.modal-close{background:var(--bg3);border:1px solid var(--border-light);color:var(--text2);font-size:16px;cursor:pointer;padding:4px 8px;border-radius:7px;transition:all .15s;line-height:1}
.modal-close:hover{background:var(--bg4);color:var(--text)}

/* Toast */
.toast-container{position:fixed;top:20px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{padding:11px 15px;border-radius:var(--radius);font-size:13px;font-weight:600;display:flex;align-items:center;gap:10px;pointer-events:all;animation:toastIn .25s cubic-bezier(.34,1.56,.64,1);min-width:270px;max-width:370px;box-shadow:0 12px 40px rgba(0,0,0,0.5);backdrop-filter:blur(12px)}
@keyframes toastIn{from{transform:translateX(100%) scale(0.9);opacity:0}to{transform:translateX(0) scale(1);opacity:1}}
.toast-success{background:rgba(34,209,96,0.12);border:1px solid rgba(34,209,96,0.3);color:var(--accent3)}
.toast-error{background:rgba(255,77,61,0.12);border:1px solid rgba(255,77,61,0.3);color:var(--danger)}
.toast-info{background:rgba(79,158,255,0.12);border:1px solid rgba(79,158,255,0.3);color:var(--accent2)}
.toast-warn{background:rgba(255,178,36,0.12);border:1px solid rgba(255,178,36,0.3);color:var(--accent5)}
@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}

/* Color classes for schedule blocks */
.color-0{background:linear-gradient(135deg,#ff4d3d,#c0392b)}
.color-1{background:linear-gradient(135deg,#4f9eff,#1a6fc4)}
.color-2{background:linear-gradient(135deg,#22d160,#16a34a)}
.color-3{background:linear-gradient(135deg,#b39dff,#7c3aed)}
.color-4{background:linear-gradient(135deg,#ffb224,#d97706)}
.color-5{background:linear-gradient(135deg,#22d3ee,#0891b2)}
.color-6{background:linear-gradient(135deg,#4ade80,#15803d)}
.color-7{background:linear-gradient(135deg,#f87171,#dc2626)}
.color-8{background:linear-gradient(135deg,#fbbf24,#b45309)}
.color-9{background:linear-gradient(135deg,#fb923c,#c2410c)}

/* Conflict alert */
.conflict-alert{background:rgba(255,77,61,0.08);border:1px solid rgba(255,77,61,0.25);border-left:3px solid var(--danger);border-radius:var(--radius);padding:10px 14px;margin-bottom:12px;font-size:12px;color:var(--danger)}

/* Search bar */
.search-bar{position:relative;display:flex;align-items:center}
.search-bar input{padding:7px 11px 7px 32px;background:var(--bg3);border:1px solid var(--border-light);border-radius:var(--radius);color:var(--text);width:230px;transition:border-color .15s,box-shadow .15s}
.search-bar input:focus{outline:none;border-color:var(--accent2);box-shadow:0 0 0 3px rgba(79,158,255,0.1)}
.search-icon{position:absolute;left:10px;color:var(--text3);font-size:13px;pointer-events:none}

/* Dashboard stats */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:13px;margin-bottom:22px}
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px;position:relative;overflow:hidden;transition:transform .2s,border-color .2s,box-shadow .2s}
.stat-card:hover{transform:translateY(-3px);border-color:var(--border-light);box-shadow:0 12px 36px rgba(0,0,0,0.35)}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.stat-card::after{content:'';position:absolute;bottom:-20px;right:-20px;width:80px;height:80px;border-radius:50%;opacity:0.07}
.stat-card.c0::before{background:linear-gradient(90deg,var(--accent),var(--accent5))}.stat-card.c0::after{background:var(--accent)}
.stat-card.c1::before{background:linear-gradient(90deg,var(--accent2),var(--accent4))}.stat-card.c1::after{background:var(--accent2)}
.stat-card.c2::before{background:linear-gradient(90deg,var(--accent3),var(--accent2))}.stat-card.c2::after{background:var(--accent3)}
.stat-card.c3::before{background:linear-gradient(90deg,var(--accent4),var(--accent2))}.stat-card.c3::after{background:var(--accent4)}
.stat-card.c4::before{background:linear-gradient(90deg,var(--accent5),var(--accent))}.stat-card.c4::after{background:var(--accent5)}
.stat-num{font-family:'Syne',sans-serif;font-size:30px;font-weight:900;margin:8px 0 4px;line-height:1}
.stat-label{font-size:11px;color:var(--text2);font-weight:700;text-transform:uppercase;letter-spacing:0.8px}
.stat-icon{position:absolute;top:14px;right:14px;font-size:22px;opacity:0.2}

/* Progress bar */
.progress-bar{background:var(--bg4);border-radius:99px;height:5px;overflow:hidden}
.progress-fill{height:100%;border-radius:99px;transition:width .5s cubic-bezier(.4,0,.2,1)}

/* Grid utils */
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.flex{display:flex}.flex-col{flex-direction:column}.items-center{align-items:center}.justify-between{justify-content:space-between}.gap-8{gap:8px}.gap-12{gap:12px}.flex-1{flex:1}
.mb-4{margin-bottom:4px}.mb-8{margin-bottom:8px}.mb-12{margin-bottom:12px}.mb-16{margin-bottom:16px}.mb-20{margin-bottom:20px}
.mt-8{margin-top:8px}.mt-12{margin-top:12px}.mt-16{margin-top:16px}
.text-sm{font-size:12px}.text-xs{font-size:11px}.text-danger{color:var(--danger)}.text-success{color:var(--accent3)}.text-muted{color:var(--text2)}
.fw-600{font-weight:600}.fw-700{font-weight:700}

/* SY Widget */
.sy-widget{position:relative}
.sy-btn{display:flex;align-items:center;gap:7px;padding:5px 11px;background:rgba(255,255,255,0.05);border:1px solid var(--border-light);border-radius:var(--radius);cursor:pointer;transition:all .15s;font-size:12px;font-weight:600;color:var(--text)}
.sy-btn:hover{background:rgba(255,255,255,0.09);border-color:var(--text3)}
.sy-edit-label{color:var(--accent5);font-size:10px;font-weight:700}
.sy-popover{position:absolute;top:calc(100% + 8px);right:0;background:var(--bg2);border:1px solid var(--border-light);border-radius:var(--radius-lg);padding:16px;width:310px;box-shadow:0 16px 50px rgba(0,0,0,0.6);z-index:500}

/* Period badge */
.period-badge{padding:4px 10px;background:rgba(79,158,255,0.11);border:1px solid rgba(79,158,255,0.22);border-radius:20px;font-size:11px;font-weight:600;color:var(--accent2)}

/* Timetable */
.timetable-wrap{overflow:auto;position:relative}
.timetable-grid{display:grid;min-width:800px}
.tt-header{background:var(--bg3);padding:9px 12px;font-family:'Syne',sans-serif;font-size:11px;font-weight:700;text-align:center;letter-spacing:0.8px;border-right:1px solid var(--border);border-bottom:1px solid var(--border-light);position:sticky;top:0;z-index:10;color:var(--text2);text-transform:uppercase}
.tt-time-col{background:var(--bg3);padding:4px 9px;font-size:10px;color:var(--text3);border-right:1px solid var(--border);border-bottom:1px solid rgba(29,40,67,0.5);text-align:right;position:sticky;left:0;z-index:5;white-space:nowrap}
.tt-cell{border-right:1px solid rgba(29,40,67,0.5);border-bottom:1px solid rgba(29,40,67,0.4);position:relative;background:var(--bg)}
.tt-block{position:absolute;left:2px;right:2px;border-radius:6px;padding:3px 6px;cursor:pointer;overflow:hidden;display:flex;flex-direction:column;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,0.4);transition:all .15s}
.tt-block:hover{opacity:0.88;transform:scale(1.01)}
.tt-block-title{font-size:10px;font-weight:700;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.4}
.tt-block-sub{font-size:9px;color:rgba(255,255,255,0.75);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.3}
.tt-block-remove{position:absolute;top:2px;right:3px;background:rgba(0,0,0,0.5);color:#fff;border:none;border-radius:50%;width:14px;height:14px;font-size:9px;display:flex;align-items:center;justify-content:center;cursor:pointer;opacity:0;transition:opacity .15s;padding:0}
.tt-block:hover .tt-block-remove{opacity:1}
.tt-lunch-block{position:absolute;left:0;right:0;background:repeating-linear-gradient(45deg,rgba(255,178,36,0.07),rgba(255,178,36,0.07) 4px,transparent 4px,transparent 10px);border-top:1px dashed rgba(255,178,36,0.3);border-bottom:1px dashed rgba(255,178,36,0.3);display:flex;align-items:center;justify-content:center;pointer-events:none;z-index:2}
.tt-lunch-label{font-size:10px;color:rgba(255,178,36,0.65);font-weight:600;letter-spacing:1.2px;text-transform:uppercase}

/* AI Log */
.ai-log{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:12px;height:300px;overflow-y:auto;font-family:monospace;font-size:12px}
.log-ok{color:var(--accent3)}.log-warn{color:var(--accent5)}.log-err{color:var(--danger)}.log-info{color:var(--text2)}

/* Report preview */
.report-preview{background:#fff;color:#000;padding:20mm;font-family:Arial,sans-serif;font-size:11pt;min-height:297mm;width:210mm;margin:0 auto;box-shadow:0 0 50px rgba(0,0,0,0.5)}
.report-header{text-align:center;margin-bottom:16px}
.report-logo-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.report-logo{font-size:36px;width:50px;text-align:center}
.report-header-center{flex:1;text-align:center}
.report-gov-text{font-size:8pt;color:#444;margin-bottom:2px}
.report-school-name{font-size:14pt;font-weight:700;text-transform:uppercase}
.report-address{font-size:8pt;color:#444;margin-top:2px}
.report-title-banner{background:#000;color:#fff;text-align:center;padding:6px;font-size:12pt;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin:12px 0 8px}
.report-badges{display:flex;gap:8px;justify-content:center;margin-bottom:12px}
.report-badge{padding:3px 12px;border:1px solid #333;font-size:9pt;font-weight:600;border-radius:3px}
.report-table{width:100%;border-collapse:collapse;font-size:9pt}
.report-table th{background:#333;color:#fff;padding:6px 8px;text-align:center;border:1px solid #555}
.report-table td{padding:5px 8px;border:1px solid #ccc;text-align:center}
.report-table tr:nth-child(even) td{background:#f9f9f9}
.report-signatory-row{display:flex;justify-content:space-around;margin-top:40px}
.report-signatory{text-align:center;min-width:150px}
.report-signatory-line{border-top:1px solid #333;padding-top:6px;margin-top:30px;font-weight:700;font-size:10pt}
.report-signatory-pos{font-size:9pt;color:#444}

@media print{.no-print{display:none!important}.topbar{display:none!important}.sidebar{display:none!important}.main-content{overflow:visible!important}body{background:#fff}.report-preview{box-shadow:none;margin:0;padding:15mm;width:100%}}

/* Day toggle */
.day-toggle{display:flex;gap:5px;flex-wrap:wrap}
.day-btn{padding:4px 11px;border-radius:99px;border:1px solid var(--border-light);background:var(--bg3);color:var(--text2);cursor:pointer;font-size:11px;font-weight:600;transition:all .15s}
.day-btn:hover{border-color:var(--text3);color:var(--text)}

/* ===================== TIME HELPERS ===================== */
const fmtTime=(totalMinutes)=>{
  const h=Math.floor(totalMinutes/60);
  const m=totalMinutes%60;
  const ampm=h>=12?'PM':'AM';
  const h12=h%12||12;
  return h12+':'+(m<10?'0':'')+m+' '+ampm;
};

const generateTimeSlots=(ts)=>{
  const slots=[];
  const startMin=ts.startHour*60+ts.startMinute;
  const endMin=ts.endHour*60+ts.endMinute;
  const breakPeriods=[];
  if(ts.breaks&&ts.breaks.length>0){
    ts.breaks.filter(b=>b.enabled).forEach(b=>{
      const bs=b.startHour*60+b.startMinute;
      breakPeriods.push({start:bs,end:bs+b.durationMinutes});
    });
  } else if(ts.lunchEnabled){
    const ls=ts.lunchStartHour*60+ts.lunchStartMinute;
    const le=ts.lunchEndHour*60+ts.lunchEndMinute;
    breakPeriods.push({start:ls,end:le});
  }
  const isBreak=(s,e)=>breakPeriods.some(b=>s<b.end&&e>b.start);
  const jumpOverBreaks=(cur)=>{
    let c=cur;
    let jumped=true;
    while(jumped){
      jumped=false;
      for(const b of breakPeriods){
        if(c>=b.start&&c<b.end){c=b.end;jumped=true;}
      }
    }
    return c;
  };
  let cur=startMin;
  while(cur<endMin){
    cur=jumpOverBreaks(cur);
    if(cur>=endMin)break;
    const slotEnd=cur+ts.defaultSlotMinutes;
    if(slotEnd>endMin)break;
    if(!isBreak(cur,slotEnd)){
      slots.push({label:fmtTime(cur)+' - '+fmtTime(slotEnd),startMin:cur,endMin:slotEnd});
    }
    cur=slotEnd;
  }
  return slots;
};

const parseSlotLabel=(label)=>{
  const parts=label.split(' - ');
  if(parts.length!==2)return null;
  const parseT=(s)=>{
    const [time,ampm]=s.trim().split(' ');
    const [hStr,mStr]=time.split(':');
    let h=parseInt(hStr);
    const m=parseInt(mStr);
    if(ampm==='PM'&&h!==12)h+=12;
    if(ampm==='AM'&&h===12)h=0;
    return h*60+m;
  };
  return{startMin:parseT(parts[0]),endMin:parseT(parts[1])};
};

// Strict overlap: touching boundaries (end of one == start of next) are NOT overlapping
const slotsOverlap=(s1,e1,s2,e2)=>s1<e2&&e1>s2&&!(e1===s2||e2===s1);
const isOverlapping=(lA,lB)=>{
  const a=parseSlotLabel(lA),b=parseSlotLabel(lB);
  if(!a||!b)return false;
  return slotsOverlap(a.startMin,a.endMin,b.startMin,b.endMin);
};

/* ===================== CONFLICT DETECTION ===================== */
const detectConflicts=(schedules)=>{
  const conflicts=[];
  for(let i=0;i<schedules.length;i++){
    for(let j=i+1;j<schedules.length;j++){
      const a=schedules[i],b=schedules[j];
      if(a.day!==b.day)continue;
      if(!isOverlapping(a.timeSlot,b.timeSlot))continue;
      // Teacher double-booked
      if(a.teacherId&&b.teacherId&&a.teacherId===b.teacherId){
        conflicts.push({type:'teacher',ids:[a.id,b.id],msg:'Teacher conflict: same teacher at same time'});
      }
      // Room double-booked
      if(a.roomId&&b.roomId&&a.roomId===b.roomId){
        conflicts.push({type:'room',ids:[a.id,b.id],msg:'Room conflict: same room at same time'});
      }
      // Section double-booked
      if(a.sectionId&&b.sectionId&&a.sectionId===b.sectionId){
        conflicts.push({type:'section',ids:[a.id,b.id],msg:'Section conflict: same section at same time'});
      }
    }
  }
  return conflicts;
};

/* ===================== AI SCHEDULER ===================== */
const runAIScheduler=(sections,subjects,teachers,rooms,existing,timeSettings,targetSectionIds)=>{
  const log=[];
  const schedules=[...existing];
  let placed=0,skipped=0;
  const slots=generateTimeSlots(timeSettings);
  const targetSecs=targetSectionIds.length>0?sections.filter(s=>targetSectionIds.includes(s.id)):sections;

  const teacherLoad={};
  teachers.forEach(t=>{teacherLoad[t.id]={hoursUsed:0,dayCount:{}};});
  existing.forEach(s=>{
    if(!teacherLoad[s.teacherId])return;
    const p=parseSlotLabel(s.timeSlot);
    if(p){
      const hrs=(p.endMin-p.startMin)/60;
      teacherLoad[s.teacherId].hoursUsed+=hrs;
      teacherLoad[s.teacherId].dayCount[s.day]=(teacherLoad[s.teacherId].dayCount[s.day]||0)+1;
    }
  });

  const isConflict=(day,timeSlot,teacherId,roomId,sectionId)=>{
    const p=parseSlotLabel(timeSlot);
    if(!p)return true;
    for(const s of schedules){
      if(s.day!==day)continue;
      const sp=parseSlotLabel(s.timeSlot);
      if(!sp)continue;
      if(!slotsOverlap(p.startMin,p.endMin,sp.startMin,sp.endMin))continue;
      if(teacherId&&s.teacherId===teacherId)return true;
      if(roomId&&s.roomId===roomId)return true;
      if(sectionId&&s.sectionId===sectionId)return true;
    }
    return false;
  };

  // STEP 1: Build master subject timetable shared across all sections of same grade/strand.
  // Each subject gets fixed (day, slot) pairs - ONE session per day, spread across the week.
  // All sections use the SAME time grid, so schedules look uniform.
  const subjectSlots={};
  const gradeCombos=[...new Set(targetSecs.map(s=>s.gradeLevel+'|'+(s.strand||'')))];

  gradeCombos.forEach(combo=>{
    const [gradeLevel,strand]=combo.split('|');
    const comboSubjects=subjects.filter(sub=>
      sub.gradeLevel===gradeLevel&&(sub.strand===''||sub.strand===strand)
    );
    const slotGrid={};
    DAYS.forEach(d=>{slotGrid[d]=Array(slots.length).fill(null);});

    comboSubjects.forEach(subj=>{
      if(subjectSlots[subj.id])return;
      const needed=subj.hoursPerWeek;
      const allowedDays=(subj.scheduleDays&&subj.scheduleDays.length>0)?subj.scheduleDays:DAYS;
      const assigned=[];
      const usedDays=new Set();

      for(const day of allowedDays){
        if(assigned.length>=needed)break;
        if(usedDays.has(day))continue;
        for(let si=0;si<slots.length;si++){
          if(slotGrid[day][si]===null){
            slotGrid[day][si]=subj.id;
            assigned.push({day,slot:slots[si]});
            usedDays.add(day);
            break;
          }
        }
      }
      // Second pass if more sessions needed
      if(assigned.length<needed){
        for(const day of [...allowedDays,...allowedDays]){
          if(assigned.length>=needed)break;
          if(usedDays.has(day))continue;
          for(let si=0;si<slots.length;si++){
            if(slotGrid[day][si]===null){
              slotGrid[day][si]=subj.id;
              assigned.push({day,slot:slots[si]});
              usedDays.add(day);
              break;
            }
          }
        }
      }
      subjectSlots[subj.id]=assigned;
      log.push({type:'info',msg:'[Master] '+subj.name+' ('+gradeLevel+'): '+assigned.map(a=>a.day.slice(0,3)+' '+a.slot.label).join(' | ')});
    });
  });

  // STEP 2: Assign teacher & room for each section using the master slots.
  // If no teacher/room available for a slot -> skip cleanly.
  for(const section of targetSecs){
    const sectionSubjects=subjects.filter(sub=>
      sub.gradeLevel===section.gradeLevel&&(sub.strand===''||sub.strand===section.strand)
    );
    log.push({type:'info',msg:'=== Section: '+section.name+' ('+sectionSubjects.length+' subjects) ==='});

    for(const subj of sectionSubjects){
      const masterSlots=subjectSlots[subj.id]||[];
      if(masterSlots.length===0){
        log.push({type:'warn',msg:'  '+subj.name+': no master slots assigned'});
        skipped++;continue;
      }
      const alreadyPlaced=schedules.filter(s=>s.sectionId===section.id&&s.subjectId===subj.id).length;
      if(alreadyPlaced>=subj.hoursPerWeek){
        log.push({type:'info',msg:'  '+subj.name+': already fulfilled'});
        continue;
      }

      const eligibleTeachers=teachers.filter(t=>{
        if(!t.subjects.includes(subj.id))return false;
        const avDays=(t.subjectAvailability&&t.subjectAvailability[subj.id])||t.availability||DAYS;
        return avDays.length>0;
      }).sort((a,b)=>(teacherLoad[a.id]?.hoursUsed||0)-(teacherLoad[b.id]?.hoursUsed||0));

      if(eligibleTeachers.length===0){
        log.push({type:'warn',msg:'  '+subj.name+': no eligible teacher - skipped (add a teacher for this subject)'});
        skipped++;continue;
      }

      // Use section's default room exclusively if set, otherwise fall back to type-sorted rooms
      const defaultRoom=section.defaultRoomId?rooms.find(r=>r.id===section.defaultRoomId):null;
      const isLabSubject=subj.name.toLowerCase().includes('science')||subj.name.toLowerCase().includes('computer');
      const preferredRoomType=isLabSubject?['Laboratory','Computer Lab']:['Classroom'];
      const fallbackRooms=[...rooms].filter(r=>r.id!==section.defaultRoomId).sort((a,b)=>{
        const ap=preferredRoomType.includes(a.type)?0:1;
        const bp=preferredRoomType.includes(b.type)?0:1;
        return ap-bp;
      });
      // If default room is set, use ONLY that room — no fallback to other rooms
      const sortedRooms=defaultRoom?[defaultRoom]:fallbackRooms;

      for(const ms of masterSlots){
        const curCount=schedules.filter(s=>s.sectionId===section.id&&s.subjectId===subj.id).length;
        if(curCount>=subj.hoursPerWeek)break;

        let placedSlot=false;
        for(const teacher of eligibleTeachers){
          if(placedSlot)break;
          const avDays=(teacher.subjectAvailability&&teacher.subjectAvailability[subj.id])||teacher.availability||DAYS;
          if(!avDays.includes(ms.day))continue;
          const tl=teacherLoad[teacher.id];
          if(tl.hoursUsed>=(teacher.maxHoursPerWeek||30))continue;
          if((tl.dayCount[ms.day]||0)>=(teacher.maxClassesPerDay||6))continue;
          for(const room of sortedRooms){
            if(!isConflict(ms.day,ms.slot.label,teacher.id,room.id,section.id)){
              const newSched={id:uid(),sectionId:section.id,subjectId:subj.id,teacherId:teacher.id,roomId:room.id,day:ms.day,timeSlot:ms.slot.label};
              schedules.push(newSched);
              const hrs=(ms.slot.endMin-ms.slot.startMin)/60;
              tl.hoursUsed+=hrs;
              tl.dayCount[ms.day]=(tl.dayCount[ms.day]||0)+1;
              placed++;
              placedSlot=true;
              log.push({type:'ok',msg:'  + '+subj.name+' -> '+teacher.name+' | '+room.name+' | '+ms.day+' '+ms.slot.label});
              break;
            }
          }
        }
        if(!placedSlot){
          log.push({type:'warn',msg:'  ~ '+subj.name+' '+ms.day+' '+ms.slot.label+': no available teacher/room - skipped'});
          skipped++;
        }
      }
    }
  }

  const conflicts=detectConflicts(schedules.filter(s=>!existing.find(e=>e.id===s.id)));
  return{schedules,log,placed,skipped,conflicts};
};

/* ===================== DASHBOARD ===================== */
const Dashboard=({teachers,subjects,rooms,sections,schedules,settings})=>{
  const conflicts=useMemo(()=>detectConflicts(schedules),[schedules]);
  const subjectColorMap={};
  subjects.forEach((s,i)=>{subjectColorMap[s.id]=i%10;});

  const getSectionCompletion=(section)=>{
    const relevant=subjects.filter(s=>s.gradeLevel===section.gradeLevel&&(s.strand===''||s.strand===section.strand));
    if(relevant.length===0)return{pct:0,placed:0,total:0};
    let total=0,placed=0;
    relevant.forEach(sub=>{
      total+=sub.hoursPerWeek;
      placed+=schedules.filter(sc=>sc.sectionId===section.id&&sc.subjectId===sub.id).length;
    });
    return{pct:total>0?Math.min(100,Math.round(placed/total*100)):0,placed,total};
  };

  const teacherWorkload=(t)=>{
    const teachingHrs=schedules.filter(s=>s.teacherId===t.id).reduce((acc,s)=>{
      const p=parseSlotLabel(s.timeSlot);
      return acc+(p?(p.endMin-p.startMin)/60:0);
    },0);
    const respHrs=(t.responsibilities||[]).reduce((a,r)=>a+r.hoursPerWeek,0);
    const hrs=teachingHrs+respHrs;
    return{hrs,teachingHrs,respHrs,pct:Math.min(100,Math.round(hrs/(t.maxHoursPerWeek||30)*100))};
  };

  return(
    <div className="page-content">
      <div className="mb-16">
        <h2 style={{fontFamily:'Syne',fontSize:20,fontWeight:800,marginBottom:4}}>{settings.schoolName}</h2>
        <p style={{color:'var(--text2)',fontSize:13}}>{settings.address} · S.Y. {settings.schoolYear} · {settings.semester}</p>
      </div>

      <div className="stats-grid">
        <div className="stat-card c0">
          <div className="stat-icon">👩‍🏫</div>
          <div className="stat-label">Teachers</div>
          <div className="stat-num">{teachers.length}</div>
        </div>
        <div className="stat-card c1">
          <div className="stat-icon">📚</div>
          <div className="stat-label">Subjects</div>
          <div className="stat-num">{subjects.length}</div>
        </div>
        <div className="stat-card c2">
          <div className="stat-icon">🏫</div>
          <div className="stat-label">Rooms</div>
          <div className="stat-num">{rooms.length}</div>
        </div>
        <div className="stat-card c3">
          <div className="stat-icon">🎒</div>
          <div className="stat-label">Sections</div>
          <div className="stat-num">{sections.length}</div>
        </div>
        <div className="stat-card c4">
          <div className="stat-icon">📅</div>
          <div className="stat-label">Schedules</div>
          <div className="stat-num">{schedules.length}</div>
        </div>
        {conflicts.length>0&&(
          <div className="stat-card" style={{border:'1px solid rgba(248,81,73,0.4)'}}>
            <div className="stat-icon">⚠️</div>
            <div className="stat-label" style={{color:'var(--danger)'}}>Conflicts</div>
            <div className="stat-num" style={{color:'var(--danger)'}}>{conflicts.length}</div>
          </div>
        )}
      </div>

      <div className="grid-2" style={{gap:16}}>
        <div className="card">
          <div className="card-header">
            <span className="card-title">📊 Section Completion</span>
            <span className="tag tag-blue">{sections.length} sections</span>
          </div>
          {sections.length===0&&<p className="text-muted text-sm">No sections yet.</p>}
          {sections.map(sec=>{
            const{pct,placed,total}=getSectionCompletion(sec);
            const clr=pct>=80?'var(--accent3)':pct>=40?'var(--accent5)':'var(--danger)';
            return(
              <div key={sec.id} className="completion-row">
                <span className="completion-label">{sec.name}</span>
                <div className="progress-bar" style={{flex:1}}>
                  <div className="progress-fill" style={{width:pct+'%',background:clr}}/>
                </div>
                <span className="completion-pct" style={{color:clr}}>{pct}%</span>
                <span style={{fontSize:11,color:'var(--text3)',minWidth:60}}>{placed}/{total} sessions</span>
              </div>
            );
          })}
        </div>

        <div className="card">
          <div className="card-header">
            <span className="card-title">👩‍🏫 Teacher Workload</span>
            <span className="tag tag-green">{teachers.length} teachers</span>
          </div>
          {teachers.length===0&&<p className="text-muted text-sm">No teachers yet.</p>}
          {teachers.map(t=>{
            const{hrs,pct}=teacherWorkload(t);
            const clr=pct>=90?'var(--danger)':pct>=60?'var(--accent5)':'var(--accent2)';
            return(
              <div key={t.id} className="completion-row">
                <span className="completion-label">{t.name.split(' ')[0]}</span>
                <div className="progress-bar" style={{flex:1}}>
                  <div className="progress-fill" style={{width:pct+'%',background:clr}}/>
                </div>
                <span className="completion-pct" style={{color:clr}}>{hrs.toFixed(1)}h</span>
                <span style={{fontSize:11,color:'var(--text3)',minWidth:50}}>/{t.maxHoursPerWeek}h</span>
              </div>
            );
          })}
        </div>
      </div>

      {conflicts.length>0&&(
        <div className="card mt-16">
          <div className="card-header">
            <span className="card-title text-danger">⚠ Conflicts Detected</span>
            <span className="tag tag-red">{conflicts.length}</span>
          </div>
          {conflicts.slice(0,6).map((c,i)=>(
            <div key={i} className="conflict-alert">{c.type.toUpperCase()}: {c.msg}</div>
          ))}
          {conflicts.length>6&&<p className="text-muted text-sm">+ {conflicts.length-6} more conflicts...</p>}
        </div>
      )}
    </div>
  );
};

/* ===================== TEACHERS PAGE ===================== */
const TeachersPage=({teachers,setTeachers,subjects,schedules,timeSettings,toast})=>{
  const [search,setSearch]=useState('');
  const [editing,setEditing]=useState(null);
  const [confirm,setConfirm]=useState(null);
  const empty={id:'',name:'',email:'',maxHoursPerWeek:30,maxClassesPerDay:6,maxClassesPerSubjectPerWeek:5,subjects:[],availability:[...DAYS],subjectAvailability:{},responsibilities:[]};

  const filtered=teachers.filter(t=>t.name.toLowerCase().includes(search.toLowerCase())||t.email.toLowerCase().includes(search.toLowerCase()));

  const save=()=>{
    if(!editing.name.trim()){toast('Name is required','error');return;}
    if(editing.id){
      setTeachers(ts=>ts.map(t=>t.id===editing.id?editing:t));
      toast('Teacher updated','success');
    }else{
      setTeachers(ts=>[...ts,{...editing,id:uid()}]);
      toast('Teacher added','success');
    }
    setEditing(null);
  };

  const del=(id)=>{
    setTeachers(ts=>ts.filter(t=>t.id!==id));
    toast('Teacher deleted','success');
    setConfirm(null);
  };

  const toggleSubj=(sid)=>setEditing(e=>{const already=e.subjects.includes(sid);const newSubjs=already?e.subjects.filter(x=>x!==sid):[...e.subjects,sid];const newSA={...e.subjectAvailability};if(!already)newSA[sid]=newSA[sid]||[...DAYS];else delete newSA[sid];return{...e,subjects:newSubjs,subjectAvailability:newSA};});

  return(
    <div className="page-content">
      <div className="flex items-center justify-between mb-16">
        <div>
          <h2 style={{fontFamily:'Syne',fontSize:18,fontWeight:800}}>Teachers</h2>
          <p className="text-muted text-sm mt-8">{teachers.length} teacher(s) registered</p>
        </div>
        <div className="flex gap-8">
          <div className="search-bar">
            <span className="search-icon">🔍</span>
            <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search teachers..."/>
          </div>
          <button className="btn btn-primary" onClick={()=>setEditing({...empty})}>+ Add Teacher</button>
        </div>
      </div>

      <div className="card">
        <div className="table-wrap">
          <table>
            <thead><tr>
              <th>Name</th><th>Email</th><th>Max Hrs/Wk</th><th>Max Classes/Day</th><th>Subjects</th><th>Responsibilities</th><th>Available Days</th><th>Actions</th>
            </tr></thead>
            <tbody>
              {filtered.length===0&&<tr><td colSpan={8} style={{textAlign:'center',color:'var(--text3)',padding:24}}>No teachers found.</td></tr>}
              {filtered.map(t=>(
                <tr key={t.id}>
                  <td><strong>{t.name}</strong></td>
                  <td className="text-muted">{t.email}</td>
                  <td>{t.maxHoursPerWeek}h</td>
                  <td>{t.maxClassesPerDay}</td>
                  <td>
                    <div style={{display:'flex',gap:3,flexWrap:'wrap'}}>
                      {t.subjects.map(sid=>{
                        const sub=subjects.find(s=>s.id===sid);
                        return sub?<span key={sid} className="tag tag-blue">{sub.name}</span>:null;
                      })}
                      {t.subjects.length===0&&<span className="text-muted text-xs">None</span>}
                    </div>
                  </td>
                  <td>
                    {(t.responsibilities||[]).length>0
                      ?<div style={{display:'flex',flexDirection:'column',gap:2}}>
                          {(t.responsibilities||[]).map((r,i)=>(
                            <div key={i} style={{display:'flex',alignItems:'center',gap:4}}>
                              <span style={{fontSize:10,padding:'1px 6px',borderRadius:10,background:'rgba(255,166,87,0.12)',color:'var(--accent5)',border:'1px solid rgba(255,166,87,0.25)',fontWeight:600,whiteSpace:'nowrap'}}>{r.label}</span>
                              <span style={{fontSize:10,color:'var(--text3)'}}>{r.hoursPerWeek}h</span>
                            </div>
                          ))}
                          <div style={{fontSize:10,color:'var(--accent5)',fontWeight:700,marginTop:1}}>Total: {(t.responsibilities||[]).reduce((a,r)=>a+r.hoursPerWeek,0)}h/wk</div>
                        </div>
                      :<span className="text-muted text-xs">None</span>
                    }
                  </td>
                  <td>
                    <div style={{display:'flex',flexDirection:'column',gap:3}}>
                      {t.subjects.map(sid=>{
                        const sub=subjects.find(x=>x.id===sid);
                        if(!sub)return null;
                        const days=(t.subjectAvailability&&t.subjectAvailability[sid])||t.availability||DAYS;
                        return(
                          <div key={sid} style={{display:'flex',alignItems:'center',gap:4}}>
                            <span style={{fontSize:10,color:'var(--text2)',minWidth:85,fontWeight:600}}>{sub.name}:</span>
                            <div style={{display:'flex',gap:2}}>
                              {DAYS.map(d=><span key={d} style={{fontSize:9,padding:'1px 4px',borderRadius:3,fontWeight:700,background:days.includes(d)?'rgba(63,185,80,0.2)':'rgba(100,100,100,0.1)',color:days.includes(d)?'var(--accent3)':'var(--text3)',border:'1px solid '+(days.includes(d)?'rgba(63,185,80,0.4)':'transparent')}}>{d.slice(0,3)}</span>)}
                            </div>
                          </div>
                        );
                      })}
                      {t.subjects.length===0&&<span className="text-muted text-xs">No subjects</span>}
                    </div>
                  </td>
                  <td>
                    <div className="flex gap-8">
                      <button className="btn btn-secondary btn-xs" onClick={()=>{
                        const migrated={...t};
                        if(!migrated.subjectAvailability){
                          migrated.subjectAvailability={};
                          (migrated.subjects||[]).forEach(sid=>{migrated.subjectAvailability[sid]=[...(migrated.availability||DAYS)];});
                        }
                        setEditing(migrated);
                      }}>Edit</button>
                      <button className="btn btn-danger btn-xs" onClick={()=>setConfirm({id:t.id,name:t.name})}>Del</button>
                    </div>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>

      {/* ── Teacher Load Monitoring Panel ── */}
      {teachers.length>0&&(
        <div className="card mt-16">
          <div className="card-header">
            <span className="card-title">📊 Teacher Load Monitoring</span>
            <span className="text-muted text-xs">Based on current schedules</span>
          </div>
          <div style={{display:'flex',flexDirection:'column',gap:8}}>
            {teachers.map(t=>{
              const tchSched=schedules.filter(s=>s.teacherId===t.id);
              const teachingHrs=tchSched.reduce((acc,s)=>{const p=parseSlotLabel(s.timeSlot);return acc+(p?(p.endMin-p.startMin)/60:0);},0);
              const respHrs=(t.responsibilities||[]).reduce((a,r)=>a+r.hoursPerWeek,0);
              const totalHrs=teachingHrs+respHrs;
              const maxHrs=t.maxHoursPerWeek||30;
              const pct=Math.min(100,Math.round(totalHrs/maxHrs*100));
              const remaining=Math.max(0,maxHrs-totalHrs);
              const status=totalHrs>=maxHrs?'over':pct>=80?'near':'ok';
              const barColor=status==='over'?'var(--danger)':status==='near'?'var(--accent5)':'var(--accent3)';
              const bgColor=status==='over'?'rgba(248,81,73,0.06)':status==='near'?'rgba(255,166,87,0.06)':'transparent';
              const dayHrs={};
              DAYS.forEach(d=>{dayHrs[d]=tchSched.filter(s=>s.day===d).reduce((acc,s)=>{const p=parseSlotLabel(s.timeSlot);return acc+(p?(p.endMin-p.startMin)/60:0);},0);});
              const subjIds=[...new Set(tchSched.map(s=>s.subjectId))];
              return(
                <div key={t.id} style={{padding:'10px 12px',borderRadius:8,border:'1px solid var(--border)',background:bgColor}}>
                  <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:6}}>
                    <div style={{flex:1}}>
                      <div style={{display:'flex',alignItems:'center',gap:8}}>
                        <span style={{fontWeight:700,fontSize:13}}>{t.name}</span>
                        {status==='over'&&<span style={{fontSize:10,fontWeight:700,color:'var(--danger)',background:'rgba(248,81,73,0.15)',padding:'1px 7px',borderRadius:10}}>⚠ OVERLOADED</span>}
                        {status==='near'&&<span style={{fontSize:10,fontWeight:700,color:'var(--accent5)',background:'rgba(255,166,87,0.15)',padding:'1px 7px',borderRadius:10}}>⚡ NEAR LIMIT</span>}
                        {status==='ok'&&<span style={{fontSize:10,fontWeight:700,color:'var(--accent3)',background:'rgba(63,185,80,0.12)',padding:'1px 7px',borderRadius:10}}>✓ OK</span>}
                      </div>
                      <div style={{display:'flex',gap:12,marginTop:2,fontSize:11,color:'var(--text2)'}}>
                        <span><strong style={{color:'var(--text)'}}>{totalHrs.toFixed(1)}h</strong> total load</span>
                        <span style={{color:'var(--text3)'}}>({teachingHrs.toFixed(1)}h teaching{respHrs>0?' + '+respHrs.toFixed(1)+'h roles':''})</span>
                        <span>/ <strong style={{color:'var(--text)'}}>{maxHrs}h</strong> max</span>
                        <span style={{color:remaining===0?'var(--danger)':'var(--accent3)'}}>{remaining.toFixed(1)}h left</span>
                      </div>
                    </div>
                    <div style={{display:'flex',alignItems:'center',gap:8,minWidth:170}}>
                      <div style={{flex:1,background:'var(--bg4)',borderRadius:4,height:8,overflow:'hidden'}}>
                        <div style={{width:pct+'%',height:8,background:barColor,borderRadius:4,transition:'width .3s'}}/>
                      </div>
                      <span style={{fontSize:12,fontWeight:700,color:barColor,minWidth:38}}>{pct}%</span>
                    </div>
                  </div>
                  <div style={{display:'flex',gap:4,flexWrap:'wrap',marginBottom:subjIds.length>0?6:0}}>
                    {DAYS.map(d=>{
                      const dh=dayHrs[d]||0;
                      return(
                        <div key={d} style={{display:'flex',flexDirection:'column',alignItems:'center',gap:1,minWidth:46,padding:'4px 5px',background:'var(--bg3)',borderRadius:6,border:'1px solid var(--border)'}}>
                          <span style={{fontSize:9,fontWeight:700,color:'var(--text3)',textTransform:'uppercase'}}>{d.slice(0,3)}</span>
                          <span style={{fontSize:11,fontWeight:700,color:dh>0?barColor:'var(--text3)'}}>{dh>0?dh.toFixed(1)+'h':'—'}</span>
                        </div>
                      );
                    })}
                  </div>
                  {subjIds.length>0&&(
                    <div style={{display:'flex',gap:3,flexWrap:'wrap'}}>
                      {subjIds.map(sid=>{const sub=subjects.find(x=>x.id===sid);return sub?<span key={sid} className="tag tag-blue" style={{fontSize:10}}>{sub.name}</span>:null;})}
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        </div>
      )}

      {editing&&(
        <div className="modal-overlay" onClick={()=>setEditing(null)}>
          <div className="modal" onClick={e=>e.stopPropagation()}>
            <div className="modal-header">
              <span className="modal-title">{editing.id?'Edit Teacher':'Add Teacher'}</span>
              <button className="modal-close" onClick={()=>setEditing(null)}>×</button>
            </div>
            <div className="modal-body">
              <div className="grid-2">
                <div className="form-group">
                  <label className="form-label">Full Name *</label>
                  <input className="form-input" value={editing.name} onChange={e=>setEditing(v=>({...v,name:e.target.value}))} placeholder="e.g. Maria Santos"/>
                </div>
                <div className="form-group">
                  <label className="form-label">Email</label>
                  <input className="form-input" value={editing.email} onChange={e=>setEditing(v=>({...v,email:e.target.value}))} placeholder="email@school.edu.ph"/>

              </div>

                <div className="form-group">
                  <label className="form-label">Max Hours/Week</label>

                </div>
                <div className="form-group">
                  <label className="form-label">Max Classes/Day</label>
                  <input type="number" className="form-input" value={editing.maxClassesPerDay} onChange={e=>setEditing(v=>({...v,maxClassesPerDay:+e.target.value}))} min={1} max={12}/>
                </div>
                <div className="form-group">
                  <label className="form-label">Max Classes/Subject/Week</label>
                  <input type="number" className="form-input" value={editing.maxClassesPerSubjectPerWeek} onChange={e=>setEditing(v=>({...v,maxClassesPerSubjectPerWeek:+e.target.value}))} min={1} max={10}/>
                </div>
              </div>
              <div className="form-group">
                <label className="form-label">Subjects & Available Days</label>
                <p style={{fontSize:11,color:'var(--text3)',marginBottom:8}}>Select a subject to assign it, then set which days the teacher can teach that subject.</p>

                <div style={{display:'flex',flexDirection:'column',gap:6}}>
                  {subjects.map(s=>{
                    const assigned=editing.subjects.includes(s.id);
                    const days=(editing.subjectAvailability&&editing.subjectAvailability[s.id])||[...DAYS];
                    const toggleSubjDay=(d)=>setEditing(v=>{
                      const cur=(v.subjectAvailability&&v.subjectAvailability[s.id])||[...DAYS];
                      const next=cur.includes(d)?cur.filter(x=>x!==d):[...cur,d];
                      return{...v,subjectAvailability:{...v.subjectAvailability,[s.id]:next}};

                    return(
                      <div key={s.id} style={{border:'1px solid '+(assigned?'rgba(88,166,255,0.35)':'var(--border)'),borderRadius:8,padding:'8px 10px',background:assigned?'rgba(88,166,255,0.05)':'var(--bg3)',transition:'all .15s'}}>

                        {assigned&&(
                          <div style={{paddingLeft:26}}>

                            <div style={{display:'flex',gap:4}}>
                              {DAYS.map(d=>{
                                const on=days.includes(d);
                                return(

/* ===================== SUBJECTS PAGE ===================== */

                  <div style={{marginTop:6,fontSize:11,color:'var(--danger)'}}>⚠ Please select at least one day.</div>

                  <div style={{marginTop:6,fontSize:11,color:'var(--accent5)'}}>

      <ConfirmModal open={!!confirm} title="Delete Subject" msg={'Delete "'+confirm?.name+'"?'} onConfirm={()=>{setSubjects(ss=>ss.filter(s=>s.id!==confirm.id));toast('Subject deleted','success');setConfirm(null);}} onCancel={()=>setConfirm(null)}/>

  );
};

/* ===================== SECTIONS PAGE ===================== */
const SectionsPage=({sections,setSections,teachers,subjects,rooms,toast})=>{
  const [editing,setEditing]=useState(null);
  const [confirm,setConfirm]=useState(null);
  const [subjectToAdd,setSubjectToAdd]=useState('');
  const [unitsToAdd,setUnitsToAdd]=useState(3);
  const [copyFromId,setCopyFromId]=useState('');
  const empty={id:'',name:'',gradeLevel:'Grade 7',strand:'',adviser:'',defaultRoomId:'',sectionSubjects:[]};
  const isJHS=(g)=>['Grade 7','Grade 8','Grade 9','Grade 10'].includes(g);

  const getAdviserConflict=(teacherId)=>{
    if(!teacherId)return null;
    const conflict=sections.find(s=>s.adviser===teacherId&&s.id!==editing?.id);
    return conflict||null;
  };

  const save=()=>{
    if(!editing.name.trim()){toast('Name required','error');return;}
    if(editing.adviser&&getAdviserConflict(editing.adviser)){
      const conflict=getAdviserConflict(editing.adviser);
      toast('⚠ '+teachers.find(t=>t.id===editing.adviser)?.name+' is already adviser of '+conflict.name,'error');
      return;
    }
    const toSave={...editing,sectionSubjects:editing.sectionSubjects||[]};
    if(editing.id){setSections(ss=>ss.map(s=>s.id===editing.id?toSave:s));toast('Section updated','success');}
    else{setSections(ss=>[...ss,{...toSave,id:uid()}]);toast('Section added','success');}
    setEditing(null);
  };

  const addSubjectToSection=()=>{
    if(!subjectToAdd){toast('Select a subject first','error');return;}
    const cur=editing.sectionSubjects||[];
    if(cur.some(x=>x.subjectId===subjectToAdd)){toast('Subject already added','warn');return;}
    setEditing(v=>({...v,sectionSubjects:[...cur,{subjectId:subjectToAdd,units:unitsToAdd}]}));
    setSubjectToAdd('');
    setUnitsToAdd(3);
  };

  const removeSubjectFromSection=(subjectId)=>{
    setEditing(v=>({...v,sectionSubjects:(v.sectionSubjects||[]).filter(x=>x.subjectId!==subjectId)}));
  };

  const updateUnits=(subjectId,units)=>{
    setEditing(v=>({...v,sectionSubjects:(v.sectionSubjects||[]).map(x=>x.subjectId===subjectId?{...x,units}:x)}));
  };

  const copySubjectsFrom=(fromId)=>{
    if(!fromId)return;
    const src=sections.find(s=>s.id===fromId);
    if(!src||(src.sectionSubjects||[]).length===0){toast('No subjects to copy from that section','warn');return;}
    const cur=editing.sectionSubjects||[];
    const toAdd=(src.sectionSubjects||[]).filter(ss=>!cur.some(x=>x.subjectId===ss.subjectId));
    if(toAdd.length===0){toast('All subjects already added','warn');return;}
    setEditing(v=>({...v,sectionSubjects:[...cur,...toAdd]}));
    toast('Copied '+toAdd.length+' subject(s) from '+src.name,'success');
    setCopyFromId('');
  };

  return(
    <div className="page-content">
      <div className="flex items-center justify-between mb-16">
        <div>
          <h2 style={{fontFamily:'Syne',fontSize:18,fontWeight:800}}>Sections</h2>
          <p className="text-muted text-sm mt-8">{sections.length} section(s) defined</p>
        </div>
        <button className="btn btn-primary" onClick={()=>{setSubjectToAdd('');setUnitsToAdd(3);setCopyFromId('');setEditing({...empty});}}>+ Add Section</button>
      </div>
      <div className="card">
        <div className="table-wrap">
          <table>
            <thead><tr><th>Section</th><th>Grade Level</th><th>Strand</th><th>Adviser</th><th>Default Room</th><th>Subjects</th><th>Actions</th></tr></thead>
            <tbody>
              {sections.length===0&&<tr><td colSpan={7} style={{textAlign:'center',color:'var(--text3)',padding:24}}>No sections yet.</td></tr>}
              {sections.map(s=>{
                const adv=teachers.find(t=>t.id===s.adviser);
                const defRoom=rooms.find(r=>r.id===s.defaultRoomId);
                const secSubs=s.sectionSubjects||[];
                return(
                  <tr key={s.id}>
                    <td><strong>{s.name}</strong></td>
                    <td><span className="tag tag-blue">{s.gradeLevel}</span></td>
                    <td>{s.strand?<span className="tag tag-purple">{s.strand}</span>:<span className="text-muted text-xs">JHS Core</span>}</td>
                    <td>{adv?adv.name:<span className="text-muted text-xs">—</span>}</td>
                    <td>{defRoom?<span className="tag tag-green">{defRoom.name}</span>:<span className="text-muted text-xs">—</span>}</td>
                    <td>
                      {secSubs.length===0
                        ?<span className="text-muted text-xs">No subjects assigned</span>
                        :<div style={{display:'flex',gap:4,flexWrap:'wrap'}}>
                          {secSubs.map(ss=>{
                            const sub=subjects.find(x=>x.id===ss.subjectId);
                            return sub?<span key={ss.subjectId} className="tag tag-blue" style={{fontSize:10}}>{sub.name} <span style={{opacity:0.7}}>({ss.units}u)</span></span>:null;
                          })}
                        </div>
                      }
                    </td>
                    <td>
                      <div className="flex gap-8">
                        <button className="btn btn-secondary btn-xs" onClick={()=>{setSubjectToAdd('');setUnitsToAdd(3);setCopyFromId('');setEditing({...s,sectionSubjects:s.sectionSubjects||[],defaultRoomId:s.defaultRoomId||''});}}>Edit</button>
                        <button className="btn btn-danger btn-xs" onClick={()=>setConfirm(s)}>Del</button>
                      </div>
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      </div>
      {editing&&(
        <div className="modal-overlay" onClick={()=>setEditing(null)}>
          <div className="modal modal-lg" onClick={e=>e.stopPropagation()}>
            <div className="modal-header">
              <span className="modal-title">{editing.id?'Edit Section':'Add Section'}</span>
              <button className="modal-close" onClick={()=>setEditing(null)}>×</button>
            </div>
            <div className="modal-body">
              <div className="form-group"><label className="form-label">Section Name *</label><input className="form-input" value={editing.name} onChange={e=>setEditing(v=>({...v,name:e.target.value}))} placeholder="e.g. 7-Rizal"/></div>
              <div className="grid-2">
                <div className="form-group"><label className="form-label">Grade Level</label>
                  <select className="form-select" value={editing.gradeLevel} onChange={e=>setEditing(v=>({...v,gradeLevel:e.target.value,strand:isJHS(e.target.value)?'':v.strand}))}>
                    {GRADE_LEVELS.map(g=><option key={g}>{g}</option>)}
                  </select>
                </div>
                <div className="form-group"><label className="form-label">SHS Strand</label>
                  <select className="form-select" value={editing.strand} onChange={e=>setEditing(v=>({...v,strand:e.target.value}))} disabled={isJHS(editing.gradeLevel)}>
                    <option value="">None (Core)</option>
                    {SHS_STRANDS.map(s=><option key={s}>{s}</option>)}
                  </select>
                </div>
              </div>

              <div className="grid-2">
                {/* Adviser */}
                <div className="form-group">
                  <label className="form-label">Adviser</label>
                  <select className="form-select"
                    value={editing.adviser}
                    onChange={e=>setEditing(v=>({...v,adviser:e.target.value}))}
                    style={editing.adviser&&getAdviserConflict(editing.adviser)?{borderColor:'var(--danger)'}:{}}
                  >
                    <option value="">— Select Adviser —</option>
                    {teachers.map(t=>{
                      const conflict=sections.find(s=>s.adviser===t.id&&s.id!==editing.id);
                      return(
                        <option key={t.id} value={t.id}>
                          {t.name}{conflict?' ⚠ (Adviser of '+conflict.name+')':''}
                        </option>
                      );
                    })}
                  </select>
                  {editing.adviser&&getAdviserConflict(editing.adviser)&&(()=>{
                    const conflict=getAdviserConflict(editing.adviser);
                    const tch=teachers.find(t=>t.id===editing.adviser);
                    return(
                      <div style={{marginTop:6,padding:'8px 12px',background:'rgba(248,81,73,0.12)',border:'1px solid rgba(248,81,73,0.4)',borderRadius:6,fontSize:12,color:'var(--danger)',display:'flex',alignItems:'center',gap:8}}>
                        <span style={{fontSize:15}}>⚠️</span>
                        <span><strong>{tch?.name}</strong> is already the adviser of <strong>{conflict.name}</strong>. Please select a different teacher.</span>
                      </div>
                    );
                  })()}
                </div>

                {/* Default Room */}
                <div className="form-group">
                  <label className="form-label">🏫 Default Room</label>
                  <select className="form-select"
                    value={editing.defaultRoomId||''}
                    onChange={e=>setEditing(v=>({...v,defaultRoomId:e.target.value}))}
                  >
                    <option value="">— Select Default Room —</option>
                    {rooms.map(r=>(
                      <option key={r.id} value={r.id}>{r.name} ({r.type})</option>
                    ))}
                  </select>
                  <p style={{fontSize:11,color:'var(--text3)',marginTop:4}}>Used by the auto-scheduler as the preferred room for this section.</p>
                </div>
              </div>

              {/* Subject Assignment */}
              <div style={{borderTop:'1px solid var(--border)',paddingTop:14,marginTop:4}}>
                <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:10}}>
                  <div style={{fontFamily:'Syne',fontSize:13,fontWeight:700,color:'var(--text)'}}>📚 Assign Subjects & Units</div>
                  {sections.filter(s=>s.id!==editing.id&&(s.sectionSubjects||[]).length>0).length>0&&(
                    <div style={{display:'flex',gap:6,alignItems:'center'}}>
                      <select
                        className="form-select"
                        style={{padding:'4px 8px',fontSize:12,width:'auto',minWidth:160}}
                        value={copyFromId}
                        onChange={e=>setCopyFromId(e.target.value)}
                      >
                        <option value="">📋 Copy subjects from...</option>
                        {sections.filter(s=>s.id!==editing.id&&(s.sectionSubjects||[]).length>0).map(s=>(
                          <option key={s.id} value={s.id}>{s.name} ({(s.sectionSubjects||[]).length} subjects)</option>
                        ))}
                      </select>
                      <button
                        className="btn btn-info btn-sm"
                        style={{whiteSpace:'nowrap',fontSize:12}}
                        onClick={()=>copySubjectsFrom(copyFromId)}
                        disabled={!copyFromId}
                      >Copy</button>
                    </div>
                  )}
                </div>

                <div style={{display:'flex',gap:8,alignItems:'flex-end',marginBottom:10}}>
                  <div style={{flex:1}}>
                    <label className="form-label">Subject</label>
                    <select className="form-select" value={subjectToAdd} onChange={e=>setSubjectToAdd(e.target.value)}>
                      <option value="">— Select Subject —</option>
                      {subjects.filter(sub=>!(editing.sectionSubjects||[]).some(x=>x.subjectId===sub.id)).map(sub=>(
                        <option key={sub.id} value={sub.id}>{sub.name}</option>
                      ))}
                    </select>
                  </div>
                  <div style={{width:90}}>
                    <label className="form-label">Units</label>
                    <input type="number" className="form-input" value={unitsToAdd} onChange={e=>setUnitsToAdd(Math.max(1,+e.target.value))} min={1} max={10}/>
                  </div>
                  <button className="btn btn-success" style={{marginBottom:0,whiteSpace:'nowrap'}} onClick={addSubjectToSection}>+ Add</button>
                </div>

                {(editing.sectionSubjects||[]).length===0
                  ?<div style={{textAlign:'center',padding:'14px 0',color:'var(--text3)',fontSize:12,background:'var(--bg3)',borderRadius:6}}>No subjects assigned yet. Add subjects above or copy from another section.</div>
                  :<div style={{border:'1px solid var(--border)',borderRadius:6,overflow:'hidden'}}>
                    <table style={{width:'100%',borderCollapse:'collapse'}}>
                      <thead><tr style={{background:'var(--bg3)'}}>
                        <th style={{padding:'7px 12px',textAlign:'left',fontSize:11,color:'var(--text2)',fontWeight:700}}>Subject</th>
                        <th style={{padding:'7px 12px',textAlign:'center',fontSize:11,color:'var(--text2)',fontWeight:700,width:100}}>Units</th>
                        <th style={{padding:'7px 12px',textAlign:'center',fontSize:11,color:'var(--text2)',fontWeight:700,width:60}}></th>
                      </tr></thead>
                      <tbody>
                        {(editing.sectionSubjects||[]).map((ss,i)=>{
                          const sub=subjects.find(x=>x.id===ss.subjectId);
                          return(
                            <tr key={ss.subjectId} style={{borderTop:'1px solid var(--border)'}}>
                              <td style={{padding:'8px 12px',fontSize:13}}>{sub?sub.name:<span style={{color:'var(--danger)'}}>Unknown</span>}</td>
                              <td style={{padding:'8px 12px',textAlign:'center'}}>
                                <input type="number" style={{width:60,textAlign:'center',padding:'4px 6px',background:'var(--bg3)',border:'1px solid var(--border)',borderRadius:4,color:'var(--text)',fontSize:13}} value={ss.units} onChange={e=>updateUnits(ss.subjectId,Math.max(1,+e.target.value))} min={1} max={10}/>
                              </td>
                              <td style={{padding:'8px 12px',textAlign:'center'}}>
                                <button className="btn btn-danger btn-xs" onClick={()=>removeSubjectFromSection(ss.subjectId)}>✕</button>
                              </td>
                            </tr>
                          );
                        })}
                      </tbody>
                    </table>
                  </div>
                }
              </div>
            </div>
            <div className="modal-footer">
              <button className="btn btn-secondary" onClick={()=>setEditing(null)}>Cancel</button>
              <button
                className="btn btn-primary"
                onClick={save}
                disabled={!!(editing.adviser&&getAdviserConflict(editing.adviser))}
                title={editing.adviser&&getAdviserConflict(editing.adviser)?'Resolve adviser conflict first':'Save section'}
              >Save Section</button>
            </div>
          </div>
        </div>
      )}
      <ConfirmModal open={!!confirm} title="Delete Section" msg={'Delete "'+confirm?.name+'"?'} onConfirm={()=>{setSections(ss=>ss.filter(s=>s.id!==confirm.id));toast('Section deleted','success');setConfirm(null);}} onCancel={()=>setConfirm(null)}/>
    </div>
  );
};

/* ===================== SUBJECT PICKER COMPONENT ===================== */
const SubjectPicker=({sectionId,sections,subjects,schedules,teachers,rooms,editingId,selectedId,onSelect})=>{
  const [open,setOpen]=useState(false);
  const [hoverPopup,setHoverPopup]=useState(null);
  const [popupPos,setPopupPos]=useState({top:0,left:0});
  const wrapRef=React.useRef(null);

  // Close dropdown on outside click
  React.useEffect(()=>{
    const handler=(e)=>{if(wrapRef.current&&!wrapRef.current.contains(e.target))setOpen(false);};
    document.addEventListener('mousedown',handler);
    return()=>document.removeEventListener('mousedown',handler);
  },[]);

  const getSubjectInfo=(subId)=>{
    const sec=sections.find(s=>s.id===sectionId);
    const ss=(sec&&sec.sectionSubjects||[]).find(x=>x.subjectId===subId);
    const units=ss?ss.units:0;
    const existing=schedules.filter(s=>s.sectionId===sectionId&&s.subjectId===subId&&s.id!==editingId);
    const scheduled=existing.length;
    const isComplete=units>0&&scheduled>=units;
    const isOver=units>0&&scheduled>units;
    const pct=units>0?Math.min(100,Math.round(scheduled/units*100)):0;
    const byDay={};
    existing.forEach(s=>{if(!byDay[s.day])byDay[s.day]=[];byDay[s.day].push(s);});
    return{units,scheduled,isComplete,isOver,pct,byDay,existing};
  };

  // Build options list
  const sec=sections.find(s=>s.id===sectionId);
  const secSubs=sec&&(sec.sectionSubjects||[]).length>0?sec.sectionSubjects:null;
  const options=secSubs
    ?secSubs.map(ss=>{const sub=subjects.find(x=>x.id===ss.subjectId);return sub?{id:sub.id,name:sub.name,units:ss.units}:null;}).filter(Boolean)
    :subjects.map(s=>({id:s.id,name:s.name,units:0}));

  const selectedSub=options.find(o=>o.id===selectedId);

  const showPopup=(e,subId)=>{
    const rect=e.currentTarget.getBoundingClientRect();
    setPopupPos({top:rect.top,left:rect.right+10});
    setHoverPopup(subId);
  };

  const DAYS=['Monday','Tuesday','Wednesday','Thursday','Friday'];

  return(
    <div ref={wrapRef} style={{position:'relative'}}>
      {/* Trigger button */}
      <div
        className="form-select"
        style={{cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'space-between',userSelect:'none'}}
        onClick={()=>setOpen(o=>!o)}
      >
        <span style={{color:selectedSub?'var(--text)':'var(--text3)'}}>
          {selectedSub?`${selectedSub.name}${selectedSub.units?` (${selectedSub.units} units)`:''}`:'— Select Subject —'}
        </span>
        <span style={{fontSize:10,color:'var(--text3)',marginLeft:8}}>{open?'▲':'▼'}</span>
      </div>

      {/* Dropdown list */}
      {open&&(
        <div style={{
          position:'absolute',top:'calc(100% + 4px)',left:0,right:0,zIndex:9000,
          background:'var(--bg2)',border:'1px solid var(--border-light)',
          borderRadius:10,overflow:'hidden',
          boxShadow:'0 12px 40px rgba(0,0,0,0.6)',
          maxHeight:260,overflowY:'auto',
        }}>
          {/* Blank option */}
          <div
            style={{padding:'8px 12px',cursor:'pointer',fontSize:13,color:'var(--text3)',borderBottom:'1px solid var(--border)'}}
            onClick={()=>{onSelect('');setOpen(false);setHoverPopup(null);}}
          >— Select Subject —</div>

          {options.map(opt=>{
            const info=getSubjectInfo(opt.id);
            const isSelected=selectedId===opt.id;
            const clr=info.isOver?'var(--danger)':info.isComplete?'var(--accent3)':info.scheduled>0?'var(--accent2)':'var(--text3)';
            const icon=info.isOver?'⛔':info.isComplete?'✅':info.scheduled>0?'📌':null;
            return(
              <div
                key={opt.id}
                style={{
                  padding:'9px 12px',cursor:'pointer',
                  background:isSelected?'rgba(79,158,255,0.1)':'transparent',
                  borderBottom:'1px solid rgba(255,255,255,0.04)',
                  display:'flex',alignItems:'center',gap:8,
                  transition:'background .12s',
                }}
                onClick={()=>{onSelect(opt.id);setOpen(false);setHoverPopup(null);}}
                onMouseEnter={e=>{e.currentTarget.style.background=isSelected?'rgba(79,158,255,0.15)':'rgba(255,255,255,0.04)';showPopup(e,opt.id);}}
                onMouseLeave={e=>{e.currentTarget.style.background=isSelected?'rgba(79,158,255,0.1)':'transparent';setHoverPopup(null);}}
              >
                {/* Subject name */}
                <span style={{flex:1,fontSize:13,color:isSelected?'var(--accent2)':'var(--text)',fontWeight:isSelected?600:400}}>
                  {opt.name}{opt.units>0?` (${opt.units} units)`:''}
                </span>
                {/* Status indicator */}
                {icon&&<span style={{fontSize:13}}>{icon}</span>}
                {info.units>0&&(
                  <div style={{display:'flex',alignItems:'center',gap:5,flexShrink:0}}>
                    <div style={{width:40,height:4,background:'rgba(255,255,255,0.1)',borderRadius:99,overflow:'hidden'}}>
                      <div style={{width:info.pct+'%',height:'100%',background:clr,borderRadius:99}}/>
                    </div>
                    <span style={{fontSize:10,color:clr,fontWeight:700,minWidth:28}}>{info.scheduled}/{info.units}</span>
                  </div>
                )}
                {isSelected&&<span style={{color:'var(--accent2)',fontSize:12,fontWeight:700}}>✓</span>}
              </div>
            );
          })}
        </div>
      )}

      {/* Hover popup (fixed position) */}
      {hoverPopup&&open&&(()=>{
        const info=getSubjectInfo(hoverPopup);
        const sub=subjects.find(x=>x.id===hoverPopup);
        const clr=info.isOver?'var(--danger)':info.isComplete?'var(--accent3)':'var(--accent2)';
        const icon=info.isOver?'⛔':info.isComplete?'✅':info.scheduled>0?'📌':'📋';
        return(
          <div style={{
            position:'fixed',top:Math.min(popupPos.top,window.innerHeight-380),left:popupPos.left,
            zIndex:99999,background:'var(--bg2)',border:'1px solid var(--border-light)',
            borderRadius:12,padding:14,width:280,
            boxShadow:'0 16px 48px rgba(0,0,0,0.7)',pointerEvents:'none',
          }}>
            <div style={{fontFamily:'Syne,sans-serif',fontWeight:700,fontSize:13,color:'var(--text)',marginBottom:10,display:'flex',alignItems:'center',gap:8}}>
              <span>{icon}</span><span>{sub&&sub.name}</span>
            </div>
            {/* Progress */}
            <div style={{marginBottom:10}}>
              <div style={{display:'flex',justifyContent:'space-between',fontSize:11,marginBottom:4}}>
                <span style={{color:'var(--text2)'}}>Schedule Progress</span>
                <span style={{color:clr,fontWeight:700}}>{info.scheduled}/{info.units} days ({info.pct}%)</span>
              </div>
              <div style={{background:'var(--bg4)',borderRadius:99,height:6,overflow:'hidden'}}>
                <div style={{width:info.pct+'%',background:clr,height:'100%',borderRadius:99}}/>
              </div>
              <div style={{marginTop:4,fontSize:11,color:clr,fontWeight:600}}>
                {info.isOver?`⚠ ${info.scheduled-info.units} day(s) over limit!`
                  :info.isComplete?'✓ All units fully scheduled!'
                  :info.scheduled>0?`${info.units-info.scheduled} more day(s) needed`
                  :'Not yet scheduled — add first session'}
              </div>
            </div>
            {/* Existing schedules */}
            <div style={{borderTop:'1px solid var(--border)',paddingTop:8}}>
              <div style={{fontSize:10,fontWeight:700,color:'var(--text3)',textTransform:'uppercase',letterSpacing:'0.8px',marginBottom:6}}>Existing Schedules</div>
              {info.existing.length===0
                ?<div style={{fontSize:11,color:'var(--text3)',fontStyle:'italic'}}>No schedules yet</div>
                :DAYS.filter(d=>info.byDay[d]).map(d=>(
                  <div key={d} style={{marginBottom:5}}>
                    <div style={{fontSize:10,fontWeight:700,color:'var(--accent5)',marginBottom:2}}>{d}</div>
                    {info.byDay[d].map(s=>{
                      const tch=teachers&&teachers.find(t=>t.id===s.teacherId);
                      const rm=rooms&&rooms.find(r=>r.id===s.roomId);
                      return(
                        <div key={s.id} style={{display:'flex',justifyContent:'space-between',fontSize:11,padding:'3px 8px',borderRadius:5,background:'var(--bg3)',marginBottom:2}}>
                          <span style={{color:'var(--text)',fontWeight:500}}>{tch?tch.name:'No teacher'}</span>
                          <span style={{color:'var(--text3)',fontFamily:'monospace',fontSize:10}}>{s.timeSlot}</span>
                        </div>
                      );
                    })}
                  </div>
                ))
              }
            </div>
          </div>
        );
      })()}
    </div>
  );
};

/* ===================== TEACHER PICKER COMPONENT ===================== */
const TeacherPicker=({teachers,selectedId,onSelect,schedules,subjects,sections,editingId,selectedDay,selectedTimeSlot})=>{
  const [popup,setPopup]=useState(null);
  const [popupPos,setPopupPos]=useState({top:0,left:0});
  // Force re-computation whenever schedules change
  const scheduleHash=useMemo(()=>schedules.map(s=>s.id+s.teacherId+s.day+s.timeSlot).join('|'),[schedules]);
  const selectRef=React.useRef(null);

  const getInfo=(t)=>{
    const mySched=schedules.filter(s=>s.teacherId===t.id&&s.id!==editingId);
    const totalHrs=mySched.reduce((acc,s)=>{
      const p=parseSlotLabel(s.timeSlot);
      return acc+(p?(p.endMin-p.startMin)/60:0);
    },0);
    const maxHrs=t.maxHoursPerWeek||30;
    const byDay={};
    DAYS.forEach(d=>{byDay[d]=[];});
    mySched.forEach(s=>{if(byDay[s.day])byDay[s.day].push(s);});
    DAYS.forEach(d=>byDay[d].sort((a,b)=>{
      const pa=parseSlotLabel(a.timeSlot),pb=parseSlotLabel(b.timeSlot);
      return(pa?.startMin??0)-(pb?.startMin??0);
    }));
    return{mySched,totalHrs,maxHrs,remaining:Math.max(0,maxHrs-totalHrs),byDay};
  };

  const isBusyAt=(t)=>{
    const sp=selectedTimeSlot?parseSlotLabel(selectedTimeSlot):null;
    if(!sp)return false;
    return schedules.some(s=>{
      if(s.teacherId!==t.id||s.day!==selectedDay||s.id===editingId)return false;
      const ep=parseSlotLabel(s.timeSlot);
      return ep&&slotsOverlap(sp.startMin,sp.endMin,ep.startMin,ep.endMin);
    });
  };

  const showPopupForSelected=(id)=>{
    if(!id){setPopup(null);return;}
    const t=teachers.find(x=>x.id===id);
    if(!t){setPopup(null);return;}
    if(selectRef.current){
      const rect=selectRef.current.getBoundingClientRect();
      setPopupPos({top:Math.min(rect.bottom+4,window.innerHeight-440),left:rect.left});
    }
    setPopup(t);
  };

  const selectedTeacher=teachers.find(t=>t.id===selectedId);
  const selectedBusy=selectedTeacher?isBusyAt(selectedTeacher):false;

  return(
    <div style={{position:'relative'}}>
      <select
        ref={selectRef}
        className="form-select"
        value={selectedId}
        style={selectedBusy?{borderColor:'var(--danger)'}:selectedId?{borderColor:'var(--accent3)'}:{}}
        onChange={e=>{onSelect(e.target.value);showPopupForSelected(e.target.value);}}
        onFocus={e=>{if(selectedId)showPopupForSelected(selectedId);}}
        onBlur={()=>setTimeout(()=>setPopup(null),200)}
      >
        <option value="">— Select Teacher —</option>
        {teachers.map(t=>{
          const busy=isBusyAt(t);
          const info=getInfo(t);
          const pct=Math.min(100,Math.round(info.totalHrs/info.maxHrs*100));
          return(
            <option key={t.id+'-'+scheduleHash.length} value={t.id}>
              {busy?'⛔':'✅'} {t.name} — {busy?'BUSY at this slot':'FREE'} · {info.totalHrs.toFixed(1)}/{info.maxHrs}h ({pct}%)
            </option>
          );
        })}
      </select>

      {/* Status pill shown below select when a teacher is selected */}
      {selectedTeacher&&(()=>{
        const info=getInfo(selectedTeacher);
        const pct=Math.min(100,Math.round(info.totalHrs/info.maxHrs*100));
        const barClr=pct>=90?'var(--danger)':pct>=60?'var(--accent5)':'var(--accent3)';
        return(
          <div
